<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Success</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 50px;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        .success-icon {
            font-size: 5rem;
            margin-bottom: 20px;
        }
        h1 {
            color: #4caf50;
            margin-bottom: 20px;
        }
        .btn {
            display: inline-block;
            padding: 15px 40px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            margin-top: 20px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn-outline {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }
        .loading {
            color: #666;
        }
        .cred-box {
            background: #f8f7ff;
            border: 1px solid #e0deff;
            border-radius: 12px;
            padding: 20px;
            text-align: left;
            margin: 20px 0;
        }
        .cred-row {
            margin-bottom: 12px;
        }
        .cred-label {
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .cred-value {
            font-family: 'Courier New', monospace;
            font-weight: bold;
            color: #333;
            font-size: 1.05rem;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="loading">
            <h2>Verifying Payment...</h2>
            <p>Please wait while we confirm your payment</p>
        </div>
    </div>
    <script>
        const API_BASE = window.location.origin + '/api';
        const storedHotelId = localStorage.getItem('hotelId');
        const authToken = localStorage.getItem('authToken') || localStorage.getItem('hotel_token');
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('order_id');
        const urlHotelId = urlParams.get('hotelId');
        const hotelId = urlHotelId || storedHotelId;

        let credentialsData = null;

        function copyCredentials() {
            if (!credentialsData) return;
            const text = `Hotel ID: ${credentialsData.hotelId}\nEmail: ${credentialsData.email}\nPassword: ${credentialsData.password}`;
            navigator.clipboard.writeText(text).then(() => alert('✅ Copied to clipboard!'));
        }

        function renderSuccessWithCredentials(data) {
            credentialsData = data;
            document.querySelector('.container').innerHTML = `
                <div class="success-icon">✅</div>
                <h1>Payment Successful!</h1>
                <p>Your hotel account is now active. Save these login details:</p>
                <div class="cred-box">
                    <div class="cred-row">
                        <div class="cred-label">Hotel ID</div>
                        <div class="cred-value">${data.hotelId}</div>
                    </div>
                    <div class="cred-row">
                        <div class="cred-label">Email</div>
                        <div class="cred-value">${data.email || '-'}</div>
                    </div>
                    <div class="cred-row" style="margin-bottom:0">
                        <div class="cred-label">Password</div>
                        <div class="cred-value">${data.password || '(already used / not shown)'}</div>
                    </div>
                </div>
                <button class="btn btn-outline" onclick="copyCredentials()">📋 Copy Details</button>
                <a href="/?hotel=${data.hotelId}" class="btn">Go to Login</a>
            `;
        }

        function renderSuccessNoCredentials() {
            document.querySelector('.container').innerHTML = `
                <div class="success-icon">✅</div>
                <h1>Payment Successful!</h1>
                <p>Your subscription has been activated.</p>
                <a href="/admin-dashboard.html" class="btn">Go to Dashboard</a>
            `;
        }

        function renderPending(message) {
            document.querySelector('.container').innerHTML = `
                <div class="success-icon">⚠️</div>
                <h1>Payment Pending</h1>
                <p>${message || 'Your payment is being processed.'}</p>
                <a href="/subscribe.html" class="btn">Try Again</a>
            `;
        }

        function renderFailed() {
            document.querySelector('.container').innerHTML = `
                <div class="success-icon">❌</div>
                <h1>Verification Failed</h1>
                <p>Please contact support.</p>
                <a href="/subscribe.html" class="btn">Go Back</a>
            `;
        }

        async function verifyPayment() {
            try {
                if (authToken) {
                    // Existing logged-in customer (renewal/upgrade) — old flow
                    const response = await fetch(`${API_BASE}/subscription/verify/${orderId}`, {
                        headers: {
                            'Authorization': `Bearer ${authToken}`,
                            'x-hotel-id': hotelId
                        }
                    });
                    const data = await response.json();
                    if (data.success && data.data.status === 'PAID') {
                        renderSuccessNoCredentials();
                    } else {
                        renderPending(data.data?.message);
                    }
                } else {
                    // New signup customer — no login yet, use public endpoint
                    if (!hotelId) { renderFailed(); return; }
                    const response = await fetch(`${API_BASE}/subscription/verify-public/${orderId}?hotelId=${hotelId}`);
                    const data = await response.json();
                    if (data.success && data.data.status === 'PAID') {
                        renderSuccessWithCredentials(data.data);
                    } else {
                        renderPending(data.data?.message);
                    }
                }
            } catch (error) {
                console.error('Error:', error);
                renderFailed();
            }
        }
        // Verify payment on page load
        setTimeout(verifyPayment, 2000);
    </script>
</body>
</html>
