<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Crown Plaza Hotel</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body.gradient-bg{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:0;margin:0;}
.glass-card{background:rgba(255,255,255,0.98);backdrop-filter:blur(10px);border-radius:0;box-shadow:none;width:100%;min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:24px;}
body.dark .glass-card{background:rgba(31,41,55,0.98);color:white;}
.message-area{transition:all 0.3s ease;}
input,button{border-radius:12px!important;}
.lang-placeholder[data-lang="en"]::placeholder{color:#9ca3af;}
@media(min-width:768px){.glass-card{padding:40px;}}
</style>
</head>
<body class="gradient-bg">
<div class="glass-card">
<div class="max-w-md mx-auto w-full">
<div class="text-center mb-6">
<div class="text-6xl mb-3">👑</div>
<h1 class="text-3xl font-bold" id="hotelNameDisplay">Crown Plaza Hotel</h1>
<p class="text-gray-600 dark:text-gray-300 mt-1" id="welcomeSubtitle">Complete Management System</p>
<div id="liveClock" class="text-xs text-gray-500 mt-3"></div>
</div>
<div id="globalMessageArea" class="message-area space-y-2 mb-4"></div>
<div class="flex gap-2 mb-5">
<button id="guestTabBtn" class="flex-1 py-2 rounded-lg font-semibold bg-purple-100 text-purple-700"><span id="guestTabText">🏨 Guest</span></button>
<button id="adminTabBtn" class="flex-1 py-2 rounded-lg font-semibold bg-gray-100 text-gray-700"><span id="adminTabText">👑 Admin</span></button>
</div>
<form id="guestLoginForm" class="space-y-4">
<input type="text" id="guestName" id="guestNameInput" placeholder="Your Name" class="w-full px-4 py-3 border rounded-xl lang-placeholder" data-lang-en="Your Name" data-lang-hi="आपका नाम" data-lang-ar="اسمك">
<input type="number" id="guestRoom" placeholder="Room Number" class="w-full px-4 py-3 border rounded-xl lang-placeholder" data-lang-en="Room Number" data-lang-hi="कमरा संख्या" data-lang-ar="رقم الغرفة">
<button type="submit" class="w-full gradient-bg text-white py-3 rounded-xl font-semibold" id="guestLoginBtn">🔐 Login as Guest</button>
</form>
<form id="adminLoginForm" class="space-y-4 hidden">
<input type="email" id="adminEmail" placeholder="admin@crownplaza.com" class="w-full px-4 py-3 border rounded-xl lang-placeholder" data-lang-en="Administrator login" data-lang-hi="व्यवस्थापक लॉगिन" data-lang-ar="تسجيل دخول المسؤول">
<input type="password" id="adminPassword" placeholder="Password" class="w-full px-4 py-3 border rounded-xl lang-placeholder" data-lang-en="Password" data-lang-hi="पासवर्ड" data-lang-ar="كلمة المرور">
<button type="submit" class="w-full gradient-bg text-white py-3 rounded-xl font-semibold" id="adminLoginBtn">🔐 Login as Admin</button>
</form>
<div class="flex justify-center gap-3 mt-6 flex-wrap">
<button id="offlineModeBtn" class="px-3 py-1.5 bg-gray-100 rounded-lg text-sm">📴 Offline</button>
<button id="darkModeBtn" class="px-3 py-1.5 bg-gray-100 rounded-lg text-sm">🌙 Dark</button>
<button id="langEnBtn" class="px-3 py-1.5 bg-gray-100 rounded-lg text-sm">🇬🇧 EN</button>
<button id="langHiBtn" class="px-3 py-1.5 bg-gray-100 rounded-lg text-sm">🇮🇳 HI</button>
<button id="langArBtn" class="px-3 py-1.5 bg-gray-100 rounded-lg text-sm">🇸🇦 AR</button>
</div>
</div>
</div>
<script>
// Translations
const translations = {
  en: {
    guestTab: '🏨 Guest',
    adminTab: '👑 Admin',
    guestLogin: '🔐 Login as Guest',
    adminLogin: '🔐 Login as Admin',
    welcomeSubtitle: 'Complete Management System',
    yourName: 'Your Name',
    roomNumber: 'Room Number',
    emailPlaceholder: 'admin@crownplaza.com',
    passwordPlaceholder: 'Password'
  },
  hi: {
    guestTab: '🏨 अतिथि',
    adminTab: '👑 व्यवस्थापक',
    guestLogin: '🔐 अतिथि के रूप में लॉगिन करें',
    adminLogin: '🔐 व्यवस्थापक के रूप में लॉगिन करें',
    welcomeSubtitle: 'संपूर्ण प्रबंधन प्रणाली',
    yourName: 'आपका नाम',
    roomNumber: 'कमरा संख्या',
    emailPlaceholder: 'व्यवस्थापक@crownplaza.com',
    passwordPlaceholder: 'पासवर्ड'
  },
  ar: {
    guestTab: '🏨 ضيف',
    adminTab: '👑 مسؤول',
    guestLogin: '🔐 تسجيل الدخول كضيف',
    adminLogin: '🔐 تسجيل الدخول كمسؤول',
    welcomeSubtitle: 'نظام إدارة كامل',
    yourName: 'اسمك',
    roomNumber: 'رقم الغرفة',
    emailPlaceholder: 'admin@crownplaza.com',
    passwordPlaceholder: 'كلمة المرور'
  }
};

let currentLang = 'en';

function updateLanguage(lang) {
  currentLang = lang;
  const t = translations[lang];
  
  // Update text content
  document.getElementById('guestTabText').innerHTML = t.guestTab;
  document.getElementById('adminTabText').innerHTML = t.adminTab;
  document.getElementById('guestLoginBtn').innerHTML = t.guestLogin;
  document.getElementById('adminLoginBtn').innerHTML = t.adminLogin;
  document.getElementById('welcomeSubtitle').innerHTML = t.welcomeSubtitle;
  
  // Update placeholders
  document.querySelectorAll('.lang-placeholder').forEach(el => {
    const placeholderKey = el.getAttribute('data-lang-' + lang);
    if (placeholderKey) el.placeholder = placeholderKey;
  });
  
  // Update admin email placeholder separately
  const adminEmail = document.getElementById('adminEmail');
  if(adminEmail) adminEmail.placeholder = t.emailPlaceholder;
  
  // Set HTML direction for Arabic
  if (lang === 'ar') {
    document.documentElement.dir = 'rtl';
    document.documentElement.lang = 'ar';
  } else {
    document.documentElement.dir = 'ltr';
    document.documentElement.lang = lang;
  }
  
  showCardMessage(`Language changed to ${lang.toUpperCase()}`, 'info');
}

function showCardMessage(message, type) {
  const area = document.getElementById('globalMessageArea');
  const colors = {
    success: 'bg-green-100 text-green-700 border-green-300',
    error: 'bg-red-100 text-red-700 border-red-300',
    info: 'bg-blue-100 text-blue-700 border-blue-300',
    offline: 'bg-gray-100 text-gray-700 border-gray-300'
  };
  const bgColor = colors[type] || colors.info;
  const msgDiv = document.createElement('div');
  msgDiv.className = `p-3 rounded-lg border ${bgColor} text-sm text-center`;
  msgDiv.innerText = message;
  area.appendChild(msgDiv);
  setTimeout(() => msgDiv.remove(), 4000);
}

// Event listeners
let offlineMode = false;
document.getElementById('offlineModeBtn').onclick = () => {
  offlineMode = !offlineMode;
  showCardMessage(offlineMode ? '📴 Offline Mode Activated' : '🟢 Online Mode Connected', offlineMode ? 'offline' : 'success');
};

document.getElementById('darkModeBtn').onclick = () => {
  document.body.classList.toggle('dark');
  showCardMessage(document.body.classList.contains('dark') ? '🌙 Dark Mode Enabled' : '☀️ Light Mode Enabled', 'success');
};

document.getElementById('langEnBtn').onclick = () => updateLanguage('en');
document.getElementById('langHiBtn').onclick = () => updateLanguage('hi');
document.getElementById('langArBtn').onclick = () => updateLanguage('ar');

document.getElementById('guestLoginForm').onsubmit = (e) => {
  e.preventDefault();
  const name = document.getElementById('guestName').value;
  const room = document.getElementById('guestRoom').value;
  if(name && room) showCardMessage(`✅ Welcome ${name}! Room ${room}`, 'success');
  else showCardMessage('❌ Please enter name and room number', 'error');
};

document.getElementById('adminLoginForm').onsubmit = (e) => {
  e.preventDefault();
  const email = document.getElementById('adminEmail').value;
  const pwd = document.getElementById('adminPassword').value;
  if(email === 'admin@crownplaza.com' && pwd === 'admin123') showCardMessage('✅ Admin Login Successful', 'success');
  else showCardMessage('❌ Invalid Credentials', 'error');
};

document.getElementById('guestTabBtn').onclick = () => {
  document.getElementById('guestLoginForm').classList.remove('hidden');
  document.getElementById('adminLoginForm').classList.add('hidden');
  showCardMessage('👤 Guest Login Mode', 'info');
};

document.getElementById('adminTabBtn').onclick = () => {
  document.getElementById('guestLoginForm').classList.add('hidden');
  document.getElementById('adminLoginForm').classList.remove('hidden');
  showCardMessage('👑 Admin Login Mode', 'info');
};

setInterval(() => {
  document.getElementById('liveClock').innerText = new Date().toLocaleTimeString();
}, 1000);

// Set default language
updateLanguage('en');
</script>
</body>
</html>
