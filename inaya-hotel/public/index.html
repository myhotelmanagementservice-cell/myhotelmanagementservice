.booking-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}.booking-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;box-shadow:var(--shadow)}.booking-header{display:flex;justify-content:center;align-items:flex-start;margin-bottom:10px}.booking-room{font-weight:700;font-size:14px}.booking-dates{font-size:13px;opacity:.7;margin-top:2px}.booking-status{padding:2px 8px;border-radius:20px;font-size:9px;font-weight:700}.booking-status.pending{background:#fef3c7;color:#92400e}.booking-status.confirmed{background:#dbeafe;color:#1e40af}.booking-status.checked-in{background:#d1fae5;color:#065f46}.booking-status.checked-out{background:#e5e7eb;color:#374151}.booking-status.cancelled{background:#fee2e2;color:#991b1b}.booking-meta{display:flex;gap:4px;font-size:10px;opacity:.7;margin:6px 0}.booking-actions{display:flex;gap:4px;margin-top:10px;flex-wrap:wrap}.booking-btn{padding:3px 8px;border-radius:6px;font-size:10px;border:none;cursor:pointer;font-family:inherit}.booking-btn.confirm{background:#10b981;color:#fff}.booking-btn.cancel{background:#ef4444;color:#fff}.booking-btn.edit{background:var(--p1);color:#fff}.booking-price{font-weight:700;color:var(--p1);font-size:13px}
.policy-card, .announcement-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}.policy-header, .announcement-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}.policy-title, .announcement-title{font-weight:700;font-size:14px;color:var(--fg)}.policy-type{font-size:11px;opacity:0.7;text-transform:uppercase;letter-spacing:0.5px;color:var(--p1)}.policy-content, .announcement-content{font-size:13px;line-height:1.6;color:var(--fg);opacity:0.85;margin-bottom:10px;white-space:pre-wrap}
.toggle-switch{position:relative;display:inline-block;width:40px;height:22px}.toggle-switch input{opacity:0;width:0;height:0}.slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background-color:#ccc;transition:.4s;border-radius:22px}.slider:before{position:absolute;content:"";height:16px;width:16px;left:3px;bottom:3px;background-color:white;transition:.4s;border-radius:50%}input:checked + .slider{background-color:var(--p1)}input:checked + .slider:before{transform:translateX(18px)}
.dash-kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:16px}.dash-kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;box-shadow:var(--shadow)}.dash-kpi-val{font-size:22px;font-weight:700;color:var(--p1)}.dash-kpi-lbl{font-size:11px;color:var(--fg);opacity:0.7;margin-top:4px}

#sessionLoader {
position: fixed;
inset: 0;
z-index: 999999;
background: var(--bg);
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
transition: opacity 0.4s ease;
}
#sessionLoader.hidden {
opacity: 0;
pointer-events: none;
}
#sessionLoader .spinner {
width: 48px;
height: 48px;
border: 4px solid var(--border);
border-top-color: var(--p1);
border-radius: 50%;
animation: spin 0.8s linear infinite;
}
#sessionLoader p {
margin-top: 16px;
color: var(--fg);
opacity: 0.7;
font-size: 14px;
}

async function apiCall(method, path, body = null, retries = 3) {
if (!isOnline) return null;
const token = localStorage.getItem('hotel_token') || sessionStorage.getItem('hotel_token') || localStorage.getItem(`h_${HID}_token`);
const opts = {
method,
headers: {
'Content-Type': 'application/json',
'x-hotel-id': HID,
'x-client-id': clientId
}
};
if (token) opts.headers['Authorization'] = `Bearer ${token}`;
if (body) opts.body = JSON.stringify(body);
for (let i = 0; i < retries; i++) {
try {
const r = await fetch(API_BASE + path, opts);
const text = await r.text();
let data;
try { data = JSON.parse(text); } catch (e) {
if (text.startsWith('<!DOCTYPE') || text.startsWith('<html')) return null;
throw new Error('Invalid JSON');
}
if (data && data.code === 'SESSION_EXPIRED') {
alert("Session expired. Please login again.");
logout();
return null;
}
if (!r.ok) throw new Error(r.statusText);
return data;
} catch (e) {
if (i === retries - 1) {
console.warn(`API error for ${path}:`, e.message);
return null;
}
await new Promise(res => setTimeout(res, 1000 * (i + 1)));
}
}
return null;
}
async function saveToMongo(collection, data) {

return `/${collection}?hotelId=${HID}`;
}

};
if (Array.isArray(data)) {
for (let item of data) {
const isNew = item._isNew;
const payload = { ...item, hotelId: HID };
delete payload._isNew;
if (isNew || !payload._id) {
const res = await apiCall('POST', `/${collection}?hotelId=${HID}`, payload);
if (!res) {
console.error(`❌ FAILED to save new ${collection} item. API returned null. Check Network tab.`);
return false; 
}
const newId = res._id || res.insertedId || res.id;
if (newId) item._id = newId;
} else {
const res = await apiCall('PUT', getPutUrl(payload._id), payload);
if (!res) {
console.error(`❌ FAILED to update ${collection} item. API returned null. Check Network tab.`);
return false; 
}
}
delete item._isNew;
}
} else {
const isNew = data._isNew;
const payload = { ...data, hotelId: HID };
delete payload._isNew;
if (isNew || !payload._id) {
const res = await apiCall('POST', `/${collection}?hotelId=${HID}`, payload);
if (!res) {
console.error(`❌ FAILED to save new ${collection} item. API returned null. Check Network tab.`);
return false; 
}
const newId = res._id || res.insertedId || res.id;
if (newId) data._id = newId;
} else {
const res = await apiCall('PUT', getPutUrl(payload._id), payload);
if (!res) {
console.error(`❌ FAILED to update ${collection} item. API returned null. Check Network tab.`);
return false; 
}
}
delete data._isNew;
}
return true;
} catch (e) {
console.warn(`saveToMongo error for ${collection}:`, e);

}

function setSockStatus(s) {
const dot = document.getElementById('sockDot'), txt = document.getElementById('sockTxt');
const map = {
connected: { cls: 'connected', text: t('serverConnected') || 'Live' },
disconnected: { cls: 'error', text: t('serverOffline') || 'Offline' },
connecting: { cls: 'connecting', text: t('serverConnecting') || 'Connecting…' },
error: { cls: 'error', text: t('serverOffline') || 'Offline' }
};
const m = map[s] || map.disconnected;
if (dot) dot.className = 'sock-dot ' + m.cls;
if (txt) txt.textContent = m.text;
const sockEl = document.getElementById('sockStatus');
if (sockEl) sockEl.style.display = s === 'connected' ? 'none' : 'flex';
}
function updateNetBadge(status) {
const loginBadge = document.getElementById('loginNetBadge');
if (!loginBadge) return;
const className = status === 'online' ? 'online' : status === 'offline' ? 'offline' : status === 'reconnecting' ? 'reconnecting' : 'queued';
const text = status === 'online' ? t('online') : status === 'offline' ? t('offline') : status === 'reconnecting' ? t('reconnecting') : '📴 Queued';
if (loginBadge) {
loginBadge.className = '';
loginBadge.classList.add(className);
loginBadge.textContent = text;
}
}
function toggleOnlineMode() {
isOnline = !isOnline;
const btn = document.getElementById('onlineBtn');
if (isOnline) {
btn.innerHTML = '🟢 Online';
btn.title = 'Click to go offline';
updateNetBadge('online');
if (socket && !socket.connected) socket.connect();
showToast('🌐 Online mode enabled', 'success');
} else {
btn.innerHTML = '📴 Offline';
btn.title = 'Click to go online';
updateNetBadge('offline');
if (socket && socket.connected) socket.disconnect();
showToast('📴 Offline mode - using localStorage', 'warning');
}
}

apiCall('GET', `/inventory?hotelId=${HID}`),
apiCall('GET', `/requests?hotelId=${HID}`),
apiCall('GET', `/blacklist?hotelId=${HID}`),
apiCall('GET', `/maintenance?hotelId=${HID}`),
apiCall('GET', `/reviews?hotelId=${HID}`),
apiCall('GET', `/staff?hotelId=${HID}`),
apiCall('GET', `/logs?hotelId=${HID}`),
apiCall('GET', `/bookings?hotelId=${HID}`),
apiCall('GET', `/config?hotelId=${HID}`),
apiCall('GET', `/policies?hotelId=${HID}`),
apiCall('GET', `/announcements?hotelId=${HID}`),

]);
if (r) { rooms = safeMerge(rooms, r, 'rooms'); cacheData('rooms', rooms); }
if (g) { guests = safeMerge(guests, g, 'guests'); cacheData('guests', guests); }
if (f) { food = safeMerge(food, f, 'food'); cacheData('food', food); }
if (inv) { inventory = safeMerge(inventory, inv, 'inventory'); cacheData('inventory', inventory); }
if (req) { requests = safeMerge(requests, req, 'requests'); cacheData('requests', requests); }
if (bl) { blacklist = safeMerge(blacklist, bl, 'blacklist'); cacheData('blacklist', blacklist); }
if (maint) { maintenance = safeMerge(maintenance, maint, 'maintenance'); cacheData('maintenance', maintenance); }
if (rev) { reviews = safeMerge(reviews, rev, 'reviews'); cacheData('reviews', reviews); }
if (st) { staff = safeMerge(staff, st, 'staff'); cacheData('staff', staff); }
if (lg) { logs = safeMerge(logs, lg, 'logs'); cacheData('logs', logs); }
if (bk) { bookings = safeMerge(bookings, bk, 'bookings'); cacheData('bookings', bookings); }
if (pol) { policies = safeMerge(policies, pol, 'policies'); cacheData('policies', policies); }
if (ann) { announcements = safeMerge(announcements, ann, 'announcements'); cacheData('announcements', announcements); }
if (depts && Array.isArray(depts) && depts.length > 0) { departments = safeMerge(departments, depts, 'departments'); cacheData('departments', departments); }
if (cfg) {
Object.assign(HotelCfg, cfg);
if (cfg._id) HotelCfg._id = cfg._id;
applyCfg();
cacheData('config', cfg);
}
renderAll();
if (!rooms.length) loadAllData();
}

function reqNotif() {
if (!('Notification' in window)) { showToast(t('notifNotSupported'), 'error'); return; }
if (Notification.permission === 'granted') {
showToast(t('notifGranted'), 'success');
new Notification('Hotel OS', { body: t('welcomeSubtitle') });
return;
}
if (Notification.permission === 'denied') {
showToast((t('notifDenied') || 'Notifications blocked') + ' - Please allow in browser settings', 'warning');
return;
}
showToast(t('notifRequesting') || 'Requesting permission...', 'warning');
Notification.requestPermission().then(p => {
notificationPermission = p;
if (p === 'granted') {
showToast(t('notifGranted'), 'success');
new Notification('Hotel OS', { body: t('welcomeSubtitle') });
} else if (p === 'denied') {
showToast((t('notifDenied') || 'Notifications blocked') + ' - Please allow in browser settings', 'warning');
} else {
showToast(t('notifPending') || 'Permission pending', 'warning');
}
});
}
function haptic() {
if (navigator.vibrate) {
navigator.vibrate([50, 50, 50]);
showToast('📳 ' + t('haptic'), 'success');
} else {
showToast('📳 Haptic not supported', 'warning');
}
}
function speakText(text) {
if (!('speechSynthesis' in window)) return;
const utterance = new SpeechSynthesisUtterance(text);
utterance.lang = lang === 'en' ? 'en-US' : lang === 'hi' ? 'hi-IN' : 'ar-SA';
utterance.rate = 0.9;
if (voicesLoaded) {
const voices = window.speechSynthesis.getVoices();
const preferred = voices.find(v => v.lang.startsWith(utterance.lang));
if (preferred) utterance.voice = preferred;
}
window.speechSynthesis.cancel();

async function saveCfg(field) {

const val = document.getElementById('cfgName')?.value;

} else if (field === 'currency') {
const val = document.getElementById('cfgCurrency')?.value;

} else if (field === 'wifi') {
const val = document.getElementById('cfgWifi')?.value;
if (val) HotelCfg.wifi = val;
} else if (field === 'transport') {
const airport = parseInt(document.getElementById('cfgAirport')?.value);
const local = parseInt(document.getElementById('cfgLocal')?.value);
if (!isNaN(airport)) HotelCfg.airportPrice = airport;
if (!isNaN(local)) HotelCfg.localPrice = local;
}

...HotelCfg,
currencies: CURRENCIES,
hotelId: HID,
_version: (HotelCfg._version || 0) + 1,
updatedAt: new Date().toISOString()
};
const success = await saveToMongo('config', payload);
if (success) {
if (!HotelCfg._id && payload._id) HotelCfg._id = payload._id;
Object.assign(HotelCfg, payload);
cacheData('config', payload);
if (socket?.connected) {
socket.emit('cfg_upd', { hotelId: HID, ...payload, syncToken: Date.now() });
}
applyCfg();
showToast('⚙️ ' + (t('settingsSaved') || 'Settings saved successfully'), 'success');
addLog('Config Update', field);
renderAll();
} else {
showToast('⚠️ Settings not saved - please check connection', 'error');
offlineQueue.push({ collection: 'config', data: payload, event: 'cfg_upd', timestamp: Date.now() });
saveUIPrefs();
}
}

async function saveDept(e, deptKey) {
e.preventDefault();
const emoji = document.getElementById('deptEmoji').value;
const name = {
en: document.getElementById('deptNameEn').value,
hi: document.getElementById('deptNameHi').value,
ar: document.getElementById('deptNameAr').value
};
const isEnabled = document.getElementById('deptEnabled').value === 'true';
if (deptKey) {
const idx = departments.findIndex(d => d.key === deptKey);
if (idx > -1) {
departments[idx].emoji = emoji;
departments[idx].name = name;
departments[idx].isEnabled = isEnabled;
await save('departments', departments[idx], 'dept_upd');
}
} else {
const newKey = 'dept_' + Date.now();
const newDept = {
_id: newKey,
key: newKey,
emoji,
name,
isEnabled,
categories: [],
hotelId: HID,
_version: 1,
_isNew: true
};
departments.push(newDept);
await save('departments', newDept, 'dept_upd');
}
closeModal('infoModal');
renderDepartments();
buildGuestPanes();
showToast('✅ Department saved', 'success');
}

async function saveCat(e, deptKey, catKey) {
e.preventDefault();
const dept = departments.find(d => d.key === deptKey);
if(!dept) return;
const emoji = document.getElementById('catEmoji').value;
const name = {
en: document.getElementById('catNameEn').value,
hi: document.getElementById('catNameHi').value,
ar: document.getElementById('catNameAr').value
};
if (catKey) {
const idx = dept.categories.findIndex(c => c.key === catKey);
if (idx > -1) {
dept.categories[idx].emoji = emoji;
dept.categories[idx].name = name;
}
} else {
dept.categories.push({
key: 'cat_' + Date.now(),
emoji,
name
});
}
await save('departments', dept, 'dept_upd');
closeModal('infoModal');
renderDepartments();
buildGuestPanes();
showToast('✅ Category saved', 'success');
}
function deleteCat(deptKey, catKey) {
if(!confirm('Delete this category?')) return;
const dept = departments.find(d => d.key === deptKey);
if(!dept) return;
dept.categories = dept.categories.filter(c => c.key !== catKey);
if(isOnline) apiCall('PUT', `/departments/${dept._id || deptKey}?hotelId=${HID}`, dept);
if(socket?.connected) socket.emit('dept_upd', { hotelId: HID, collection: 'departments', data: dept, clientId, syncToken: Date.now() });
renderDepartments();
buildGuestPanes();
showToast('✅ Category deleted', 'success');
}
function moveCat(deptKey, catKey, direction) {
const dept = departments.find(d => d.key === deptKey);
if(!dept) return;
const idx = dept.categories.findIndex(c => c.key === catKey);
if(idx === -1) return;
const newIdx = idx + direction;
if(newIdx < 0 || newIdx >= dept.categories.length) return;
[dept.categories[idx], dept.categories[newIdx]] = [dept.categories[newIdx], dept.categories[idx]];
if(isOnline) apiCall('PUT', `/departments/${dept._id || deptKey}?hotelId=${HID}`, dept);
if(socket?.connected) socket.emit('dept_upd', { hotelId: HID, collection: 'departments', data: dept, clientId, syncToken: Date.now() });
renderDepartments();
buildGuestPanes();
}

function showRoomDetails(roomId) {
const room = rooms.find(r => r._id === roomId);
const detailsEl = document.getElementById('bookRoomDetails');
if (!room || !detailsEl) {
if(detailsEl) detailsEl.style.display = 'none';
return;
}
detailsEl.style.display = 'block';
const amenities = (room.amenities && Array.isArray(room.amenities))
? room.amenities.map(a => {
const key = 'amenities' + a;
const translated = t(key);
return translated !== key ? translated : a;
}).join(', ')
: 'N/A';
detailsEl.innerHTML = `
<h4 style="margin-bottom:8px; color:var(--p1); font-size:14px;">🏨 Room #${room.number} Details</h4>
<div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; font-size:13px;">
<div><strong>${t('roomType')}:</strong> ${getRoomTypeLabel(room.type)}</div>
<div><strong>${t('price')}:</strong> ${formatPrice(room.basePriceSAR)}/night</div>
<div><strong>${t('roomFloor')}:</strong> ${room.floor || 'N/A'}</div>
<div><strong>${t('roomMaxGuests')}:</strong> ${room.maxGuests || 'N/A'}</div>
<div><strong>${t('roomView')}:</strong> ${room.view ? getViewLabel(room.view) : 'N/A'}</div>
</div>
<div style="margin-top:8px; font-size:13px;"><strong>${t('roomAmenities')}:</strong> ${amenities}</div>
<div style="margin-top:8px; font-size:13px;"><strong>${t('roomDescription')}:</strong> ${room.description || 'No description available.'}</div>
`;
}
function showGuestTab(id) {
GUEST_TABS.forEach(tb => {
const p = document.getElementById(`gp-${tb.id}`);
const b = document.getElementById(`gn-${tb.id}`);
if (p) p.classList.toggle('hidden', tb.id !== id);
if (b) b.classList.toggle('active', tb.id === id);
});
if (id === 'foodTab') renderGuestFood();
if (id === 'invTab') renderGuestInv();
if (id === 'histTab') renderGuestHistory();
if (id === 'bookTab') { renderGuestBookings();
renderBookRoomRooms(); }
if (id === 'announceTab') renderGuestAnnouncements();
if (id === 'policyTab') renderGuestPolicies();
sessionStorage.setItem('currentTab', 'guest_' + id);
}

function updateServices() {
const deptKey = document.getElementById('gDept')?.value;
const sel = document.getElementById('gService');
if (!sel) return;
sel.innerHTML = `<option value="">${t('selectService')}</option>`;
const dept = departments.find(d => d.key === deptKey);
if (dept && dept.categories) {
dept.categories.forEach(cat => {
const o = document.createElement('option');
o.value = cat.key;
o.textContent = `${cat.emoji} ${cat.name[lang] || cat.name.en}`;
sel.appendChild(o);
});
}
}
function updateCabPrice() {
const type = document.getElementById('cabType')?.value;
const display = document.getElementById('cabPriceDisplay');
if (!display) return;
if (type === 'airport') {
display.textContent = formatPrice(HotelCfg.airportPrice);
} else {
display.textContent = formatPrice(HotelCfg.localPrice) + ' / hour';
}
}
function calcBookingPrice() {
const select = document.getElementById('bookRoomSelect');
const checkIn = document.getElementById('bookCheckIn')?.value;
const checkOut = document.getElementById('bookCheckOut')?.value;
const totalEl = document.getElementById('bookingTotalPrice');
if (!select || !checkIn || !checkOut || !totalEl) { return; }
const selected = select.options[select.selectedIndex];
const pricePerNightSAR = parseFloat(selected.dataset?.price) || 0;
const inDate = new Date(checkIn);
const outDate = new Date(checkOut);
const nights = Math.ceil((outDate - inDate) / (1000 * 60 * 60 * 24));
if (nights > 0) {
const total = formatPrice(pricePerNightSAR * nights);
totalEl.textContent = `${total} (${nights} ${t('nights')})`;
} else {
totalEl.textContent = '0';
}
}
function submitGuestReq(e) {
e.preventDefault();
const deptKey = document.getElementById('gDept')?.value;
const svcKey = document.getElementById('gService')?.value;
const prio = document.getElementById('gPriority')?.value || 'normal';
const desc = document.getElementById('gDesc')?.value || '';
if (!deptKey || !svcKey) { showToast('Select department & service', 'error'); return; }
const dept = departments.find(d => d.key === deptKey);
const cat = dept?.categories.find(c => c.key === svcKey);
const deptName = dept ? (dept.name[lang] || dept.name.en) : deptKey;
const svcName = cat ? (cat.name[lang] || cat.name.en) : svcKey;
const req = {
_id: 'req_' + Date.now(),
_isNew: true,
guestName: currentUser.name,
roomNumber: currentUser.room,
department: deptKey,
description: `${svcName}: ${desc}`,
priority: prio,
status: 'open',
createdAt: new Date().toISOString(),
hotelId: HID,
_version: 1
};
requests.unshift(req);
save('requests', req, 'req_new');
renderRequests();
updateGuestStats();
renderGuestHistory();
e.target.reset();
updateServices();
showToast('✅ ' + (t('reqSubmitted') || 'Request submitted successfully'), 'success');
speakRequestSubmitted();
addLog('New Request', `${currentUser.name} - ${deptName}`);
if (prio === 'emergency') showToast('🚨 Emergency alert sent to staff!', 'error');
}
function addToCart(id, name, baseSARPrice) {
cart.push({ id, name, basePrice: baseSARPrice });
const cartEl = document.getElementById('cartItems');
const totEl = document.getElementById('cartTotal');
if (cartEl) {
const totSAR = cart.reduce((s, i) => s + i.basePrice, 0);
if (totEl) totEl.textContent = formatPrice(totSAR);
cartEl.innerHTML = cart.map(i =>
`<div style="display:flex;justify-content:center;padding:2px 0"><span>${i.name}</span><span>${formatPrice(i.basePrice)}</span></div>`
).join('');
}
showToast(`${name} added to cart 🛒`, 'success');
}
function placeOrder() {
if (!cart.length) { showToast('Cart is empty', 'error'); return; }
const req = {
_id: 'req_' + Date.now(),
_isNew: true,
guestName: currentUser.name,
roomNumber: currentUser.room,
department: 'restaurant',
description: `Food: ${cart.map(i => i.name).join(', ')}`,
priority: 'normal',
status: 'open',
createdAt: new Date().toISOString(),
hotelId: HID,
_version: 1
};
requests.unshift(req);
save('requests', req, 'req_new');
cart = [];
const cEl = document.getElementById('cartItems'),
tEl = document.getElementById('cartTotal');

if (tEl) tEl.textContent = '0';
renderRequests();
updateGuestStats();
renderGuestHistory();
showToast('🍽️ ' + (t('orderPlacedToast') || 'Order placed successfully'), 'success');
speakOrderPlaced();
sendGuestNotification('notifOrderTitle', 'notifOrderBody');
}

function bookCab(e) {

const req = {

_isNew: true,
guestName: currentUser.name,
roomNumber: currentUser.room,

priority: 'normal',
status: 'open',
createdAt: new Date().toISOString(),
hotelId: HID,
_version: 1
};
requests.unshift(req);
save('requests', req, 'req_new');

updateGuestStats();
e.target.reset();
showToast('🚗 ' + (t('bookingConfirmedToast') || 'Booking confirmed') + '!', 'success');
speakBookingConfirmed();

}
function bookRoom(e) {
e.preventDefault();
const roomId = document.getElementById('bookRoomSelect')?.value;
const checkIn = document.getElementById('bookCheckIn')?.value;
const checkOut = document.getElementById('bookCheckOut')?.value;
const numGuests = parseInt(document.getElementById('bookNumGuests')?.value) || 1;
if (!roomId || !checkIn || !checkOut) { showToast('Fill all fields', 'error'); return; }
const room = rooms.find(r => r._id === roomId);
if (!room) { showToast('Room not found', 'error'); return; }
const inDate = new Date(checkIn);
const outDate = new Date(checkOut);
const nights = Math.ceil((outDate - inDate) / (1000 * 60 * 60 * 24));
if (nights <= 0) { showToast('Invalid dates', 'error'); return; }
const totalPrice = room.basePriceSAR * nights;
const booking = {
_id: 'bk_' + Date.now(),
_isNew: true,
hotelId: HID,
guestName: currentUser.name,
roomNumber: room.number,
roomType: room.type,
checkIn,
checkOut,
guests: numGuests,
totalPriceSAR: totalPrice,
status: 'pending',
createdAt: new Date().toISOString(),
_version: 1
};
bookings.unshift(booking);
save('bookings', booking, 'booking_new');
renderGuestBookings();
renderAdminBookings();
e.target.reset();
document.getElementById('bookingTotalPrice').textContent = '0';
const detailsEl = document.getElementById('bookRoomDetails');
if(detailsEl) detailsEl.style.display = 'none';
showToast('📅 ' + (t('roomBooked') || 'Room booked successfully') + '!', 'success');
speakBookingConfirmed();
sendGuestNotification('notifBookingTitle', 'notifBookingBody');
addLog('New Booking', `${currentUser.name} - Room ${room.number}`);
}
function copyWifi() {
navigator.clipboard.writeText(HotelCfg.wifi).then(() => showToast('📶 WiFi copied!', 'success'));
}
function openRatingModal() {
openModal('ratingModal');
['Overall', 'Service', 'Clean'].forEach(type => {
const el = document.getElementById('star' + type);
if (!el) return;
el.innerHTML = [1, 2, 3, 4, 5].map(i =>
`<span onclick="setStar('${type.toLowerCase()}',${i})" style="font-size:24px;cursor:pointer;transition:transform .1s">☆</span>`
).join('');
});
}
function setStar(type, val) {
const map = { overall: 'Overall', service: 'Service', clean: 'Clean' };
const el = document.getElementById('star' + map[type]);
if (!el) return;
[...el.children].forEach((s, i) => {
s.textContent = i < val ? '★' : '☆';
s.style.color = i < val ? '#f59e0b' : 'var(--fg)';
});
ratingData[type] = val;
}
function submitRating() {
if (!ratingData.overall) { showToast('Please select a rating', 'error'); return; }
const rev = {
_id: 'rev_' + Date.now(),
_isNew: true,
guest: currentUser.name,
room: currentUser.room,
overall: ratingData.overall,
service: ratingData.service || 0,
cleanliness: ratingData.clean || 0,
recommend: ratingData.overall >= 3,
comment: document.getElementById('ratingComment')?.value || '',
date: new Date().toISOString(),
hotelId: HID,
_version: 1
};
reviews.unshift(rev);
save('reviews', rev, 'review_new');
closeModal('ratingModal');
renderReviews();
showToast('⭐ Thank you for rating!', 'success');
ratingData = { overall: 0, service: 0, clean: 0 };
}

function showAdminTab(id) {
document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === id));
document.querySelectorAll('.tab-pane').forEach(p => p.classList.toggle('active', p.id === `atab-${id}`));
if (id === 'overview') { renderDashboardAnalytics();
setTimeout(initDashCharts, 200); }
if (id === 'rooms') renderRooms();
if (id === 'guests') renderGuests();
if (id === 'food') renderFood();
if (id === 'inventory') renderInventory();
if (id === 'requests') { renderRequests(); }
if (id === 'blacklist') renderBlacklist();
if (id === 'reviews') renderReviews();
if (id === 'maintenance') renderMaintenance();
if (id === 'loyalty') renderLoyalty();
if (id === 'staff') renderStaff();
if (id === 'logs') renderLogs();
if (id === 'bookings') renderAdminBookings();
if (id === 'policies') renderPolicies();
if (id === 'announcements') renderAnnouncements();
if (id === 'departments') renderDepartments();
sessionStorage.setItem('currentTab', id);
}
function initDashCharts() {
const dCtx = document.getElementById('dashDeptChart');
const oCtx = document.getElementById('dashOccChart');
if (window.dashDeptChart) { window.dashDeptChart.destroy();
window.dashDeptChart = null; }
if (window.dashOccChart) { window.dashOccChart.destroy();
window.dashOccChart = null; }
const opts = { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } };
if (dCtx) {
const byDept = {};
requests.forEach(r => { byDept[r.department] = (byDept[r.department] || 0) + 1; });
const labels = Object.keys(byDept).length ? Object.keys(byDept).map(k => getDeptLabel(k)) : ['HK', 'Maint', 'Rest', 'IT', 'Laundry'];
const vals = Object.keys(byDept).length ? Object.values(byDept) : [8, 5, 6, 3, 4];
window.dashDeptChart = new Chart(dCtx, {
type: 'doughnut',
data: { labels, datasets: [{ data: vals, backgroundColor: ['#6c63ff', '#a78bfa', '#10b981', '#f59e0b', '#ef4444', '#06b6d4'] }] },
options: opts
});
}
if (oCtx) {
const occupied = rooms.filter(r => r.status === 'Occupied').length;
const total = rooms.length || 1;
window.dashOccChart = new Chart(oCtx, {
type: 'bar',
data: { labels: ['W1', 'W2', 'W3', 'W4'], datasets: [{ label: '%', data: [68, 75, 82, Math.round(occupied / total * 100)], backgroundColor: '#6c63ff', borderRadius: 6 }] },
options: { ...opts, scales: { y: { beginAtZero: true, max: 100, ticks: { color: 'var(--fg)' }, grid: { color: 'var(--border)' } }, x: { ticks: { color: 'var(--fg)' }, grid: { display: false } } } }
});
}
}

number: document.getElementById('mRoomNum').value,
type: document.getElementById('mRoomType').value,
basePriceSAR: parseFloat(document.getElementById('mRoomPrice').value),
floor: parseInt(document.getElementById('mRoomFloor').value) || 1,
maxGuests: parseInt(document.getElementById('mRoomMaxGuests').value) || 2,
view: document.getElementById('mRoomView').value,
amenities: amenities,
description: document.getElementById('mRoomDesc').value || '',
status: document.getElementById('mRoomStatus').value,
guestName: '',
hotelId: HID
};
if (editId) {
const idx = rooms.findIndex(r => r._id === editId);
if (idx > -1) {
rooms[idx] = { ...rooms[idx], ...roomData, _version: (rooms[idx]._version || 0) + 1, updatedAt: new Date().toISOString() };
save('rooms', rooms[idx], 'room_upd');
showToast('✅ ' + (t('roomUpdated') || 'Room updated successfully'), 'success');
addLog('Edit Room', '#' + rooms[idx].number);
} else {
showToast('Room not found', 'error');
}
} else {
const room = { _id: 'r_' + Date.now(), _isNew: true, ...roomData, _version: 1, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
rooms.push(room);
save('rooms', room, 'room_upd');
showToast('✅ ' + (t('roomAdded') || 'Room added successfully'), 'success');
speakItemAdded();
addLog('Add Room', '#' + room.number);
}
closeModal('roomModal');
if (document.getElementById('roomModal').dataset) delete document.getElementById('roomModal').dataset.editId;
renderRooms();
updateAdminStats();
}
function editRoom(id) {
const r = rooms.find(x => x._id === id);
if (!r) return;
openModal('roomModal');
document.getElementById('mRoomNum').value = r.number;
document.getElementById('mRoomType').value = r.type;
document.getElementById('mRoomPrice').value = r.basePriceSAR;
document.getElementById('mRoomFloor').value = r.floor || 1;
document.getElementById('mRoomMaxGuests').value = r.maxGuests || 2;
document.getElementById('mRoomView').value = r.view || 'City';
document.getElementById('mRoomDesc').value = r.description || '';
document.getElementById('mRoomStatus').value = r.status;
document.querySelectorAll('#mRoomAmenities input').forEach(cb => cb.checked = false);
if (r.amenities && Array.isArray(r.amenities)) {
r.amenities.forEach(amenity => {
const cb = document.querySelector(`#mRoomAmenities input[value="${amenity}"]`);
if (cb) cb.checked = true;
});
}
document.getElementById('roomModal').dataset.editId = id;
}

function genReport() {

let html = '';
if (t === 'occupancy') {
const occ = rooms.filter(r => r.status === 'Occupied').length,
tot = rooms.length || 1;
html = `<p>🏨 Total: <b>${tot}</b></p><p>🟢 Occupied: <b>${occ}</b> (${Math.round(occ / tot * 100)}%)</p><p>🔴 Vacant: <b>${tot - occ}</b></p>`;
} else if (t === 'revenue') {
const fr = requests.filter(r => r.department === 'restaurant').length * 15;
html = `<p>🍽️ Food Revenue: <b>${HotelCfg.currency}${fr}</b></p><p>💰 Rooms: <b>${HotelCfg.currency}${rooms.filter(r => r.status === 'Occupied').length * 100}</b></p>`;
} else if (t === 'requests') {
const bd = {};
requests.forEach(r => { bd[r.department] = (bd[r.department] || 0) + 1; });
html = Object.entries(bd).map(([d, c]) => `<p>📋 ${getDeptLabel(d)}: <b>${c}</b></p>`).join('') || '<p>No data</p>';
} else {
html = `<p>👥 Total: <b>${guests.length}</b></p><p>✅ Active: <b>${guests.filter(g => g.status === 'active').length}</b></p><p>🚫 Blocked: <b>${guests.filter(g => g.status === 'blocked').length}</b></p>`;
}
out.innerHTML = html;
}

{ icon: '⛅', desc: 'Partly Cloudy', descHi: 'आंशिक बादल', descAr: 'غائم جزئياً', tempMin: 22, tempMax: 32 },
{ icon: '🌥️', desc: 'Mostly Cloudy', descHi: 'अधिक बादल', descAr: 'غائم في الغالب', tempMin: 20, tempMax: 28 },
{ icon: '🌧️', desc: 'Light Rain', descHi: 'हल्की बारिश', descAr: 'مطر خفيف', tempMin: 18, tempMax: 25 },
{ icon: '⛈️', desc: 'Thunderstorm', descHi: 'आंधी-तूफान', descAr: 'عاصفة رعدية', tempMin: 16, tempMax: 22 },
{ icon: '🌫️', desc: 'Foggy', descHi: 'कोहरा', descAr: 'ضبابي', tempMin: 12, tempMax: 20 },
{ icon: '🌙', desc: 'Clear Night', descHi: 'साफ रात', descAr: 'ليلة صافية', tempMin: 15, tempMax: 24 },
{ icon: '🌦️', desc: 'Sun Showers', descHi: 'धूप-बारिश', descAr: 'أمطار شمسية', tempMin: 20, tempMax: 30 },
{ icon: '💨', desc: 'Windy', descHi: 'हवा', descAr: 'عاصف', tempMin: 18, tempMax: 28 }
];
function updateWeather() {
const condition = weatherConditions[Math.floor(Math.random() * weatherConditions.length)];
const temp = condition.tempMin + Math.floor(Math.random() * (condition.tempMax - condition.tempMin));
const humidity = 30 + Math.floor(Math.random() * 50);
const wind = 5 + Math.floor(Math.random() * 25);
const localizedDesc = lang === 'hi' ? condition.descHi : lang === 'ar' ? condition.descAr : condition.desc;
const timeStr = new Date().toLocaleTimeString(lang === 'en' ? 'en-US' : lang === 'hi' ? 'hi-IN' : 'ar-SA', { hour: '2-digit', minute: '2-digit', timeZone: userTimezone });
const guestTemp = document.getElementById('gWeatherTemp');
const guestDesc = document.getElementById('gWeatherDesc');
const guestIcon = document.getElementById('weatherIcon');
const guestTime = document.getElementById('guestWeatherUpdateTime');
if (guestTemp) guestTemp.textContent = `${temp}°C`;
if (guestDesc) guestDesc.textContent = localizedDesc;
if (guestIcon) guestIcon.textContent = condition.icon;
if (guestTime) guestTime.textContent = `🕐 Updated: ${timeStr} | 💧 ${humidity}% | 💨 ${wind} km/h`;
const guestCard = document.getElementById('guestWeatherCard');
if (guestCard) {
guestCard.classList.remove('weather-update-flash');
void guestCard.offsetWidth;
guestCard.classList.add('weather-update-flash');
}
}
setInterval(updateWeather, 30000);

// ============================================================
// CHECK HEALTH
// ============================================================
async function checkHealth() {
try {
const token = localStorage.getItem('hotel_token') || sessionStorage.getItem('hotel_token');
const headers = { 'x-hotel-id': HID };
if (token) headers['Authorization'] = `Bearer ${token}`;
const test = await fetch(API_BASE + '/health', { method: 'GET', headers });
if (!test.ok) throw new Error('Health check failed');
isOnline = true;
updateNetBadge('online');
return true;
} catch (e) {
console.warn('⚠️ Backend API not reachable.', e);
isOnline = false;
updateNetBadge('offline');
return false;
}
}
// ============================================================
// INIT
// ============================================================
async function init() {
loadUIPrefs();
buildModals();
buildRolePage();
tickClock();
initSocket();
await loadAllData();
buildGuestPanes(); // Moved after loadAllData to ensure departments are loaded
await checkSession();
renderAll();
updateWeather();
updateCabPrice();
const onlineBtn = document.getElementById('onlineBtn');
if (onlineBtn) onlineBtn.textContent = isOnline ? t('online') : t('offline');
setInterval(saveUIPrefs, 15000);
window.addEventListener('beforeunload', saveUIPrefs);
}
document.addEventListener('click', e => {
if (e.target.classList.contains('modal-overlay')) e.target.classList.remove('open');
if (!e.target.closest('#themeDD') && !e.target.closest('[onclick*="toggleThemeDD"]')) document.getElementById('themeDD')?.classList.remove('show');
});
document.addEventListener('keydown', e => {
if (e.key === 'Escape') document.querySelectorAll('.modal-overlay.open').forEach(m => m.classList.remove('open'));
});
window.addEventListener('online', () => {
if (!isOnline) return;
updateNetBadge('online');
if (socket) socket.connect();
showToast('🌐 Back online', 'success');
});
window.addEventListener('offline', () => {
updateNetBadge('offline');
showToast('📴 Offline mode', 'warning');
});
init();
window.addEventListener('load', async () => { await checkHealth(); });
</script>
</body>
</html>
