<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<title>Crown Plaza — Hotel OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700&family=Noto+Naskh+Arabic:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{
font-family:'DM Sans','Noto Sans Devanagari','Noto Naskh Arabic',system-ui,sans-serif;
background:var(--bg);color:var(--fg);
min-height:100dvh;width:100vw;overflow-x:hidden;
padding-bottom:70px;transition:background .25s,color .25s,filter .2s;
font-size:16px;line-height:1.5;margin:0;padding-left:0;padding-right:0;
}
:root{
--p1:#6c63ff;--p2:#a78bfa;--p3:#7c3aed;
--bg:#f4f3ff;--fg:#1e1b4b;--card:#fff;--card2:#f8f7ff;
--border:#e0deff;--shadow:0 2px 16px rgba(108,99,255,.10);
--header:linear-gradient(135deg,#6c63ff,#a78bfa);
--toolbar-bg:rgba(108,99,255,.97);
--input-bg:#fff;--input-border:#c4bfff;
--badge-open:#fef3c7;--badge-open-c:#92400e;
--badge-done:#d1fae5;--badge-done-c:#065f46;
--badge-pend:#dbeafe;--badge-pend-c:#1e40af;
--badge-blk:#fee2e2;--badge-blk-c:#991b1b;--r:14px;
}
body.dark{
--bg:#0f0e17;--fg:#fffffe;--card:#1a1a2e;--card2:#16213e;
--border:#2a2a4a;--shadow:0 2px 20px rgba(0,0,0,.4);
--input-bg:#1a1a2e;--input-border:#3a3a6a;
--badge-open:#7c5100;--badge-open-c:#fef3c7;
--badge-done:#065f46;--badge-done-c:#d1fae5;
--badge-pend:#1e3a6a;--badge-pend-c:#dbeafe;
--badge-blk:#7f1d1d;--badge-blk-c:#fee2e2;
}
body.theme-sunset{--p1:#f59e0b;--p2:#ef4444;--p3:#b45309;--header:linear-gradient(135deg,#f59e0b,#ef4444);--toolbar-bg:rgba(245,158,11,.97)}
body.theme-forest{--p1:#10b981;--p2:#34d399;--p3:#059669;--header:linear-gradient(135deg,#10b981,#059669);--toolbar-bg:rgba(16,185,129,.97)}
body.theme-ocean{--p1:#06b6d4;--p2:#3b82f6;--p3:#0e7490;--header:linear-gradient(135deg,#06b6d4,#3b82f6);--toolbar-bg:rgba(6,182,212,.97)}
body.theme-royal{--p1:#ec4899;--p2:#8b5cf6;--p3:#be185d;--header:linear-gradient(135deg,#ec4899,#8b5cf6);--toolbar-bg:rgba(236,72,153,.97)}
body.high-contrast{filter:contrast(1.4) saturate(1.3)}
#toolbar{
position:fixed!important;bottom:0!important;left:0!important;right:0!important;
width:100vw!important;background:var(--toolbar-bg)!important;
backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
border-top:1px solid rgba(255,255,255,.15);padding:16px 12px;
display:flex!important;flex-wrap:wrap;justify-content:center;align-items:center;
gap:4px;z-index:99999!important;box-shadow:0 -4px 24px rgba(0,0,0,.18)!important;
transform:translateZ(0)!important;will-change:auto!important;contain:layout style;
}
@supports(padding-bottom:env(safe-area-inset-bottom)){
#toolbar{padding-bottom:calc(8px + env(safe-area-inset-bottom))}
body{padding-bottom:calc(70px + env(safe-area-inset-bottom))}
}
.tb-btn{
padding:5px 8px;border-radius:8px;border:none;
background:rgba(255,255,255,.2);color:#fff;font-size:10px;font-weight:600;
cursor:pointer;white-space:nowrap;min-width:30px;transition:background .15s,transform .1s;
font-family:inherit;
}
.tb-btn:hover{background:rgba(255,255,255,.35);transform:translateY(-1px)}
.tb-btn.active{background:rgba(255,255,255,.45);box-shadow:0 2px 8px rgba(0,0,0,.2)}
.tb-slider{width:50px;height:4px;-webkit-appearance:none;appearance:none;background:rgba(255,255,255,.35);border-radius:2px;cursor:pointer}
.tb-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:#fff;border-radius:50%}
#themeDD{
position:fixed;bottom:86px;right:12px;background:var(--card);
border:1px solid var(--border);padding:10px;border-radius:12px;
box-shadow:0 8px 32px rgba(0,0,0,.2);z-index:100000;display:none;min-width:160px;
}
#themeDD.show{display:block}
.th-dot{width:30px;height:30px;border-radius:50%;cursor:pointer;border:2px solid transparent;display:inline-block;margin:2px;transition:transform .15s,border-color .15s}
.th-dot:hover,.th-dot.active{transform:scale(1.1);border-color:var(--p1)}
#netBadge{
position:fixed;top:10px;right:10px;z-index:50000;
padding:4px 12px;border-radius:20px;font-size:10px;font-weight:700;
pointer-events:none;display:none;transition:all .2s;
}
#netBadge.online{display:block;background:#10b981;color:#fff;box-shadow:0 2px 8px rgba(16,185,129,.3)}
#netBadge.offline{display:block;background:#ef4444;color:#fff;box-shadow:0 2px 8px rgba(239,68,68,.3)}
#netBadge.reconnecting{display:block;background:#f59e0b;color:#fff;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
#sockStatus{
position:fixed;bottom:96px;left:8px;z-index:10000;
background:var(--card);border:1px solid var(--border);
border-radius:20px;padding:3px 8px;font-size:10px;font-weight:600;
display:flex;align-items:center;gap:4px;box-shadow:var(--shadow);
}
.sock-dot{width:7px;height:7px;border-radius:50%;background:#9ca3af}
.sock-dot.connected{background:#10b981;animation:pulse 2s infinite}
.sock-dot.connecting{background:#f59e0b;animation:blink .8s infinite}
.sock-dot.error{background:#ef4444}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}
.card-sm{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;box-shadow:var(--shadow)}
.btn-primary{background:var(--header);color:#fff;border:none;border-radius:10px;padding:10px 20px;font-weight:600;cursor:pointer;font-size:14px;font-family:inherit;transition:opacity .15s,transform .1s}
.btn-primary:hover{opacity:.88;transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--p1);border:1.5px solid var(--p1);border-radius:8px;padding:6px 12px;font-size:11px;cursor:pointer;font-family:inherit;transition:background .15s}
.btn-ghost:hover{background:var(--p1);color:#fff}
.inp{width:100%;padding:12px 14px;border:1.5px solid var(--input-border);border-radius:10px;background:var(--input-bg);color:var(--fg);font-size:14px;font-family:inherit;outline:none;transition:border-color .15s}
.inp::placeholder{color:#9ca3af;opacity:1}
.inp:focus{border-color:var(--p1);box-shadow:0 0 0 3px rgba(108,99,255,.12)}
select.inp{cursor:pointer}
.lbl{font-size:11px;font-weight:600;color:var(--p1);margin-bottom:4px;display:block;text-transform:uppercase;letter-spacing:.5px}
.badge{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;display:inline-flex;align-items:center;gap:3px}
.badge-open{background:var(--badge-open);color:var(--badge-open-c)}
.badge-completed{background:var(--badge-done);color:var(--badge-done-c)}
.badge-pending{background:var(--badge-pend);color:var(--badge-pend-c)}
.badge-blocked{background:var(--badge-blk);color:var(--badge-blk-c)}
.badge-active{background:var(--badge-done);color:var(--badge-done-c)}
.badge-in_progress{background:var(--badge-pend);color:var(--badge-pend-c)}
.req-card{background:var(--card);border-radius:10px;padding:12px;margin-bottom:8px;border-left:4px solid var(--p1);box-shadow:var(--shadow)}
.req-card.emergency{border-left-color:#ef4444;background:rgba(239,68,68,.05)}
.header{background:var(--header);color:#fff;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:1000;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.header h1{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.clock-badge{background:rgba(255,255,255,.2);padding:3px 8px;border-radius:20px;font-size:10px;font-family:'DM Mono',monospace;white-space:nowrap}
.logout-btn{background:rgba(255,255,255,.2);border:none;color:#fff;padding:4px 10px;border-radius:8px;cursor:pointer;font-size:11px;font-family:inherit;font-weight:600;transition:background .15s}
.logout-btn:hover{background:rgba(255,255,255,.35)}
.tabs-bar{background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto;white-space:nowrap;position:sticky;top:52px;z-index:900;scrollbar-width:none}
.tabs-bar::-webkit-scrollbar{display:none}
.tabs-bar-inner{display:inline-flex;padding:0 8px;gap:0;min-width:100%}
.tab-btn{padding:10px 14px;font-size:13px;font-weight:500;color:var(--fg);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .15s;opacity:.65}
.tab-btn.active{color:var(--p1);border-bottom-color:var(--p1);opacity:1;font-weight:700}
.tab-btn:hover{opacity:1}
.tab-pane{display:none}.tab-pane.active{display:block;animation:fadeUp .2s ease}
#loginPage{min-height:100dvh;width:100vw;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--header);padding:0;margin:0}
.login-card{width:90%;max-width:600px;background:var(--card);border-radius:20px;padding:32px;box-shadow:0 8px 40px rgba(0,0,0,.2);margin:16px auto}
.login-logo{font-size:40px;text-align:center;margin-bottom:4px;animation:float 3s ease-in-out infinite}
.login-h{font-size:20px;font-weight:700;color:var(--fg);text-align:center;margin-bottom:4px}
.login-sub{font-size:12px;color:var(--p2);text-align:center;margin-bottom:16px}
.login-tabs{display:flex;gap:8px;margin-bottom:16px}
.login-tab{flex:1;padding:8px;border-radius:10px;border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;background:var(--card2);color:var(--fg);border:1.5px solid var(--border);transition:all .15s}
.login-tab.active{background:var(--p1);color:#fff;border-color:var(--p1)}
.conn-status{display:flex;align-items:center;gap:6px;font-size:10px;padding:4px 10px;border-radius:20px;background:var(--card2);margin-bottom:12px}
.conn-dot{width:7px;height:7px;border-radius:50%;background:#9ca3af}
.conn-dot.connected{background:#10b981;animation:pulse 2s infinite}
.conn-dot.connecting{background:#f59e0b;animation:blink .8s infinite}
.conn-dot.error{background:#ef4444}
.login-clock{font-size:10px;color:var(--fg);opacity:.7;text-align:center;margin-top:8px;font-family:'DM Mono',monospace}
.guest-nav{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:12px}
.gnav-btn{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:10px 6px;text-align:center;cursor:pointer;transition:all .15s;font-size:12px;font-weight:600;color:var(--fg);font-family:inherit}
.gnav-btn:hover,.gnav-btn.active{background:var(--p1);color:#fff;border-color:var(--p1)}
.gnav-icon{font-size:18px;display:block;margin-bottom:2px}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center;box-shadow:var(--shadow)}
.stat-val{font-size:24px;font-weight:700;color:var(--p1)}
.stat-lbl{font-size:12px;color:var(--fg);opacity:.6;margin-top:2px}
.tbl-wrap{overflow-x:auto;border-radius:8px}
.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl th{background:var(--card2);padding:8px 10px;text-align:left;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--p1);border-bottom:1px solid var(--border)}
.tbl td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--card2)}
.tbl-action{background:none;border:none;cursor:pointer;font-size:13px;padding:2px 4px;border-radius:4px;transition:background .1s}
.tbl-action:hover{background:var(--border)}
[dir="rtl"] .tbl th,[dir="rtl"] .tbl td{text-align:right}
.food-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
.food-card{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:10px;cursor:pointer;transition:all .15s;text-align:center}
.food-card:hover{border-color:var(--p1);transform:translateY(-2px);box-shadow:0 4px 16px rgba(108,99,255,.15)}
.food-emoji{font-size:24px;margin-bottom:4px}
.food-name{font-size:12px;font-weight:600;color:var(--fg)}
.food-price{font-size:13px;font-weight:700;color:var(--p1)}
.food-cat{font-size:10px;opacity:.6}
.inv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px}
.inv-card{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:10px;text-align:center;cursor:pointer;transition:all .15s}
.inv-card:hover{border-color:var(--p1)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:20000;align-items:center;justify-content:center;padding:12px}
.modal-overlay.open{display:flex;animation:fadeIn .2s}
.modal-box{background:var(--card);border-radius:16px;padding:20px;width:100%;max-width:600px;max-height:90dvh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.25)}
.modal-h{font-size:16px;font-weight:700;margin-bottom:14px;color:var(--fg)}
.form-row{margin-bottom:10px}
.form-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
#toasts{position:fixed;top:14px;right:14px;z-index:40000;max-width:calc(100% - 28px);pointer-events:none}
.toast{background:var(--card);border:1px solid var(--border);border-left:4px solid var(--p1);padding:10px 16px;border-radius:10px;margin-bottom:6px;font-size:12px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.15);animation:slideIn .25s ease;color:var(--fg)}
.toast.success{border-left-color:#10b981}
.toast.error{border-left-color:#ef4444}
.toast.warning{border-left-color:#f59e0b}
.toast.socket{border-left-color:#8b5cf6}
.role-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
@media(min-width:480px){.role-grid{grid-template-columns:repeat(4,1fr)}}
.role-card{background:var(--card2);border:1.5px solid var(--border);border-radius:12px;padding:14px;text-align:center;cursor:pointer;transition:all .15s;font-family:inherit}
.role-card:hover{border-color:var(--p1);background:var(--p1);color:#fff;transform:translateY(-2px)}
.role-icon{font-size:28px;margin-bottom:6px}
.role-name{font-size:12px;font-weight:600}
.stars span{font-size:22px;cursor:pointer;transition:color .1s}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{transform:translateX(120px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none!important}
.divider{border:none;border-top:1px solid var(--border);margin:12px 0}
.low-stock{color:#ef4444;font-weight:700}
.page-wrap{max-width:1200px;margin:0 auto;padding:12px}
.sync-spin{animation:spin 1s linear infinite;display:inline-block}
.conn-bar{background:var(--p1);height:2px;position:fixed;top:0;left:0;z-index:99998;transition:width .3s}
@media(max-width:600px){
.login-card{padding:18px}
.guest-nav{grid-template-columns:repeat(3,1fr)}
.form-2{grid-template-columns:1fr}
.page-wrap{padding:8px}
.tb-btn{padding:4px 6px;font-size:9px;min-width:26px}
#toolbar{gap:3px;padding:6px 4px}
body{padding-bottom:70px}
}
[dir="rtl"] .req-card{border-left:none;border-right:4px solid var(--p1)}
[dir="rtl"] .req-card.emergency{border-right-color:#ef4444}
[lang="ar"]{font-family:'Noto Naskh Arabic','DM Sans',sans-serif}
[lang="hi"]{font-family:'Noto Sans Devanagari','DM Sans',sans-serif}
.weather-card{background:linear-gradient(135deg,#60a5fa,#3b82f6);color:#fff;border-radius:12px;padding:12px;text-align:center}
.weather-icon{font-size:32px;margin-bottom:4px}
.weather-temp{font-size:24px;font-weight:700}
.weather-desc{font-size:11px;opacity:.9}
.quick-action{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center;cursor:pointer;transition:all .15s}
.quick-action:hover{border-color:var(--p1);transform:translateY(-2px)}
.quick-icon{font-size:20px;margin-bottom:4px}
.quick-label{font-size:10px;font-weight:600}
.currency-card{background:var(--card2);border-radius:10px;padding:10px}
.currency-row{display:flex;justify-content:space-between;padding:4px 0;font-size:11px}
.analytics-mini{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.analytics-item{background:var(--card2);border-radius:8px;padding:8px;text-align:center}
.analytics-val{font-size:16px;font-weight:700;color:var(--p1)}
.analytics-lbl{font-size:9px;opacity:.7}
.reply-box{background:var(--card2);border-radius:8px;padding:8px;margin-top:6px}
.reply-input{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:6px;background:var(--input-bg);color:var(--fg);font-size:11px}
.admin-reply{background:var(--card2);border-radius:8px;padding:8px;margin-top:6px;border:1px dashed var(--p1)}
.admin-reply-input{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:6px;background:var(--input-bg);color:var(--fg);font-size:11px;min-height:40px;resize:vertical}
</style>
</head>
<body>
<div id="netBadge">🟢 Online</div>
<div id="sockStatus"><span class="sock-dot connecting" id="sockDot"></span><span id="sockTxt">Connecting…</span></div>
<div id="toasts"></div>
<div class="conn-bar" id="connBar" style="width:0"></div>
<div id="toolbar">
<button class="tb-btn active" onclick="setLang('en')" id="lb-en">🇬🇧 EN</button>
<button class="tb-btn" onclick="setLang('hi')" id="lb-hi">🇮🇳 हि</button>
<button class="tb-btn" onclick="setLang('ar')" id="lb-ar">🇸🇦 ع</button>
<button class="tb-btn" onclick="toggleOnlineMode()" id="onlineBtn" title="Toggle Online/Offline">🟢 Online</button>
<button class="tb-btn" onclick="toggleContrast()" title="Contrast">🔆</button>
<button class="tb-btn" onclick="adjustFont(-1)" title="A-">A-</button>
<button class="tb-btn" onclick="adjustFont(0)" title="Reset">A</button>
<button class="tb-btn" onclick="adjustFont(1)" title="A+">A+</button>
<button class="tb-btn" onclick="toggleDark()" id="darkBtn">🌙</button>
<button class="tb-btn" onclick="toggleThemeDD()" title="Theme">🎨</button>
<span style="display:flex;align-items:center;gap:3px;background:rgba(255,255,255,.15);padding:3px 7px;border-radius:8px">
<span style="font-size:9px">☀</span>
<input type="range" class="tb-slider" id="brightSlider" min=".5" max="1.5" step=".05" value="1" oninput="setBrightness(this.value)">
</span>
<button class="tb-btn" onclick="reqNotif()" id="notifBtn">🔔</button>
<button class="tb-btn" onclick="haptic()">📳</button>
<button class="tb-btn" onclick="speak()">🔊</button>
</div>
<div id="themeDD">
<div style="font-size:10px;font-weight:700;margin-bottom:6px;color:var(--fg)" data-i18n="selectTheme">Theme</div>
<div style="display:flex;flex-wrap:wrap;gap:2px;justify-content:center">
<div class="th-dot active" style="background:linear-gradient(135deg,#6c63ff,#a78bfa)" onclick="setTheme('default')" title="Default"></div>
<div class="th-dot" style="background:linear-gradient(135deg,#f59e0b,#ef4444)" onclick="setTheme('sunset')" title="Sunset"></div>
<div class="th-dot" style="background:linear-gradient(135deg,#10b981,#059669)" onclick="setTheme('forest')" title="Forest"></div>

let socket=null;
function initSocket(){
try{
socket = io(SOCKET_URL, {
transports:['websocket','polling'],
auth:{hotelId:HID},
reconnectionDelay:1000,
reconnectionDelayMax:5000
});
socket.on('connect',()=>{
setSockStatus('connected');
updateNetBadge('online');
socket.emit('join_hotel', HID);
showToast('🔗 Connected','socket');
syncBack();
});
socket.on('disconnect',()=>{setSockStatus('disconnected');updateNetBadge('offline')});
socket.on('connect_error',()=>{setSockStatus('error');updateNetBadge('offline')});
socket.on('reconnecting',()=>{setSockStatus('connecting');updateNetBadge('reconnecting')});
socket.on('sync_all', (data)=>{
if(data.rooms) rooms=data.rooms;
if(data.guests) guests=data.guests;
if(data.food) food=data.food;
if(data.inventory) inventory=data.inventory;
if(data.requests) requests=data.requests;
if(data.blacklist) blacklist=data.blacklist;
if(data.maintenance) maintenance=data.maintenance;
if(data.reviews) reviews=data.reviews;
if(data.staff) staff=data.staff;
if(data.logs) logs=data.logs;
renderAll();
showToast('🔄 Data synced','socket');
});
socket.on('cfg_upd',(cfg)=>{
Object.assign(HotelCfg, cfg);
applyCfg();
showToast('⚙️ Config updated','socket');
});
socket.on('req_new',(req)=>{
if(!requests.find(r=>r._id===req._id)) requests.unshift(req);
renderRequests(); updateAdminStats();
if(currentUser?.type==='admin') showToast(`📋 New request: ${req.guestName}`,'socket');
});
socket.on('req_upd',(req)=>{
const idx = requests.findIndex(r=>r._id===req._id);
if(idx>-1) requests[idx]=req; else requests.unshift(req);
renderRequests(); updateGuestStats();
});
socket.on('room_upd',(room)=>{
const idx=rooms.findIndex(r=>r._id===room._id);
if(idx>-1) rooms[idx]=room; else rooms.push(room);
renderRooms(); updateAdminStats();
});
socket.on('inventory_upd',(item)=>{
const idx=inventory.findIndex(i=>i._id===item._id);
if(idx>-1) inventory[idx]=item; else inventory.push(item);
renderInventory(); renderGuestInv();
});
socket.on('review_new',(rev)=>{
if(!reviews.find(r=>r._id===rev._id)) reviews.unshift(rev);
renderReviews();
});
}catch(e){
console.warn('Socket unavailable, offline mode');
setSockStatus('error');
updateNetBadge('offline');
}
}
function setSockStatus(s){
const dot=document.getElementById('sockDot'), txt=document.getElementById('sockTxt');
const loginDot=document.getElementById('loginConnDot'), loginTxt=document.getElementById('loginConnTxt');
const map={connected:{cls:'connected',text:'Live'},disconnected:{cls:'error',text:'Offline'},connecting:{cls:'connecting',text:'…'},error:{cls:'error',text:'Offline'}};
const m=map[s]||map.disconnected;
[dot,loginDot].forEach(el=>{if(el){el.className='sock-dot '+m.cls}});
if(txt) txt.textContent=m.text;
if(loginTxt) loginTxt.textContent=m.text;
const sockEl=document.getElementById('sockStatus');
if(sockEl) sockEl.style.display=s==='connected'?'none':'flex';
}
function updateNetBadge(status){
const badge=document.getElementById('netBadge');
if(!badge) return;
badge.className='';
if(status==='online'){badge.classList.add('online');badge.textContent=t('online')}
else if(status==='offline'){badge.classList.add('offline');badge.textContent=t('offline')}
else if(status==='reconnecting'){badge.classList.add('reconnecting');badge.textContent=t('reconnecting')}
}
function toggleOnlineMode(){

btn.innerHTML='🟢 Online';btn.title='Click to go offline';

btn.innerHTML='📴 Offline';btn.title='Click to go online';
updateNetBadge('offline');
if(socket && socket.connected) socket.disconnect();
showToast('📴 Offline mode - using localStorage','warning');
}
}
async function apiCall(method, path, body=null){
if(!isOnline) return null;
const opts={method, headers:{'Content-Type':'application/json','x-hotel-id':HID}};
if(body) opts.body=JSON.stringify(body);
try{
const r=await fetch(API+path, opts);
if(!r.ok) throw new Error(r.statusText);
return r.json();
}catch(e){
console.warn('API error (using localStorage fallback):',e.message);
return null;
}
}
async function syncBack(){
if(!isOnline) return;
const [r,g,f,inv,req,bl,maint,rev,st,lg] = await Promise.all([
apiCall('GET','/rooms'),apiCall('GET','/guests'),apiCall('GET','/food'),
apiCall('GET','/inventory'),apiCall('GET','/requests'),apiCall('GET','/blacklist'),
apiCall('GET','/maintenance'),apiCall('GET','/reviews'),apiCall('GET','/staff'),apiCall('GET','/logs')
]);
if(r) rooms=r;if(g) guests=g;if(f) food=f;if(inv) inventory=inv;
if(req) requests=req;if(bl) blacklist=bl;if(maint) maintenance=maint;
if(rev) reviews=rev;if(st) staff=st;if(lg) logs=lg;
const cfg=await apiCall('GET','/config');
if(cfg) {Object.assign(HotelCfg,cfg); applyCfg();}
renderAll();
if(!rooms.length) loadLS();
}

function reqNotif(){
if(!('Notification' in window)){
showToast(t('notifNotSupported'),'error');
return;
}
if(Notification.permission === 'granted'){
showToast(t('notifGranted'),'success');
new Notification('Hotel OS',{body:'You will receive real-time updates'});
return;
}
if(Notification.permission === 'denied'){
showToast(t('notifDenied'),'warning');
return;
}
Notification.requestPermission().then(p=>{
notificationPermission=p;
if(p==='granted'){
showToast(t('notifGranted'),'success');
new Notification('Hotel OS',{body:'You will receive real-time updates'});
}else if(p==='denied'){
showToast(t('notifDenied'),'warning');
}else{
showToast(t('notifPending'),'warning');
}
});
}

function speak(){
if(!('speechSynthesis' in window)){showToast('🔊 Voice not supported','error');return}
const text={
en:'Welcome to Crown Plaza Hotel. How can I help you today?',
hi:'क्राउन प्लाज़ा होटल में आपका स्वागत है। आज मैं आपकी कैसे मदद कर सकता हूँ?',
ar:'مرحبا بك في فندق كراون بلازا. كيف يمكنني مساعدتك اليوم؟'
};
const utterance=new SpeechSynthesisUtterance(text[lang]||text.en);
utterance.lang=lang==='en'?'en-US':lang==='hi'?'hi-IN':'ar-SA';
utterance.rate=0.9;
if(voicesLoaded){
const voices=window.speechSynthesis.getVoices();
const preferred=voices.find(v=>v.lang.startsWith(utterance.lang));
if(preferred) utterance.voice=preferred;
}
window.speechSynthesis.cancel();
window.speechSynthesis.speak(utterance);
showToast('🔊 Speaking...','success');
}
if('speechSynthesis' in window){
window.speechSynthesis.onvoiceschanged=()=>{voicesLoaded=true;};
}

function updateAdminServices(){
const dept=document.getElementById('adminDept')?.value;
const sel=document.getElementById('adminService');if(!sel)return;
sel.innerHTML=`<option value="">${t('selectService')}</option>`;
if(dept&&SERVICES[dept]){
SERVICES[dept].forEach(svc=>{
const o=document.createElement('option');
o.value=svc.key;
o.textContent=svc[lang]||svc.en;
sel.appendChild(o);

function submitAdminReq(e){
e.preventDefault();
const dept=document.getElementById('adminDept')?.value;
const svc=document.getElementById('adminService')?.value;
const desc=document.getElementById('adminDesc')?.value||'';
if(!dept||!svc){showToast('Select department & service','error');return}
const req={_id:'req_'+Date.now(),guestName:'Admin',roomNumber:'N/A',department:dept,description:`${svc}: ${desc}`,priority:'normal',status:'open',createdAt:new Date().toISOString(),hotelId:HID};
requests.unshift(req);
save('requests',req,'req_new');
renderRequests();updateAdminStats();
e.target.reset();updateAdminServices();
showToast('✅ Admin request submitted!','success');
addLog('Admin Request',`${dept} - ${svc}`);
}
function sendAdminReply(reqId){
const input=document.getElementById(`adminReply-${reqId}`);
if(!input) return;
const reply=input.value.trim();
if(!reply){showToast('Enter a reply','error');return}
const req=requests.find(r=>r._id===reqId);
if(req){
req.adminReply=reply;
req.adminReplyTime=new Date().toISOString();
save('requests',req,'req_upd');
renderRequests();
showToast(t('replySent'),'success');
addLog('Admin Reply',`To ${req.guestName}: ${reply}`);
}
}
function sendReply(reqId){
const input=document.getElementById(`reply-${reqId}`);
if(!input) return;
const reply=input.value.trim();
if(!reply){showToast('Enter a reply','error');return}
const req=requests.find(r=>r._id===reqId);
if(req){
req.reply=reply;
req.replyTime=new Date().toISOString();
save('requests',req,'req_upd');
renderRequests();
showToast(t('replySent'),'success');
addLog('Reply Sent',`To ${req.guestName}: ${reply}`);
}
}

function initCharts(){
const dCtx=document.getElementById('deptChart');
const oCtx=document.getElementById('occChart');
if(deptChart){deptChart.destroy();deptChart=null}
if(occChart){occChart.destroy();occChart=null}
const opts={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}};
if(dCtx){
const byDept={};
requests.forEach(r=>{byDept[r.department]=(byDept[r.department]||0)+1});
const labels=Object.keys(byDept).length?Object.keys(byDept):['HK','Maint','Rest','IT','Laundry'];
const vals=Object.keys(byDept).length?Object.values(byDept):[8,5,6,3,4];
deptChart=new Chart(dCtx,{type:'doughnut',data:{labels,datasets:[{data:vals,backgroundColor:['#6c63ff','#a78bfa','#10b981','#f59e0b','#ef4444','#06b6d4']}]},options:opts});
}
if(oCtx){
const occupied=rooms.filter(r=>r.status==='Occupied').length;
const total=rooms.length||1;
occChart=new Chart(oCtx,{type:'bar',data:{labels:['W1','W2','W3','W4'],datasets:[{label:'%',data:[68,75,82,Math.round(occupied/total*100)],backgroundColor:'#6c63ff',borderRadius:6}]},options:{...opts,scales:{y:{beginAtZero:true,max:100,ticks:{color:'var(--fg)'},grid:{color:'var(--border)'}},x:{ticks:{color:'var(--fg)'},grid:{display:false}}}}});
}
}

function showGuestTab(id){
GUEST_TABS.forEach(tb=>{
const p=document.getElementById(`gp-${tb.id}`);
const b=document.getElementById(`gn-${tb.id}`);
if(p) p.classList.toggle('hidden',tb.id!==id);
if(b) b.classList.toggle('active',tb.id===id);
});
if(id==='foodTab') renderGuestFood();
if(id==='invTab') renderGuestInv();
if(id==='histTab') renderGuestHistory();
}
function updateServices(){
const dept=document.getElementById('gDept')?.value;
const sel=document.getElementById('gService');if(!sel)return;
sel.innerHTML=`<option value="">${t('selectService')}</option>`;
if(dept&&SERVICES[dept]){
SERVICES[dept].forEach(svc=>{
const o=document.createElement('option');
o.value=svc.key;
o.textContent=svc[lang]||svc.en;
sel.appendChild(o);
});
}
}
function submitGuestReq(e){
e.preventDefault();
const dept=document.getElementById('gDept')?.value;
const svc=document.getElementById('gService')?.value;
const prio=document.getElementById('gPriority')?.value||'normal';
const desc=document.getElementById('gDesc')?.value||'';
if(!dept||!svc){showToast('Select department & service','error');return}
const req={_id:'req_'+Date.now(),guestName:currentUser.name,roomNumber:currentUser.room,department:dept,description:`${svc}: ${desc}`,priority:prio,status:'open',createdAt:new Date().toISOString(),hotelId:HID};
requests.unshift(req);
save('requests',req,'req_new');
renderRequests();updateGuestStats();renderGuestHistory();
e.target.reset();updateServices();
showToast('✅ Request submitted!','success');
addLog('New Request',`${currentUser.name} - ${dept}`);
if(prio==='emergency') showToast('🚨 Emergency alert sent to staff!','error');
}

function updateGuestStats(){
if(!currentUser)return;
const myReqs=requests.filter(r=>r.guestName===currentUser.name);
const el=id=>document.getElementById(id);
if(el('gTotReq'))el('gTotReq').textContent=myReqs.length;
if(el('gPendReq'))el('gPendReq').textContent=myReqs.filter(r=>r.status!=='completed').length;
if(el('gDoneReq'))el('gDoneReq').textContent=myReqs.filter(r=>r.status==='completed').length;
const guestRec=guests.find(g=>g.name===currentUser.name);
const pts=guestRec?.points||currentUser.points||0;
const pEl=el('gPts'),pdEl=el('gPtsDisplay');
if(pEl)pEl.textContent=`⭐ ${pts} pts`;
if(pdEl)pdEl.textContent=pts;
}
function addToCart(id,name,price){
cart.push({id,name,price});
const cartEl=document.getElementById('cartItems');
const totEl=document.getElementById('cartTotal');
if(cartEl){
const tot=cart.reduce((s,i)=>s+i.price,0);
if(totEl)totEl.textContent=`${HotelCfg.currency}${tot}`;
cartEl.innerHTML=cart.map(i=>`<div style="display:flex;justify-content:space-between;padding:2px 0"><span>${i.name}</span><span>${HotelCfg.currency}${i.price}</span></div>`).join('');
}
showToast(`${name} added to cart 🛒`,'success');
}
function placeOrder(){
if(!cart.length){showToast('Cart is empty','error');return}
const req={_id:'req_'+Date.now(),guestName:currentUser.name,roomNumber:currentUser.room,department:'Restaurant',description:`Food: ${cart.map(i=>i.name).join(', ')}`,priority:'normal',status:'open',createdAt:new Date().toISOString(),hotelId:HID};
requests.unshift(req);save('requests',req,'req_new');
cart=[];
const cEl=document.getElementById('cartItems'),tEl=document.getElementById('cartTotal');
if(cEl)cEl.innerHTML='';if(tEl)tEl.textContent=`${HotelCfg.currency}0`;
renderRequests();updateGuestStats();renderGuestHistory();
showToast('🍽️ Order placed! Arriving soon.','success');
}
function reqInvItem(name){
const req={_id:'req_'+Date.now(),guestName:currentUser.name,roomNumber:currentUser.room,department:'Housekeeping',description:`Item Request: ${name}`,priority:'normal',status:'open',createdAt:new Date().toISOString(),hotelId:HID};
requests.unshift(req);save('requests',req,'req_new');
renderRequests();updateGuestStats();
showToast(`📦 ${name} requested — 10 min delivery`,'success');
}
function bookCab(e){
e.preventDefault();
const type=document.getElementById('cabType')?.value;
const time=document.getElementById('cabTime')?.value;
const price=type==='airport'?HotelCfg.airportPrice:HotelCfg.localPrice;
const req={_id:'req_'+Date.now(),guestName:currentUser.name,roomNumber:currentUser.room,department:'Transport',description:`${type==='airport'?'Airport Transfer':'Local Cab'} at ${time||'ASAP'} — ${HotelCfg.currency}${price}`,priority:'normal',status:'open',createdAt:new Date().toISOString(),hotelId:HID};
requests.unshift(req);save('requests',req,'req_new');
renderRequests();updateGuestStats();
e.target.reset();
showToast('🚗 Cab booked!','success');
}

function adjStock(id,delta){const i=inventory.find(x=>x._id===id);if(i){i.stock=Math.max(0,i.stock+delta);save('inventory',i,'inventory_upd');renderInventory();renderGuestInv();if(i.stock<=i.min)showToast('⚠️ Low stock: '+i.name,'warning')}}
function delInv(id){if(confirm('Delete?')){inventory=inventory.filter(i=>i._id!==id);save('inventory',inventory);renderInventory();renderGuestInv()}}

function updMaint(i,s){maintenance[i].status=s;save('maintenance',maintenance);renderMaintenance();showToast('Updated','success')}
function delMaint(i){if(confirm('Delete?')){maintenance.splice(i,1);save('maintenance',maintenance);renderMaintenance()}}
function addPts(id,pts){const g=guests.find(x=>x._id===id);if(g){g.points=(g.points||0)+pts;save('guests',guests);renderLoyalty();showToast(`+${pts} pts`,'success')}}
function redeemPts(id,pts){const g=guests.find(x=>x._id===id);if(g&&(g.points||0)>=pts){g.points-=pts;save('guests',guests);renderLoyalty();showToast(`${pts} pts redeemed`,'success')}else showToast('Not enough points','error')}
function rateStaff(i){staff[i].rating=parseFloat(Math.min(5,staff[i].rating+0.1).toFixed(1));staff[i].tasks=(staff[i].tasks||0)+1;save('staff',staff);renderStaff();showToast('Rating updated','success')}
function delStaff(i){if(confirm('Remove?')){staff.splice(i,1);save('staff',staff);renderStaff()}}
function addStaff(){

staff.push({_id:'s_'+Date.now(),name:n,role:r,rating:5.0,tasks:0,status:'on-duty'});

}

function genReport(){
const t=document.getElementById('rptType')?.value;
const out=document.getElementById('rptOut');if(!out)return;
let html='';
if(t==='occupancy'){const occ=rooms.filter(r=>r.status==='Occupied').length,tot=rooms.length||1;html=`<p>🏨 Total: <b>${tot}</b></p><p>🟢 Occupied: <b>${occ}</b> (${Math.round(occ/tot*100)}%)</p><p>🔴 Vacant: <b>${tot-occ}</b></p>`}
else if(t==='revenue'){const fr=requests.filter(r=>r.department==='Restaurant').length*15;html=`<p>🍽️ Food Revenue: <b>${HotelCfg.currency}${fr}</b></p><p>💰 Rooms: <b>${HotelCfg.currency}${rooms.filter(r=>r.status==='Occupied').length*100}</b></p>`}
else if(t==='requests'){const bd={};requests.forEach(r=>{bd[r.department]=(bd[r.department]||0)+1});html=Object.entries(bd).map(([d,c])=>`<p>📋 ${d}: <b>${c}</b></p>`).join('')||'<p>No data</p>'}
else{html=`<p>👥 Total: <b>${guests.length}</b></p><p>✅ Active: <b>${guests.filter(g=>g.status==='active').length}</b></p><p>🚫 Blocked: <b>${guests.filter(g=>g.status==='blocked').length}</b></p>`}
out.innerHTML=html;
}

function saveCfg(field){
if(field==='name') HotelCfg.name=document.getElementById('cfgName')?.value||HotelCfg.name;
else if(field==='currency') HotelCfg.currency=document.getElementById('cfgCurrency')?.value||HotelCfg.currency;
else if(field==='wifi') HotelCfg.wifi=document.getElementById('cfgWifi')?.value||HotelCfg.wifi;
else if(field==='transport'){HotelCfg.airportPrice=parseInt(document.getElementById('cfgAirport')?.value)||30}
saveLS();
if(isOnline){apiCall('PUT','/config',HotelCfg);if(socket?.connected) socket.emit('cfg_upd',{hotelId:HID,...HotelCfg})}
applyCfg();
showToast('⚙️ Settings saved & synced','success');
addLog('Config Update',field);
}

showToast('QR codes generated!','success');
}

<div class="modal-h" data-i18n="addTask">Add Task</div>
<form onsubmit="addMaint(event)">
<div class="form-row"><label class="lbl" data-i18n="task">Task</label><input class="inp" id="mMTask" required></div>
<div class="form-row"><label class="lbl" data-i18n="area">Room/Area</label><input class="inp" id="mMRoom"></div>
<div class="form-row"><label class="lbl" data-i18n="scheduled">Scheduled</label><input class="inp" id="mMDate" type="datetime-local" required></div>
<div class="form-2">
<div class="form-row"><label class="lbl" data-i18n="assigned">Assigned To</label><input class="inp" id="mMAssigned"></div>
<div class="form-row"><label class="lbl" data-i18n="priority">Priority</label>
<select class="inp" id="mMPrio"><option value="low">🟢 Low</option><option value="medium" selected>🟡 Medium</option><option value="high">🔴 High</option></select></div>
</div>
<div style="display:flex;gap:8px;margin-top:14px">
<button class="btn-primary" style="flex:1" type="submit" data-i18n="save">Save</button>
<button class="btn-ghost" style="flex:1" type="button" onclick="closeModal('maintModal')" data-i18n="cancel">Cancel</button>
</div>
</form>
</div>
</div>
<div class="modal-overlay" id="ratingModal">
<div class="modal-box">
<div class="modal-h" data-i18n="rateStay">⭐ Rate Your Stay</div>
<div style="margin-bottom:10px"><label class="lbl" data-i18n="overall">Overall</label><div class="stars" id="starOverall"></div></div>
<div style="margin-bottom:10px"><label class="lbl" data-i18n="service">Service</label><div class="stars" id="starService"></div></div>
<div style="margin-bottom:10px"><label class="lbl" data-i18n="cleanliness">Cleanliness</label><div class="stars" id="starClean"></div></div>
<div class="form-row"><textarea class="inp" id="ratingComment" rows="2" data-i18n-ph="shareExp" placeholder="Share your experience…"></textarea></div>
<button class="btn-primary" style="width:100%;padding:10px;margin-top:8px" onclick="submitRating()" data-i18n="submitReview">Submit Review</button>
</div>
</div>
<div class="modal-overlay" id="infoModal">
<div class="modal-box">
<div class="modal-h" id="infoModalTitle">Info</div>
<div id="infoModalBody" style="font-size:13px;line-height:1.8"></div>
<button class="btn-ghost" style="width:100%;margin-top:14px" onclick="closeModal('infoModal')" data-i18n="cancel">Close</button>
</div>
</div>`;
}
function openModal(id){document.getElementById(id)?.classList.add('open')}
function closeModal(id){document.getElementById(id)?.classList.remove('open')}
function addRoom(e){
e.preventDefault();
const room={_id:'r_'+Date.now(),number:document.getElementById('mRoomNum').value,type:document.getElementById('mRoomType').value,price:parseFloat(document.getElementById('mRoomPrice').value),status:document.getElementById('mRoomStatus').value,guestName:'',hotelId:HID};
rooms.push(room);save('rooms',room,'room_upd');closeModal('roomModal');renderRooms();updateAdminStats();showToast('Room added','success');addLog('Add Room','#'+room.number);
}
function addGuest(e){
e.preventDefault();
const guest={_id:'g_'+Date.now(),name:document.getElementById('mGName').value,room:document.getElementById('mGRoom').value,points:parseInt(document.getElementById('mGPts').value)||0,status:document.getElementById('mGStatus').value,checkin:document.getElementById('mGCheckin').value,hotelId:HID};
guests.push(guest);save('guests',guests);closeModal('guestModal');renderGuests();renderLoyalty();showToast('Guest added','success');
}
function addDish(e){
e.preventDefault();
const dish={_id:'f_'+Date.now(),name:document.getElementById('mFName').value,price:parseFloat(document.getElementById('mFPrice').value),category:document.getElementById('mFCat').value,emoji:document.getElementById('mFEmoji').value||'🍽️',hotelId:HID};
food.push(dish);save('food',food);closeModal('foodModal');renderFood();renderGuestFood();showToast('Dish added','success');
}
function addInvItem(e){
e.preventDefault();
const item={_id:'i_'+Date.now(),name:document.getElementById('mIName').value,category:document.getElementById('mICat').value,stock:parseInt(document.getElementById('mIQty').value),unit:document.getElementById('mIUnit').value||'pcs',min:parseInt(document.getElementById('mIMin').value)||10,hotelId:HID};
inventory.push(item);save('inventory',item,'inventory_upd');closeModal('inventoryModal');renderInventory();renderGuestInv();showToast('Item added','success');
}
function addToBlacklist(e){
e.preventDefault();
const entry={_id:'bl_'+Date.now(),name:document.getElementById('mBName').value,room:document.getElementById('mBRoom').value,reason:document.getElementById('mBReason').value,date:new Date().toISOString(),hotelId:HID};
blacklist.push(entry);save('blacklist',blacklist);closeModal('blacklistModal');renderBlacklist();showToast('Guest blocked','error');addLog('Blacklist',entry.name);
}
function addMaint(e){
e.preventDefault();
const task={_id:'m_'+Date.now(),task:document.getElementById('mMTask').value,room:document.getElementById('mMRoom').value,scheduled:document.getElementById('mMDate').value,assigned:document.getElementById('mMAssigned').value,priority:document.getElementById('mMPrio').value,status:'pending',hotelId:HID};
maintenance.push(task);save('maintenance',maintenance);closeModal('maintModal');renderMaintenance();showToast('Task scheduled','success');
}
function openRatingModal(){
openModal('ratingModal');
['Overall','Service','Clean'].forEach(type=>{
const el=document.getElementById('star'+type);if(!el)return;
el.innerHTML=[1,2,3,4,5].map(i=>`<span onclick="setStar('${type.toLowerCase()}',${i})" style="font-size:24px;cursor:pointer;transition:transform .1s">☆</span>`).join('');
});
}
function setStar(type,val){
const map={overall:'Overall',service:'Service',clean:'Clean'};
const el=document.getElementById('star'+map[type]);if(!el)return;
[...el.children].forEach((s,i)=>{s.textContent=i<val?'★':'☆';s.style.color=i<val?'#f59e0b':'var(--fg)'});
ratingData[type]=val;
}
function submitRating(){
if(!ratingData.overall){showToast('Please select a rating','error');return}
const rev={_id:'rev_'+Date.now(),guest:currentUser.name,room:currentUser.room,overall:ratingData.overall,service:ratingData.service||0,cleanliness:ratingData.clean||0,recommend:ratingData.overall>=3,comment:document.getElementById('ratingComment')?.value||'',date:new Date().toISOString(),hotelId:HID};
reviews.unshift(rev);save('reviews',rev,'review_new');closeModal('ratingModal');renderReviews();showToast('⭐ Thank you for rating!','success');ratingData={overall:0,service:0,clean:0};
}
function infoModal(title,body){
document.getElementById('infoModalTitle').textContent=title;
document.getElementById('infoModalBody').innerHTML=body;
openModal('infoModal');
}
function showConcierge(){
infoModal('🤖 Concierge',`
<details style="background:var(--card2);border-radius:8px;padding:8px;margin-bottom:6px"><summary style="cursor:pointer;font-weight:600">WiFi password?</summary><p style="margin-top:4px;font-family:'DM Mono',monospace">${HotelCfg.wifi}</p></details>
<details style="background:var(--card2);border-radius:8px;padding:8px;margin-bottom:6px"><summary style="cursor:pointer;font-weight:600">Checkout time?</summary><p style="margin-top:4px">11:00 AM</p></details>
<details style="background:var(--card2);border-radius:8px;padding:8px"><summary style="cursor:pointer;font-weight:600">How to raise a request?</summary><p style="margin-top:4px">Go to the Request tab and select your department.</p></details>`);
}
document.addEventListener('click',e=>{
if(e.target.classList.contains('modal-overlay')) e.target.classList.remove('open');
if(!e.target.closest('#themeDD')&&!e.target.closest('[onclick*="toggleThemeDD"]')) document.getElementById('themeDD')?.classList.remove('show');
});
document.addEventListener('keydown',e=>{
if(e.key==='Escape') document.querySelectorAll('.modal-overlay.open').forEach(m=>m.classList.remove('open'));
});
window.addEventListener('online',()=>{
if(!isOnline) return;
updateNetBadge('online');
if(socket) socket.connect();
showToast('🌐 Back online','success');
});
window.addEventListener('offline',()=>{
updateNetBadge('offline');
showToast('📴 Offline mode','warning');
});
function quickCheckin(){showToast('🚀 Quick Check-in opened','success');openModal('guestModal')}
function quickCheckout(){showToast('🚪 Quick Checkout opened','success')}
function newAdminRequest(){showAdminTab('requests');showToast('📝 New Request form opened','success')}
function viewAdminReports(){showAdminTab('reports');showToast('📈 Reports opened','success')}
function init(){
loadUIPrefs();
buildModals();
buildGuestPanes();
buildRolePage();
setLang(lang);
loadLS();
tickClock();
initSocket();
checkSession();
renderAll();
const onlineBtn=document.getElementById('onlineBtn');
if(onlineBtn) onlineBtn.textContent=isOnline?t('online'):t('offline');
setInterval(saveLS, 15000);
}
init();
</script>
</body>
</html>
