<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<title>Crown Plaza — Hotel OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700&family=Noto+Naskh+Arabic:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="/socket.io/socket.io.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{margin:0;padding:0;margin:0;padding:0;
font-family:'DM Sans','Noto Sans Devanagari','Noto Naskh Arabic',system-ui,sans-serif;
background:var(--bg);color:var(--fg);
min-height:100dvh;width:100vw;overflow-x:hidden;
padding-bottom:70px;transition:background .25s,color .25s,filter .2s;
font-size:16px;line-height:1.5;margin:0;padding:0;
}
:root{
--p1:#6c63ff;--p2:#a78bfa;--p3:#7c3aed;
--bg:#f4f3ff;--fg:#1e1b4b;--card:#fff;--card2:#f8f7ff;
--border:#e0deff;--shadow:0 2px 16px rgba(108,99,255,.10);
--header:linear-gradient(135deg,#6c63ff,#a78bfa);
--toolbar-bg:rgba(108,99,255,.97);
--input-bg:#fff;--input-border:#c4bfff;
--badge-open:#fef3c7;--badge-open-c:#92400e;
--badge-done:#d1fae5;--badge-done-c:#065f46;
--badge-pend:#dbeafe;--badge-pend-c:#1e40af;
--badge-blk:#fee2e2;--badge-blk-c:#991b1b;--r:14px;
}
body.dark{
--bg:#0f0e17;--fg:#fffffe;--card:#1a1a2e;--card2:#16213e;
--border:#2a2a4a;--shadow:0 2px 20px rgba(0,0,0,.4);
--input-bg:#1a1a2e;--input-border:#3a3a6a;
--badge-open:#7c5100;--badge-open-c:#fef3c7;
--badge-done:#065f46;--badge-done-c:#d1fae5;
--badge-pend:#1e3a6a;--badge-pend-c:#dbeafe;
--badge-blk:#7f1d1d;--badge-blk-c:#fee2e2;
}
body.theme-sunset{--p1:#f59e0b;--p2:#ef4444;--p3:#b45309;--header:linear-gradient(135deg,#f59e0b,#ef4444);--toolbar-bg:rgba(245,158,11,.97)}
body.theme-forest{--p1:#10b981;--p2:#34d399;--p3:#059669;--header:linear-gradient(135deg,#10b981,#059669);--toolbar-bg:rgba(16,185,129,.97)}
body.theme-ocean{--p1:#06b6d4;--p2:#3b82f6;--p3:#0e7490;--header:linear-gradient(135deg,#06b6d4,#3b82f6);--toolbar-bg:rgba(6,182,212,.97)}
body.theme-royal{--p1:#ec4899;--p2:#8b5cf6;--p3:#be185d;--header:linear-gradient(135deg,#ec4899,#8b5cf6);--toolbar-bg:rgba(236,72,153,.97)}
body.high-contrast{filter:contrast(1.4) saturate(1.3)}
#toolbar{width:100%!important;left:0!important;right:0!important;margin:0!important;
position:fixed!important;bottom:0!important;left:0!important;right:0!important;
width:100vw!important;background:var(--toolbar-bg)!important;
backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
border-top:none!important;padding:18px 14px!important;
display:flex!important;flex-wrap:wrap;justify-content:center;align-items:center;
gap:4px;z-index:99999!important;box-shadow:0 -4px 24px rgba(0,0,0,.18)!important;
transform:translateZ(0)!important;will-change:auto!important;contain:layout style;
}
@media(max-width:640px){
#toolbar{width:100%!important;left:0!important;right:0!important;margin:0!important}
}
@supports(padding-bottom:env(safe-area-inset-bottom)){
#toolbar{padding-bottom:calc(18px + env(safe-area-inset-bottom))!important}
body{margin:0;padding:0;margin:0;padding:0;padding-bottom:calc(70px + env(safe-area-inset-bottom))}
}
.tb-btn{
flex: 1 1 auto;
text-align: center;
padding:10px 14px;border-radius:8px;border:none;
background:rgba(255,255,255,.2);color:#fff;font-size:13px;font-weight:600;
cursor:pointer;white-space:nowrap;min-width:32px;transition:background .15s,transform .1s;
font-family:inherit;
}
.tb-btn:hover{background:rgba(255,255,255,.35);transform:translateY(-1px)}
.tb-btn.active{background:rgba(255,255,255,.45);box-shadow:0 2px 8px rgba(0,0,0,.2)}
.tb-slider{width:60px;height:5px;-webkit-appearance:none;appearance:none;background:rgba(255,255,255,.35);border-radius:2px;cursor:pointer}
.tb-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:#fff;border-radius:50%}
#themeDD{
position:fixed;bottom:96px;right:12px;background:var(--card);
border:1px solid var(--border);padding:10px;border-radius:12px;
box-shadow:0 8px 32px rgba(0,0,0,.2);z-index:100000;display:none;min-width:160px;
}
#themeDD.show{display:block}
.th-dot{width:30px;height:30px;border-radius:50%;cursor:pointer;border:2px solid transparent;display:inline-block;margin:2px;transition:transform .15s,border-color .15s}
.th-dot:hover,.th-dot.active{transform:scale(1.1);border-color:var(--p1)}
#netBadge{
position:fixed;top:10px;right:10px;z-index:50000;
padding:4px 12px;border-radius:20px;font-size:10px;font-weight:700;
pointer-events:none;display:none;transition:all .2s;
}
#netBadge.online{display:block;background:#10b981;color:#fff;box-shadow:0 2px 8px rgba(16,185,129,.3)}
#netBadge.offline{display:block;background:#ef4444;color:#fff;box-shadow:0 2px 8px rgba(239,68,68,.3)}
#netBadge.reconnecting{display:block;background:#f59e0b;color:#fff;animation:pulse 1.5s infinite}
#netBadge.queued{display:block;background:#f59e0b;color:#fff;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
#sockStatus{
position:fixed;bottom:106px;left:8px;z-index:10000;
background:var(--card);border:1px solid var(--border);
border-radius:20px;padding:3px 8px;font-size:10px;font-weight:600;
display:flex;align-items:center;gap:4px;box-shadow:var(--shadow);
}
.sock-dot{width:7px;height:7px;border-radius:50%;background:#9ca3af}
.sock-dot.connected{background:#10b981;animation:pulse 2s infinite}
.sock-dot.connecting{background:#f59e0b;animation:blink .8s infinite}
.sock-dot.error{background:#ef4444}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}
.card-sm{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;box-shadow:var(--shadow)}
.btn-primary{background:var(--header);color:#fff;border:none;border-radius:10px;padding:10px 20px;font-weight:600;cursor:pointer;font-size:14px;font-family:inherit;transition:opacity .15s,transform .1s}
.btn-primary:hover{opacity:.88;transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--p1);border:1.5px solid var(--p1);border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;font-family:inherit;transition:background .15s}
.btn-ghost:hover{background:var(--p1);color:#fff}
.inp{width:100%;padding:12px 14px;border:1.5px solid var(--input-border);border-radius:10px;background:var(--input-bg);color:var(--fg);font-size:14px;font-family:inherit;outline:none;transition:border-color .15s}
.inp::placeholder{color:#9ca3af;opacity:1}
.inp:focus{border-color:var(--p1);box-shadow:0 0 0 3px rgba(108,99,255,.12)}
select.inp{cursor:pointer}
.lbl{font-size:13px;font-weight:600;color:var(--p1);margin-bottom:4px;display:block;text-transform:uppercase;letter-spacing:.5px}
.badge{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;display:inline-flex;align-items:center;gap:3px}
.badge-open{background:var(--badge-open);color:var(--badge-open-c)}
.badge-completed{background:var(--badge-done);color:var(--badge-done-c)}
.badge-pending{background:var(--badge-pend);color:var(--badge-pend-c)}
.badge-blocked{background:var(--badge-blk);color:var(--badge-blk-c)}
.badge-active{background:var(--badge-done);color:var(--badge-done-c)}
.badge-in_progress{background:var(--badge-pend);color:var(--badge-pend-c)}
.req-card{background:var(--card);border-radius:10px;padding:12px;margin-bottom:8px;border-left:4px solid var(--p1);box-shadow:var(--shadow)}
.req-card.emergency{border-left-color:#ef4444;background:rgba(239,68,68,.05)}
.header{background:var(--header);color:#fff;padding:12px 14px;display:flex;justify-content:center;align-items:center;flex-wrap:wrap;gap:4px;position:sticky;top:0;z-index:1000;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.header h1{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-right{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.clock-badge{background:rgba(255,255,255,.2);padding:3px 8px;border-radius:20px;font-size:10px;font-family:'DM Mono',monospace;white-space:nowrap}
.logout-btn{background:rgba(255,255,255,.2);border:none;color:#fff;padding:4px 10px;border-radius:8px;cursor:pointer;font-size:13px;font-family:inherit;font-weight:600;transition:background .15s}
.logout-btn:hover{background:rgba(255,255,255,.35)}
.tabs-bar{background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto;white-space:nowrap;position:sticky;top:52px;z-index:900;scrollbar-width:none}
.tabs-bar::-webkit-scrollbar{display:none}
.tabs-bar-inner{display:inline-flex;padding:0 8px;gap:0;min-width:100%}
.tab-btn{padding:10px 14px;font-size:13px;font-weight:500;color:var(--fg);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .15s;opacity:.65}
.tab-btn.active{color:var(--p1);border-bottom-color:var(--p1);opacity:1;font-weight:700}
.tab-btn:hover{opacity:1}
.tab-pane{display:none}.tab-pane.active{display:block;animation:fadeUp .2s ease}
#loginPage{
min-height:100dvh;width:100vw;display:flex;flex-direction:column;align-items:center;justify-content:center;
background:var(--header);padding:0;margin:0;position:relative;
}
.login-card{
width:100%;max-width:100vw;background:var(--card);border-radius:0;
padding:24px;box-shadow:0 8px 40px rgba(0,0,0,.2);margin:0 auto;
position:relative;z-index:10;
}
@media(min-width:768px){
.login-card{width:95%;max-width:650px;border-radius:20px;padding:36px}
}
.login-card #toasts{
position:absolute;top:10px;right:10px;z-index:100;max-width:calc(100% - 20px);
}
.login-card #loginNetBadge{
position:absolute;top:10px;left:10px;z-index:100;
padding:4px 12px;border-radius:20px;font-size:10px;font-weight:700;
}
.login-card #loginNetBadge.online{background:#10b981;color:#fff}
.login-card #loginNetBadge.offline{background:#ef4444;color:#fff}
.login-card #loginNetBadge.reconnecting{background:#f59e0b;color:#fff;animation:pulse 1.5s infinite}
.login-card #loginNetBadge.queued{background:#f59e0b;color:#fff;animation:pulse 1.5s infinite}
.login-logo{font-size:48px;text-align:center;margin-bottom:8px;animation:float 3s ease-in-out infinite}
.login-h{font-size:24px;font-weight:700;color:var(--fg);text-align:center;margin-bottom:6px}
.login-sub{font-size:14px;color:var(--p2);text-align:center;margin-bottom:20px}
.login-tabs{display:flex;gap:10px;margin-bottom:20px}
.login-tab{flex:1;padding:12px;border-radius:12px;border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;background:var(--card2);color:var(--fg);border:1.5px solid var(--border);transition:all .15s}
.login-tab.active{background:var(--p1);color:#fff;border-color:var(--p1)}
.conn-status{display:flex;align-items:center;gap:6px;font-size:13px;padding:6px 12px;border-radius:20px;background:var(--card2);margin-bottom:14px;justify-content:center}
.conn-dot{width:8px;height:8px;border-radius:50%;background:#9ca3af}
.conn-dot.connected{background:#10b981;animation:pulse 2s infinite}
.conn-dot.connecting{background:#f59e0b;animation:blink .8s infinite}
.conn-dot.error{background:#ef4444}
.login-clock{font-size:13px;color:var(--fg);opacity:.7;text-align:center;margin-top:10px;font-family:'DM Mono',monospace}
.guest-nav{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:12px}
.gnav-btn{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:10px 6px;text-align:center;cursor:pointer;transition:all .15s;font-size:12px;font-weight:600;color:var(--fg);font-family:inherit}
.gnav-btn:hover,.gnav-btn.active{background:var(--p1);color:#fff;border-color:var(--p1)}
.gnav-icon{font-size:18px;display:block;margin-bottom:2px}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:12px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center;box-shadow:var(--shadow)}
.stat-val{font-size:24px;font-weight:700;color:var(--p1)}
.stat-lbl{font-size:12px;color:var(--fg);opacity:.6;margin-top:2px}
.tbl-wrap{overflow-x:auto;border-radius:8px}
.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl th{background:var(--card2);padding:8px 10px;text-align:left;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--p1);border-bottom:1px solid var(--border)}
.tbl td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--card2)}
.tbl-action{background:none;border:none;cursor:pointer;font-size:13px;padding:2px 4px;border-radius:4px;transition:background .1s}
.tbl-action:hover{background:var(--border)}
[dir="rtl"] .tbl th,[dir="rtl"] .tbl td{text-align:right}
.food-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
.food-card{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:10px;cursor:pointer;transition:all .15s;text-align:center}
.food-card:hover{border-color:var(--p1);transform:translateY(-2px);box-shadow:0 4px 16px rgba(108,99,255,.15)}
.food-emoji{font-size:24px;margin-bottom:4px}
.food-name{font-size:12px;font-weight:600;color:var(--fg)}
.food-price{font-size:13px;font-weight:700;color:var(--p1)}
.food-cat{font-size:10px;opacity:.6}
.inv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px}
.inv-card{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:10px;text-align:center;cursor:pointer;transition:all .15s}
.inv-card:hover{border-color:var(--p1)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:20000;align-items:center;justify-content:center;padding:12px}
.modal-overlay.open{display:flex;animation:fadeIn .2s}
.modal-box{background:var(--card);border-radius:16px;padding:20px;width:100%;max-width:480px;max-height:90dvh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.25)}
.modal-h{font-size:16px;font-weight:700;margin-bottom:14px;color:var(--fg)}
.form-row{margin-bottom:10px}
.form-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
#toasts{position:fixed;top:14px;right:14px;z-index:40000;max-width:calc(100% - 28px);pointer-events:none}
.toast{background:var(--card);border:1px solid var(--border);border-left:4px solid var(--p1);padding:10px 16px;border-radius:10px;margin-bottom:6px;font-size:12px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.15);animation:slideIn .25s ease;color:var(--fg)}
.toast.success{border-left-color:#10b981}
.toast.error{border-left-color:#ef4444}
.toast.warning{border-left-color:#f59e0b}
.toast.socket{border-left-color:#8b5cf6}
.role-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
@media(min-width:480px){.role-grid{grid-template-columns:repeat(4,1fr)}}
.role-card{background:var(--card2);border:1.5px solid var(--border);border-radius:12px;padding:14px;text-align:center;cursor:pointer;transition:all .15s;font-family:inherit}
.role-card:hover{border-color:var(--p1);background:var(--p1);color:#fff;transform:translateY(-2px)}
.role-icon{font-size:28px;margin-bottom:6px}
.role-name{font-size:12px;font-weight:600}
.stars span{font-size:22px;cursor:pointer;transition:color .1s}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideIn{from{transform:translateX(120px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none!important}
.divider{border:none;border-top:1px solid var(--border);margin:12px 0}
.low-stock{color:#ef4444;font-weight:700}
.page-wrap{max-width:1200px;margin:0 auto;padding:12px}
.sync-spin{animation:spin 1s linear infinite;display:inline-block}
.conn-bar{background:var(--p1);height:2px;position:fixed;top:0;left:0;z-index:99998;transition:width .3s}
@media(max-width:480px){
.login-card{padding:24px}
.guest-nav{grid-template-columns:repeat(3,1fr)}
.form-2{grid-template-columns:1fr}
.page-wrap{padding:8px}
.tb-btn{padding:4px 6px;font-size:9px;min-width:26px}
flex: 1 1 auto;
text-align: center;
#toolbar{gap:3px;padding:12px 8px!important}
body{margin:0;padding:0;margin:0;padding:0;padding-bottom:70px}
}
[dir="rtl"] .req-card{border-left:none;border-right:4px solid var(--p1)}
[dir="rtl"] .req-card.emergency{border-right-color:#ef4444}
[lang="ar"]{font-family:'Noto Naskh Arabic','DM Sans',sans-serif}
[lang="hi"]{font-family:'Noto Sans Devanagari','DM Sans',sans-serif}
.weather-card{background:linear-gradient(135deg,#60a5fa,#3b82f6);color:#fff;border-radius:12px;padding:12px;text-align:center}
.weather-icon{font-size:32px;margin-bottom:4px}
.weather-temp{font-size:24px;font-weight:700}
.weather-desc{font-size:13px;opacity:.9}
.quick-action{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center;cursor:pointer;transition:all .15s}
.quick-action:hover{border-color:var(--p1);transform:translateY(-2px)}
.quick-icon{font-size:20px;margin-bottom:4px}
.quick-label{font-size:10px;font-weight:600}
.currency-card{background:var(--card2);border-radius:10px;padding:10px}
.currency-row{display:flex;justify-content:center;padding:4px 0;font-size:11px}
.analytics-mini{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.analytics-item{background:var(--card2);border-radius:8px;padding:8px;text-align:center}
.analytics-val{font-size:16px;font-weight:700;color:var(--p1)}
.analytics-lbl{font-size:9px;opacity:.7}
.reply-box{background:var(--card2);border-radius:8px;padding:8px;margin-top:6px}
.reply-input{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:6px;background:var(--input-bg);color:var(--fg);font-size:11px}
.admin-reply{background:var(--card2);border-radius:8px;padding:8px;margin-top:6px;border:1px dashed var(--p1)}
.admin-reply-input{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:6px;background:var(--input-bg);color:var(--fg);font-size:13px;min-height:40px;resize:vertical}
.staff-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.staff-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;box-shadow:var(--shadow)}
.staff-header{display:flex;justify-content:center;align-items:flex-start;margin-bottom:10px}
.staff-name{font-weight:700;font-size:14px}
.staff-role{font-size:13px;opacity:.7;margin-top:2px}
.staff-status{padding:2px 8px;border-radius:20px;font-size:9px;font-weight:700}
.staff-status.online{background:#d1fae5;color:#065f46}
.staff-status.offline{background:#e5e7eb;color:#374151}
.staff-status.on-leave{background:#fef3c7;color:#92400e}
.staff-status.on-duty{background:#dbeafe;color:#1e40af}
.staff-meta{display:flex;gap:4px;font-size:10px;opacity:.7;margin:6px 0}
.staff-actions{display:flex;gap:4px;margin-top:10px;flex-wrap:wrap}

function convertPrice(baseSARPrice) {
const targetRate = CURRENCIES[HotelCfg.currency]?.rate || 3.75;
const baseRate = 3.75;
return (baseSARPrice / 3.75) * targetRate;
}
function formatPrice(baseSARPrice) {
const converted = convertPrice(baseSARPrice);
const symbol = CURRENCIES[HotelCfg.currency]?.symbol || '﷼';
const formattedNum = Number(converted.toFixed(2));
return `${symbol}${formattedNum}`;
}

async function apiCall(method, path, body=null, retries=3){
if(!isOnline) return null;
const opts={method, headers:{'Content-Type':'application/json','x-hotel-id':HID,'x-client-id':clientId}};
if(body) opts.body=JSON.stringify(body);
for(let i=0; i<retries; i++){
try{
const r=await fetch(API_BASE+path, opts);
const contentType = r.headers.get('content-type');
if(contentType && !contentType.includes('application/json')){
const text = await r.text();
if(text.startsWith('<!DOCTYPE') || text.startsWith('<html')){
console.warn(`⚠️ API returned HTML instead of JSON for ${path}. Falling back to localStorage.`);
return null;
}
}
if(!r.ok) throw new Error(r.statusText);
return await r.json();
}catch(e){
if(i===retries-1){
console.warn(`API error for ${path} (using localStorage fallback):`,e.message);
return null;
}
await new Promise(res=>setTimeout(res, 1000*(i+1)));
}
}
return null;
}

function save(collection, data, event='data_upd'){
if(Array.isArray(data)){
data = data.map(item => ({...item, _version: (item._version||0)+1, updatedAt: new Date().toISOString()}));
}else{
data = {...data, _version: (data._version||0)+1, updatedAt: new Date().toISOString()};
}
saveLS();
if(isOnline && socket?.connected){
socket.emit(event,{hotelId:HID, collection, data, clientId, syncToken: Date.now()});
}else{
offlineQueue.push({collection, data, event, timestamp: Date.now()});
updateNetBadge('queued');
saveLS();
}
}

function safeMerge(target, source, collection){
if(!source || !target) return target;
if(Array.isArray(source) && Array.isArray(target)){
const map = new Map(target.map(item => [item._id, item]));
source.forEach(item => {
const existing = map.get(item._id);
if(!existing || (item._version && (!existing._version || item._version > existing._version))){
map.set(item._id, {...(existing||{}), ...item});
}
});
return Array.from(map.values());
}
if(source._version && (!target._version || source._version > target._version)){
return {...target, ...source};
}
return target;
}

function initSocket(){
try{
socket = io(SOCKET_URL, {
transports:['websocket','polling'],
auth:{hotelId:HID, clientId},
reconnectionDelay:1000,
reconnectionDelayMax:5000
});
socket.on('connect',()=>{
setSockStatus('connected');
updateNetBadge('online');
socket.emit('join_hotel', HID);
showToast('🔗 Connected to Server','socket');
if(offlineQueue.length){
showToast(`🔄 Syncing ${offlineQueue.length} pending actions...`,'socket');
offlineQueue.forEach(item => {
socket.emit(item.event, {hotelId:HID, collection:item.collection, data:item.data, clientId, syncToken: item.timestamp});
});
offlineQueue.length = 0;
saveLS();
updateNetBadge('online');
}
syncBack();
});
socket.on('disconnect',()=>{setSockStatus('disconnected');updateNetBadge('offline')});
socket.on('connect_error',()=>{setSockStatus('error');updateNetBadge('offline')});
socket.on('reconnecting',()=>{setSockStatus('connecting');updateNetBadge('reconnecting')});
socket.on('sync_all', (data)=>{
if(data.syncToken && processedEvents.has(data.syncToken)) return;
if(data.syncToken) processedEvents.add(data.syncToken);
if(data.rooms) rooms = safeMerge(rooms, data.rooms, 'rooms');
if(data.guests) guests = safeMerge(guests, data.guests, 'guests');
if(data.food) food = safeMerge(food, data.food, 'food');
if(data.inventory) inventory = safeMerge(inventory, data.inventory, 'inventory');
if(data.requests) requests = safeMerge(requests, data.requests, 'requests');
if(data.blacklist) blacklist = safeMerge(blacklist, data.blacklist, 'blacklist');
if(data.maintenance) maintenance = safeMerge(maintenance, data.maintenance, 'maintenance');
if(data.reviews) reviews = safeMerge(reviews, data.reviews, 'reviews');
if(data.staff) staff = safeMerge(staff, data.staff, 'staff');
if(data.logs) logs = safeMerge(logs, data.logs, 'logs');
if(data.bookings) bookings = safeMerge(bookings, data.bookings, 'bookings');
if(data.rooms) renderRooms();
if(data.guests) renderGuests();
if(data.food) {renderFood(); renderGuestFood();}
if(data.inventory) {renderInventory(); renderGuestInv();}
if(data.requests) {renderRequests(); updateAdminStats(); updateGuestStats(); if(currentUser?.type==='guest') renderGuestHistory();}
if(data.blacklist) renderBlacklist();
if(data.maintenance) renderMaintenance();
if(data.reviews) renderReviews();
if(data.staff) renderStaff();
if(data.logs) renderLogs();
if(data.bookings) {renderGuestBookings(); renderAdminBookings();}

function adjustFont(d){
let currentSize = parseInt(document.body.style.fontSize) || 16;
if(d === 0) {
currentSize = 16;
} else if (d === -1) {
currentSize = Math.max(12, currentSize - 2);
} else if (d === 1) {
currentSize = Math.min(24, currentSize + 2);
}
// Apply to both html and body to ensure all elements scale
document.documentElement.style.fontSize = currentSize + 'px';
document.body.style.fontSize = currentSize + 'px';
localStorage.setItem('hotel_font', currentSize);

if(d === 0) msg = t('fontReset') || 'Font reset to 16px';
else if(d === -1) msg = (t('fontDecreased') || 'Font decreased') + `: ${currentSize}px`;
else if(d === 1) msg = (t('fontIncreased') || 'Font increased') + `: ${currentSize}px`;
showToast(msg, 'success');
}

// ✅ FIX ISSUE 3: Notification Button properly requests and handles permissions
function reqNotif(){
if(!('Notification' in window)){
showToast(t('notifNotSupported'),'error');
return;
}
if(Notification.permission === 'granted'){
showToast(t('notifGranted'),'success');
new Notification('Hotel OS',{body: t('welcomeSubtitle')});
return;
}
if(Notification.permission === 'denied'){
showToast((t('notifDenied')||'Notifications blocked') + ' - Please allow in browser settings','warning');
return;
}
showToast(t('notifRequesting')||'Requesting permission...','warning');
Notification.requestPermission().then(p=>{
notificationPermission=p;
if(p==='granted'){
showToast(t('notifGranted'),'success');
new Notification('Hotel OS',{body: t('welcomeSubtitle')});
}else if(p==='denied'){
showToast((t('notifDenied')||'Notifications blocked') + ' - Please allow in browser settings','warning');
}else{
showToast(t('notifPending')||'Permission pending','warning');
}
});
}

function speakText(text) {
if(!('speechSynthesis' in window)) return;
const utterance=new SpeechSynthesisUtterance(text);
utterance.lang=lang==='en'?'en-US':lang==='hi'?'hi-IN':'ar-SA';
utterance.rate=0.9;
if(voicesLoaded){
const voices=window.speechSynthesis.getVoices();
const preferred=voices.find(v=>v.lang.startsWith(utterance.lang));
if(preferred) utterance.voice=preferred;
}
window.speechSynthesis.cancel();
window.speechSynthesis.speak(utterance);
}

function showAdminTab(id){
document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===id));
document.querySelectorAll('.tab-pane').forEach(p=>p.classList.toggle('active',p.id===`atab-${id}`));
if(id==='overview') setTimeout(initCharts,200);
if(id==='requests') updateAdminServices();
if(id==='staff') renderStaff();
if(id==='bookings') renderAdminBookings();
}

function renderAll(){
applyI18n();
renderRooms();renderGuests();renderFood();renderInventory();
renderRequests();renderBlacklist();renderMaintenance();renderReviews();
renderLoyalty();renderStaff();renderLogs();renderAdminBookings();
updateAdminStats();updateGuestStats();
renderGuestFood();renderGuestInv();renderGuestHistory();renderGuestBookings();
}

function renderRooms(){
const tbody=document.getElementById('roomsTbody');if(!tbody)return;
tbody.innerHTML=rooms.map(r=>`
<tr data-id="${r._id}">
<td><strong>${r.number}</strong></td>
<td>${r.type}</td>
<td>${formatPrice(r.basePriceSAR)}</td>
<td><span class="badge badge-${r.status?.toLowerCase()}">${r.status}</span></td>
<td>${r.guestName||'—'}</td>
<td>
<button class="tbl-action" onclick="editRoom('${r._id}')" title="${t('edit')}">✏️</button>
<button class="tbl-action" onclick="delRoom('${r._id}')" title="${t('delete')}">🗑️</button>
</td>
</tr>`).join('')||'<tr><td colspan="6" style="text-align:center;color:var(--p2);padding:12px">No rooms</td></tr>';
}

function renderGuests(){
const tbody=document.getElementById('guestsTbody');if(!tbody)return;
tbody.innerHTML=guests.map(g=>`
<tr data-id="${g._id}">
<td><strong>${g.name}</strong></td>
<td>${g.room}</td>
<td>⭐${g.points||0}</td>
<td><span class="badge badge-${g.status}">${g.status}</span></td>
<td>
<button class="tbl-action" onclick="toggleBlock('${g._id}')">${g.status==='blocked'?'✅':'🚫'}</button>
<button class="tbl-action" onclick="delGuest('${g._id}')">🗑️</button>
</td>
</tr>`).join('')||'<tr><td colspan="5" style="text-align:center;padding:12px">No guests</td></tr>';
}

function renderRequests(filter='all'){
const el=document.getElementById('reqsList');if(!el)return;
let list=requests;
if(filter==='open') list=requests.filter(r=>r.status==='open');
if(filter==='completed') list=requests.filter(r=>r.status==='completed');
if(filter==='emergency') list=requests.filter(r=>r.priority==='emergency');
el.innerHTML=list.map(r=>`
<div class="req-card ${r.priority==='emergency'?'emergency':''}" data-id="${r._id}">
<div style="display:flex;justify-content:center;align-items:flex-start;gap:8px">

function submitAdminReq(e){
e.preventDefault();
const dept=document.getElementById('adminDept')?.value;
const svc=document.getElementById('adminService')?.value;
const desc=document.getElementById('adminDesc')?.value||'';
if(!dept||!svc){showToast('Select department & service','error');return}
const req={_id:'req_'+Date.now(),guestName:'Admin',roomNumber:'N/A',department:dept,description:`${svc}: ${desc}`,priority:'normal',status:'open',createdAt:new Date().toISOString(),hotelId:HID, _version:1};
requests.unshift(req);
save('requests',req,'req_new');
renderRequests();updateAdminStats();
e.target.reset();updateAdminServices();
// ✅ FIX ISSUE 5: Toast notification for admin request
showToast('✅ ' + (t('reqSubmitted') || 'Request submitted successfully'), 'success');
addLog('Admin Request',`${dept} - ${svc}`);
}

function sendAdminReply(reqId){
const input=document.getElementById(`adminReply-${reqId}`);
if(!input) return;
const reply=input.value.trim();
if(!reply){showToast('Enter a reply','error');return}
const req=requests.find(r=>r._id===reqId);
if(req){
req.adminReply=reply;
req.adminReplyTime=new Date().toISOString();
save('requests',req,'req_upd');
renderRequests();
// ✅ FIX ISSUE 5: Toast notification for admin reply
showToast('✅ ' + (t('replySentToGuest') || 'Reply sent to guest'),'success');
addLog('Admin Reply',`To ${req.guestName}: ${reply}`);
}
}

function sendReply(reqId){
const input=document.getElementById(`reply-${reqId}`);
if(!input) return;
const reply=input.value.trim();
if(!reply){showToast('Enter a reply','error');return}
const req=requests.find(r=>r._id===reqId);
if(req){

req.replyTime=new Date().toISOString();
save('requests',req,'req_upd');
renderRequests();
showToast(t('replySent'),'success');
addLog('Reply Sent',`To ${req.guestName}: ${reply}`);
}
}

function initCharts(){

if(occChart){occChart.destroy();occChart=null}
const opts={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}};
if(dCtx){
const byDept={};
requests.forEach(r=>{byDept[r.department]=(byDept[r.department]||0)+1});
const labels=Object.keys(byDept).length?Object.keys(byDept):['HK','Maint','Rest','IT','Laundry'];
const vals=Object.keys(byDept).length?Object.values(byDept):[8,5,6,3,4];
deptChart=new Chart(dCtx,{type:'doughnut',data:{labels,datasets:[{data:vals,backgroundColor:['#6c63ff','#a78bfa','#10b981','#f59e0b','#ef4444','#06b6d4']}]},options:opts});
}
if(oCtx){
const occupied=rooms.filter(r=>r.status==='Occupied').length;
const total=rooms.length||1;
occChart=new Chart(oCtx,{type:'bar',data:{labels:['W1','W2','W3','W4'],datasets:[{label:'%',data:[68,75,82,Math.round(occupied/total*100)],backgroundColor:'#6c63ff',borderRadius:6}]},options:{...opts,scales:{y:{beginAtZero:true,max:100,ticks:{color:'var(--fg)'},grid:{color:'var(--border)'}},x:{ticks:{color:'var(--fg)'},grid:{display:false}}}}});
}
}

function addNewCurrency(e){
e.preventDefault();
const code=document.getElementById('newCurCode').value.toUpperCase();
const symbol=document.getElementById('newCurSymbol').value;
const rate=parseFloat(document.getElementById('newCurRate').value);
const flag=document.getElementById('newCurFlag').value||'';
if(!code||!symbol||isNaN(rate)){showToast('Fill all fields','error');return}
if(CURRENCIES[code]){showToast('Currency already exists','error');return}
CURRENCIES[code]={symbol,rate,flag,custom:true};
saveLS();
if(isOnline && socket?.connected){
socket.emit('currency_upd',{hotelId:HID, currencies:CURRENCIES, syncToken:Date.now(), clientId});
}
closeModal('infoModal');
applyCfg();
showToast(`✅ ${code} added!`,'success');
addLog('Add Currency',code);
}

function deleteCurrency(code){
if(!CURRENCIES[code]?.custom){showToast('Cannot delete built-in currency','error');return}
if(confirm(`Delete ${code}?`)){
delete CURRENCIES[code];
if(HotelCfg.currency===code) HotelCfg.currency='USD';
saveLS();
if(isOnline && socket?.connected){
socket.emit('currency_upd',{hotelId:HID, currencies:CURRENCIES, syncToken:Date.now(), clientId});
}
applyCfg();
showToast(`${code} deleted`,'success');
addLog('Delete Currency',code);
}
}

function editCurrencyRates(){
const rates = Object.entries(CURRENCIES).map(([code, data]) =>
`<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0">

function saveCfg(field){

function calcBookingPrice(){
const select=document.getElementById('bookRoomSelect');
const checkIn=document.getElementById('bookCheckIn')?.value;
const checkOut=document.getElementById('bookCheckOut')?.value;
const totalEl=document.getElementById('bookingTotalPrice');
if(!select||!checkIn||!checkOut||!totalEl){return;}
const selected=select.options[select.selectedIndex];
const pricePerNightSAR=parseFloat(selected.dataset?.price)||0;
const inDate=new Date(checkIn);
const outDate=new Date(checkOut);
const nights=Math.ceil((outDate-inDate)/(1000*60*60*24));
if(nights>0){
const total = formatPrice(pricePerNightSAR * nights);
totalEl.textContent=`${total} (${nights} ${t('nights')})`;
}else{
totalEl.textContent='0';
}
}

function bookRoom(e){
e.preventDefault();
const roomId=document.getElementById('bookRoomSelect')?.value;
const checkIn=document.getElementById('bookCheckIn')?.value;
const checkOut=document.getElementById('bookCheckOut')?.value;
const numGuests=parseInt(document.getElementById('bookNumGuests')?.value)||1;
if(!roomId||!checkIn||!checkOut){showToast('Fill all fields','error');return}
const room=rooms.find(r=>r._id===roomId);
if(!room){showToast('Room not found','error');return}
const inDate=new Date(checkIn);
const outDate=new Date(checkOut);
const nights=Math.ceil((outDate-inDate)/(1000*60*60*24));
if(nights<=0){showToast('Invalid dates','error');return}
const totalPrice=room.basePriceSAR*nights;
const booking={_id:'bk_'+Date.now(),hotelId:HID,guestName:currentUser.name,roomNumber:room.number,roomType:room.type,checkIn,checkOut,guests:numGuests,totalPriceSAR:totalPrice,status:'pending',createdAt:new Date().toISOString(), _version:1};
bookings.unshift(booking);
save('bookings',booking,'booking_new');
renderGuestBookings();renderAdminBookings();
e.target.reset();
document.getElementById('bookingTotalPrice').textContent='0';
// ✅ FIX ISSUE 5: Toast notification for room booking
showToast(' ' + (t('roomBooked') || 'Room booked successfully') + '!','success');
speakBookingConfirmed();
sendGuestNotification('notifBookingTitle', 'notifBookingBody');
addLog('New Booking',`${currentUser.name} - Room ${room.number}`);
}

function renderAdminBookings(){
const el=document.getElementById('adminBookingGrid');if(!el)return;
const statusFilter=document.getElementById('bookingFilterStatus')?.value||'all';
const fromFilter=document.getElementById('bookingFilterFrom')?.value;
const toFilter=document.getElementById('bookingFilterTo')?.value;
let list=bookings;
if(statusFilter!=='all') list=list.filter(b=>b.status===statusFilter);
if(fromFilter) list=list.filter(b=>new Date(b.checkIn)>=new Date(fromFilter));
if(toFilter) list=list.filter(b=>new Date(b.checkIn)<=new Date(toFilter));
el.innerHTML=list.map(b=>`
<div class="booking-card" data-id="${b._id}">
<div class="booking-header">
<div>
<div class="booking-room">${b.guestName} - Room #${b.roomNumber}</div>
<div class="booking-dates">${b.checkIn} → ${b.checkOut}</div>
</div>
<span class="booking-status ${b.status}">${t(b.status)}</span>
</div>
<div class="booking-meta">
<span> ${b.guests} guest(s)</span>
<span class="booking-price">${formatPrice(b.totalPriceSAR)}</span>
</div>
<div class="booking-actions">
<select class="inp" style="font-size:10px;padding:4px 8px" onchange="updateBookingStatus('${b._id}',this.value)">
<option value="pending" ${b.status==='pending'?'selected':''}>${t('pending')}</option>
<option value="confirmed" ${b.status==='confirmed'?'selected':''}>${t('confirmed')}</option>
<option value="checked-in" ${b.status==='checked-in'?'selected':''}>${t('checkedIn')}</option>
<option value="checked-out" ${b.status==='checked-out'?'selected':''}>${t('checkedOut')}</option>
<option value="cancelled" ${b.status==='cancelled'?'selected':''}>${t('cancelled')}</option>
</select>
<button class="booking-btn edit" onclick="editBooking('${b._id}')">✏️</button>
<button class="booking-btn cancel" onclick="deleteBooking('${b._id}')">🗑️</button>
</div>
<div style="font-size:10px;opacity:.5;margin-top:4px">ID: ${b._id}</div>
</div>`).join('')||'<p style="opacity:.5;text-align:center;padding:12px">No bookings</p>';
}

function updateBookingStatus(id,status){
const b=bookings.find(x=>x._id===id);
if(b){
b.status=status;
b.updatedAt=new Date().toISOString();
save('bookings',b,'booking_upd');
renderAdminBookings();renderGuestBookings();
showToast('✅ Booking status updated','success');
addLog('Update Booking',`${b.guestName} - ${status}`);
}
}

function editBooking(id){
const b=bookings.find(x=>x._id===id);if(!b)return;
const newGuests=prompt('Edit number of guests:',b.guests);
const newCheckIn=prompt('Edit check-in (YYYY-MM-DD):',b.checkIn);
const newCheckOut=prompt('Edit check-out (YYYY-MM-DD):',b.checkOut);
if(newGuests&&newCheckIn&&newCheckOut){
b.guests=parseInt(newGuests)||b.guests;
b.checkIn=newCheckIn;
b.checkOut=newCheckOut;
const inDate=new Date(newCheckIn);
const outDate=new Date(newCheckOut);
const nights=Math.ceil((outDate-inDate)/(1000*60*60*24));
const room=rooms.find(r=>r.number==b.roomNumber);
if(room&&nights>0) b.totalPriceSAR=room.basePriceSAR*nights;
b.updatedAt=new Date().toISOString();
save('bookings',b,'booking_upd');
renderAdminBookings();renderGuestBookings();
showToast('✅ Booking updated','success');
addLog('Edit Booking',`${b.guestName}`);
}
}

function deleteBooking(id){
if(confirm('Delete this booking?')){
const idx=bookings.findIndex(b=>b._id===id);
if(idx>-1){
const b=bookings[idx];
bookings.splice(idx,1);
save('bookings',bookings,'booking_upd');
renderAdminBookings();renderGuestBookings();
showToast('✅ Booking deleted','success');
addLog('Delete Booking',`${b.guestName}`);
}
}
}

XLSX.writeFile(wb,`bookings-${Date.now()}.xlsx`);
showToast('✅ Bookings exported!','success');
}

function addInvItem(e){
e.preventDefault();
const editId=document.getElementById('inventoryModal')?.dataset?.editId;

inventory[idx]={...inventory[idx],...itemData, _version:(inventory[idx]._version||0)+1, updatedAt:new Date().toISOString()};
save('inventory',inventory[idx],'inventory_upd');
// ✅ FIX ISSUE 5: Toast notification for inventory update
showToast('✅ ' + (t('invUpdated') || 'Inventory item updated successfully'),'success');
}
}else{
const item={_id:'i_'+Date.now(),...itemData, _version:1, createdAt:new Date().toISOString(), updatedAt:new Date().toISOString()};
inventory.push(item);save('inventory',item,'inventory_upd');
// ✅ FIX ISSUE 5: Toast notification for inventory add
showToast('✅ ' + (t('invAdded') || 'Inventory item added successfully'),'success');
speakItemAdded();
}
closeModal('inventoryModal');
if(document.getElementById('inventoryModal').dataset) delete document.getElementById('inventoryModal').dataset.editId;
renderInventory();renderGuestInv();
}

function openRatingModal(){
openModal('ratingModal');
['Overall','Service','Clean'].forEach(type=>{
const el=document.getElementById('star'+type);if(!el)return;
el.innerHTML=[1,2,3,4,5].map(i=>`<span onclick="setStar('${type.toLowerCase()}',${i})" style="font-size:24px;cursor:pointer;transition:transform .1s">☆</span>`).join('');
});
}

function setStar(type,val){
const map={overall:'Overall',service:'Service',clean:'Clean'};
const el=document.getElementById('star'+map[type]);if(!el)return;
[...el.children].forEach((s,i)=>{s.textContent=i<val?'★':'☆';s.style.color=i<val?'#f59e0b':'var(--fg)'});
ratingData[type]=val;
}

function submitRating(){
if(!ratingData.overall){showToast('Please select a rating','error');return}
const rev={_id:'rev_'+Date.now(),guest:currentUser.name,room:currentUser.room,overall:ratingData.overall,service:ratingData.service||0,cleanliness:ratingData.clean||0,recommend:ratingData.overall>=3,comment:document.getElementById('ratingComment')?.value||'',date:new Date().toISOString(),hotelId:HID, _version:1};
reviews.unshift(rev);save('reviews',rev,'review_new');closeModal('ratingModal');renderReviews();showToast('⭐ Thank you for rating!','success');ratingData={overall:0,service:0,clean:0};
}

function updateWeather(){
const condition = weatherConditions[Math.floor(Math.random() * weatherConditions.length)];
const temp = condition.tempMin + Math.floor(Math.random() * (condition.tempMax - condition.tempMin));
const humidity = 30 + Math.floor(Math.random() * 50);
const wind = 5 + Math.floor(Math.random() * 25);
weatherData = {
temp: temp,
desc: condition.desc,
descHi: condition.descHi,
descAr: condition.descAr,
icon: condition.icon,
humidity: humidity,
wind: wind,
updateTime: new Date()
};
const localizedDesc = lang === 'hi' ? condition.descHi : lang === 'ar' ? condition.descAr : condition.desc;
const timeStr = weatherData.updateTime.toLocaleTimeString(lang === 'en' ? 'en-US' : lang === 'hi' ? 'hi-IN' : 'ar-SA', {
hour: '2-digit',
minute: '2-digit',
timeZone: userTimezone
});
const adminCard = document.getElementById('adminWeatherCard');
const adminTemp = document.getElementById('weatherTemp');
const adminDesc = document.getElementById('weatherDesc');
const adminIcon = document.getElementById('weatherIcon');
const adminTime = document.getElementById('weatherUpdateTime');
if(adminTemp) adminTemp.textContent = `${temp}°C`;
if(adminDesc) adminDesc.textContent = localizedDesc;
if(adminIcon) adminIcon.textContent = condition.icon;
if(adminTime) adminTime.textContent = `🕐 Updated: ${timeStr}`;
if(adminCard) {
adminCard.classList.remove('weather-update-flash');
void adminCard.offsetWidth;
adminCard.classList.add('weather-update-flash');
}
const guestCard = document.getElementById('guestWeatherCard');
const guestTemp = document.getElementById('gWeatherTemp');
const guestDesc = document.getElementById('gWeatherDesc');
const guestIcon = document.getElementById('weatherIcon');
const guestTime = document.getElementById('guestWeatherUpdateTime');
if(guestTemp) guestTemp.textContent = `${temp}°C`;
if(guestDesc) guestDesc.textContent = localizedDesc;
if(guestIcon) guestIcon.textContent = condition.icon;
if(guestTime) guestTime.textContent = `🕐 Updated: ${timeStr} | 💧 ${humidity}% | 💨 ${wind} km/h`;
if(guestCard) {
guestCard.classList.remove('weather-update-flash');
void guestCard.offsetWidth;
guestCard.classList.add('weather-update-flash');
}
console.log(`🌤️ Weather updated: ${temp}°C, ${localizedDesc}, Humidity: ${humidity}%, Wind: ${wind} km/h`);
}

setInterval(updateWeather, 30000);
