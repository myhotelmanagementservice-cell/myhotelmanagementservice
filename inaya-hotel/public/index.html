.booking-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}.booking-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;box-shadow:var(--shadow)}.booking-header{display:flex;justify-content:center;align-items:flex-start;margin-bottom:10px}.booking-room{font-weight:700;font-size:14px}.booking-dates{font-size:13px;opacity:.7;margin-top:2px}.booking-status{padding:2px 8px;border-radius:20px;font-size:9px;font-weight:700}.booking-status.pending{background:#fef3c7;color:#92400e}.booking-status.confirmed{background:#dbeafe;color:#1e40af}.booking-status.checked-in{background:#d1fae5;color:#065f46}.booking-status.checked-out{background:#e5e7eb;color:#374151}.booking-status.cancelled{background:#fee2e2;color:#991b1b}.booking-meta{display:flex;gap:4px;font-size:10px;opacity:.7;margin:6px 0}.booking-actions{display:flex;gap:4px;margin-top:10px;flex-wrap:wrap}.booking-btn{padding:3px 8px;border-radius:6px;font-size:10px;border:none;cursor:pointer;font-family:inherit}.booking-btn.confirm{background:#10b981;color:#fff}.booking-btn.cancel{background:#ef4444;color:#fff}.booking-btn.edit{background:var(--p1);color:#fff}.booking-price{font-weight:700;color:var(--p1);font-size:13px}
.policy-card, .announcement-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}.policy-header, .announcement-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}.policy-title, .announcement-title{font-weight:700;font-size:14px;color:var(--fg)}.policy-type{font-size:11px;opacity:0.7;text-transform:uppercase;letter-spacing:0.5px;color:var(--p1)}.policy-content, .announcement-content{font-size:13px;line-height:1.6;color:var(--fg);opacity:0.85;margin-bottom:10px;white-space:pre-wrap}
.toggle-switch{position:relative;display:inline-block;width:40px;height:22px}.toggle-switch input{opacity:0;width:0;height:0}.slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background-color:#ccc;transition:.4s;border-radius:22px}.slider:before{position:absolute;content:"";height:16px;width:16px;left:3px;bottom:3px;background-color:white;transition:.4s;border-radius:50%}input:checked + .slider{background-color:var(--p1)}input:checked + .slider:before{transform:translateX(18px)}
.dash-kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:16px}.dash-kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;box-shadow:var(--shadow)}.dash-kpi-val{font-size:22px;font-weight:700;color:var(--p1)}.dash-kpi-lbl{font-size:11px;color:var(--fg);opacity:0.7;margin-top:4px}

/* ===== SESSION LOADING SPINNER ===== */
#sessionLoader {
position: fixed;
inset: 0;
z-index: 999999;
background: var(--bg);
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
transition: opacity 0.4s ease;
}
#sessionLoader.hidden {
opacity: 0;
pointer-events: none;
}
#sessionLoader .spinner {
width: 48px;
height: 48px;
border: 4px solid var(--border);
border-top-color: var(--p1);
border-radius: 50%;
animation: spin 0.8s linear infinite;
}
#sessionLoader p {
margin-top: 16px;
color: var(--fg);
opacity: 0.7;
font-size: 14px;
}

async function apiCall(method, path, body = null, retries = 3) {
if (!isOnline) return null;
const token = localStorage.getItem('hotel_token') || sessionStorage.getItem('hotel_token') || localStorage.getItem(`h_${HID}_token`);
const opts = {
method,
headers: {
'Content-Type': 'application/json',
'x-hotel-id': HID,
'x-client-id': clientId
}
};
if (token) opts.headers['Authorization'] = `Bearer ${token}`;
if (body) opts.body = JSON.stringify(body);
for (let i = 0; i < retries; i++) {
try {
const r = await fetch(API_BASE + path, opts);
const text = await r.text();
let data;
try { data = JSON.parse(text); } catch (e) {
if (text.startsWith('<!DOCTYPE') || text.startsWith('<html')) return null;
throw new Error('Invalid JSON');
}
if (data && data.code === 'SESSION_EXPIRED') {
alert("Session expired. Please login again.");
logout();
return null;
}
if (!r.ok) throw new Error(r.statusText);
return data;
} catch (e) {
if (i === retries - 1) {
console.warn(`API error for ${path}:`, e.message);
return null;
}
await new Promise(res => setTimeout(res, 1000 * (i + 1)));
}
}
return null;
}
// FIXED: Correctly captures MongoDB _id from backend response to prevent data loss on refresh
async function saveToMongo(collection, data) {
    if (!isOnline) return false;
    try {
        // ✅ FIX: 'config' aur 'settings' backend mein /:id use nahi karte hain
        const getPutUrl = (id) => {
            if (collection === 'config' || collection === 'settings') {
                return `/${collection}?hotelId=${HID}`;
            }
            return `/${collection}/${id}?hotelId=${HID}`;
        };

        if (Array.isArray(data)) {
            for (let item of data) {
                const isNew = item._isNew;
                const payload = { ...item };
                delete payload._isNew;
                if (isNew || !payload._id) {
                    const res = await apiCall('POST', `/${collection}?hotelId=${HID}`, payload);
                    if (!res) {
                        console.error(`❌ FAILED to save new ${collection} item. API returned null. Check Network tab.`);
                        return false; // ✅ FIX: Return false if API fails!
                    }
                    const newId = res._id || res.insertedId || res.id;
                    if (newId) item._id = newId;
                } else {
                    const res = await apiCall('PUT', getPutUrl(payload._id), payload);
                    if (!res) {
                        console.error(`❌ FAILED to update ${collection} item. API returned null. Check Network tab.`);
                        return false; // ✅ FIX: Return false if API fails!
                    }
                }
                delete item._isNew;
            }
        } else {
            const isNew = data._isNew;
            const payload = { ...data };
            delete payload._isNew;
            if (isNew || !payload._id) {
                const res = await apiCall('POST', `/${collection}?hotelId=${HID}`, payload);
                if (!res) {
                    console.error(`❌ FAILED to save new ${collection} item. API returned null. Check Network tab.`);
                    return false; // ✅ FIX: Return false if API fails!
                }
                const newId = res._id || res.insertedId || res.id;
                if (newId) data._id = newId;
            } else {
                const res = await apiCall('PUT', getPutUrl(payload._id), payload);
                if (!res) {
                    console.error(`❌ FAILED to update ${collection} item. API returned null. Check Network tab.`);
                    return false; // ✅ FIX: Return false if API fails!
                }
            }
            delete data._isNew;
        }
        return true;
    } catch (e) {
        console.warn(`saveToMongo error for ${collection}:`, e);
        return false;
    }
}

async function save(collection, data, event = 'data_upd') {
    if (Array.isArray(data)) {
        data.forEach(item => {
            item._version = (item._version || 0) + 1;
            item.updatedAt = new Date().toISOString();
        });
    } else {
        data._version = (data._version || 0) + 1;
        data.updatedAt = new Date().toISOString();
    }
    const success = await saveToMongo(collection, data);
    if (success) {
        if (isOnline && socket?.connected) {
            const syncToken = Date.now();
            socket.emit(event, { hotelId: HID, collection, data, clientId, syncToken });
            if (currentUser?.type === 'guest') {
                socket.emit('guest_action', { hotelId: HID, type: event, collection, data, clientId, syncToken });
            } else if (currentUser?.type === 'admin') {
                socket.emit('admin_action', { hotelId: HID, type: event, collection, data, clientId, syncToken });
            }
        }
        updateCache();
        return true;
    } else {
        offlineQueue.push({ collection, data, event, timestamp: Date.now() });
        saveUIPrefs();
        updateNetBadge('queued');
        // ✅ FIX: Show red error toast so user knows save failed
        showToast(`⚠️ Server save failed for ${collection}. Data queued. Check console for errors.`, 'error');
        return false;
    }
}

const types = ['Standard', 'Deluxe', 'Suite', 'Quad Room', 'Family Room'];
const basePricesSAR = { Standard: 371, Deluxe: 484, Suite: 746, 'Quad Room': 610, 'Family Room': 693 };
const r = [];
for (let i = 101; i <= 150; i++) {
const type = types[(i - 101) % 5];
r.push({
_id: `r_${i}`,
number: i,
type: type,
basePriceSAR: basePricesSAR[type] || 371,
status: 'Vacant',
guestName: '',
hotelId: HID,
createdAt: new Date().toISOString(),
updatedAt: new Date().toISOString(),
_version: 1
});
}
return r;
}
function generateDefaultInventory() {
return [
{ _id: 'inv_1', name: 'Towels', category: 'Amenities', stock: 150, unit: 'pcs', min: 50, hotelId: HID, _version: 1 },
{ _id: 'inv_2', name: 'Bed Sheets', category: 'Linen', stock: 80, unit: 'sets', min: 30, hotelId: HID, _version: 1 }
];
}
function generateDefaultFood() {
return [
{ _id: 'f_1', name: 'Burger', price: 45, basePriceSAR: 45, category: 'Main Course', emoji: '🍔', hotelId: HID, _version: 1 },
{ _id: 'f_2', name: 'Pizza', price: 56, basePriceSAR: 56, category: 'Main Course', emoji: '🍕', hotelId: HID, _version: 1 }
];
}
function safeMerge(target, source, collection) {
if (!source || !target) return target;
if (Array.isArray(source) && Array.isArray(target)) {
const map = new Map(target.map(item => [item._id, item]));
source.forEach(item => {
const existing = map.get(item._id);
if (!existing || (item._version && (!existing._version || item._version > existing._version))) {
map.set(item._id, { ...(existing || {}), ...item });
}
});
return Array.from(map.values());
}
if (source._version && (!target._version || source._version > target._version)) {
return { ...target, ...source };
}
return target;
}
// ✅ SUBSCRIPTION STATUS LOADER - Settings Tab ke liye
async function loadSubscriptionStatus() {
    try {
        const token = localStorage.getItem('hotel_token') || sessionStorage.getItem('hotel_token');
        if (!token) {
            console.log('No token, skipping subscription load');
            return;
        }

        const response = await fetch(`${API_BASE}/subscription/current`, {
            headers: {
                'Authorization': `Bearer ${token}`,
                'x-hotel-id': HID
            }
        });

        // ✅ Agar API nahi hai (404), silently return - error mat dikhao
        if (response.status === 404 || !response.ok) {
            console.warn('Subscription API not available');
            return;
        }

        const data = await response.json();
        const statusEl = document.getElementById('subStatusText');
        const badgeEl = document.getElementById('subStatusBadge');

        if (statusEl && data.success && data.data) {
            const sub = data.data;
            const expiryText = sub.expiryDate 
                ? `📅 Expires: <strong>${new Date(sub.expiryDate).toLocaleDateString()}</strong>`
                : '♾️ <strong>Lifetime Access</strong>';

            const statusColor = sub.status === 'active' ? '#10b981' : 
                               sub.status === 'expired' ? '#ef4444' : '#f59e0b';
            const statusText = sub.status.toUpperCase();

            if (badgeEl) {
                badgeEl.style.background = statusColor;
                badgeEl.textContent = statusText;
            }

            statusEl.innerHTML = `
                <div style="margin-bottom:4px">📋 <strong>Plan:</strong> ${sub.planName}</div>
                <div style="margin-bottom:4px">${expiryText}</div>
                <div style="font-size:11px;opacity:0.8;margin-top:6px">💡 Click "Manage Subscription" to upgrade, renew, or view all plans</div>
            `;
        } else if (statusEl) {
            if (badgeEl) {
                badgeEl.style.background = '#f59e0b';
                badgeEl.textContent = 'NO PLAN';
            }
            statusEl.innerHTML = `
                <div style="margin-bottom:6px">⚠️ <strong>No active subscription found</strong></div>
                <div style="font-size:12px;opacity:0.9">Subscribe now to unlock all premium features!</div>
            `;
        }
    } catch (error) {
        console.warn('Subscription status load skipped:', error.message);
        // Error user ko mat dikhao - subscription abhi setup nahi hua ho sakta
    }
}

function saveSession() {
if (currentUser) {
const s = JSON.stringify(currentUser);
sessionStorage.setItem('hotel_session', s);
localStorage.setItem(`h_${HID}_session`, s);
if (currentUser.token) {
sessionStorage.setItem('hotel_token', currentUser.token);
localStorage.setItem('hotel_token', currentUser.token);
localStorage.setItem(`h_${HID}_token`, currentUser.token);
}
} else {
sessionStorage.removeItem('hotel_session');
sessionStorage.removeItem('hotel_token');
localStorage.removeItem(`h_${HID}_session`);
localStorage.removeItem(`h_${HID}_token`);
localStorage.removeItem('hotel_token');
}
}
async function checkSession() {
const s = sessionStorage.getItem('hotel_session') || localStorage.getItem(`h_${HID}_session`);
if (!s) {
isSessionChecked = true;

return;
}

}

updateAdminStats();

}
} else if (currentUser.type === 'guest') {

renderGuestFood();
renderGuestInv();
renderGuestHistory();
renderGuestBookings();

renderGuestPolicies();

showGuestTab(savedTab.replace('guest_', ''));
} else {
showGuestTab('reqTab');
}
}
showToast("✅ Session restored — Welcome back!", 'success');
isSessionChecked = true;
hideSessionLoader();
const rejoinSocket = () => {
  if (currentUser.type === 'guest') {
    socket.emit('join_hotel', HID);
    socket.emit('join_guest', { hotelId: HID, roomNumber: currentUser.room, guestName: currentUser.name });
  } else {
    socket.emit('join_hotel', HID);
    socket.emit('join_admin', HID);
    startAdminPolling();
  }
};
if (socket?.connected) {
  rejoinSocket();
} else if (socket) {
  socket.once('connect', rejoinSocket);
  if (!socket.connected) socket.connect();
}
} catch (e) {
console.warn('Session restore error:', e);
sessionStorage.removeItem('hotel_session');
isSessionChecked = true;
hideSessionLoader();
}
}
function hideSessionLoader() {

// Auto-login if redirected back from Google OAuth
(function handleGoogleAuthCallback() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('googleAuth') === 'success') {
    const token = params.get('token');
    const name = params.get('name');
    const email = params.get('email');
    const avatar = params.get('avatar');
    const hotelId = params.get('hotelId');
    // Clean URL
    window.history.replaceState({}, '', '/');
    if (token && name && hotelId) {
      localStorage.setItem('authToken', token);
      localStorage.setItem('hotelId', hotelId);
      currentUser = { name, email, avatar, role: 'guest', type: 'guest', hotelId, loginMethod: 'google' };
      HID = hotelId;
      showToast(`✅ Welcome, ${name}! Logged in with Google`, 'success');
      setTimeout(() => initGuestDash(), 300);
    }
  } else if (params.get('googleError') === '1') {
    window.history.replaceState({}, '', '/');
    showToast('❌ Google login cancelled or failed', 'error');
  }
})();

async function guestLogin(e) {
    e.preventDefault();
    const hotelIdIn = (document.getElementById('guestHotelIdIn')?.value || '').trim();
    const name = document.getElementById('guestNameIn').value.trim();
    const room = document.getElementById('guestRoomIn').value.trim();
    if (!hotelIdIn || !name || !room) { showToast('Fill all fields including Hotel ID', 'error'); return; }
    if (blacklist.find(b => b.name.toLowerCase() === name.toLowerCase())) {
        showToast('❌ Access denied', 'error');
        return;
    }

    showToast('🔄 Logging in...', 'info');
    try {
        // ✅ Call backend guest login API
        const response = await fetch(API_BASE + '/guest/login', {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'x-hotel-id': HID
            },
            body: JSON.stringify({ name, room, hotelId: HID })
        });
        const data = await response.json();
        if (response.ok && data.success && data.token) {
            HID = data.hotelId;

            // Save token
            localStorage.setItem('hotel_token', data.token);
            sessionStorage.setItem('hotel_token', data.token);

            currentUser = { type: 'guest', name, room, points: 0, token: data.token };
            saveSession();
            await checkHealth();
            await loadAllData();
            showPage('guestDash');
            document.getElementById('gInfo').textContent = `👤 ${name} | #${room}`;
            updateGuestStats();
            renderGuestFood();
            renderGuestInv();
            renderGuestHistory();
            renderGuestBookings();
            renderGuestAnnouncements();
            renderGuestPolicies();
            showGuestTab('reqTab');
            showToast(`Welcome, ${name}! 🌟`, 'success');
            speakWelcome();
            hideSessionLoader();
            if (isOnline && socket?.connected) {
                socket.emit('join_hotel', HID);
                socket.emit('join_guest', { hotelId: HID, roomNumber: room, guestName: name });
            } else if (socket) {
                socket.connect();
                socket.once('connect', () => {
                    socket.emit('join_hotel', HID);
                    socket.emit('join_guest', { hotelId: HID, roomNumber: room, guestName: name });
                });
            }
        } else {
            showToast('❌ Login failed: ' + (data.error || 'Unknown error'), 'error');
        }
    } catch (err) {
        console.error('Guest login error:', err);
        showToast('❌ Login error: ' + err.message, 'error');
    }
}

let _adminPollInterval = null;
function startAdminPolling() {
if (_adminPollInterval) clearInterval(_adminPollInterval);
_adminPollInterval = setInterval(async () => {
if (!currentUser || currentUser.type !== 'admin' || !isOnline) return;
if (socket?.connected) {
socket.emit('join_hotel', HID);
socket.emit('join_admin', HID);
}
try {
const [newReqs, newBks] = await Promise.all([
apiCall('GET', `/requests?hotelId=${HID}`),
apiCall('GET', `/bookings?hotelId=${HID}`)
]);
if (newReqs && Array.isArray(newReqs)) {
const prevCount = requests.length;
const existingIds = new Set(requests.map(r => String(r._id)));
let added = 0;
newReqs.forEach(r => {
if (!existingIds.has(String(r._id))) { requests.unshift(r); added++; }
});
if (added > 0) {
requests.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
renderRequests();
updateAdminStats();
renderDashboardAnalytics();
showToast(`🔄 ${added} new request(s) synced`, 'socket');
}
}
if (newBks && Array.isArray(newBks)) {
const existingIds = new Set(bookings.map(b => String(b._id)));
let added = 0;
newBks.forEach(b => {
if (!existingIds.has(String(b._id))) { bookings.unshift(b); added++; }
});
if (added > 0) { renderAdminBookings(); renderDashboardAnalytics(); }
}
} catch(e) {}
}, 10000);
}

function initSocket() {

transports: ['websocket', 'polling'],
auth: { hotelId: HID, clientId },
reconnectionDelay: 1000,
reconnectionDelayMax: 5000
});

}

const queueCopy = [...offlineQueue];
offlineQueue.length = 0;
saveUIPrefs();
queueCopy.forEach(async (item) => {

collection: item.collection,
data: item.data,
clientId,
syncToken: item.timestamp
});

});    
updateNetBadge('online');
}
syncBack();
});

['billing','restaurant','tablebookings','spa','events','wakeupcalls','parking','feedback'].forEach(col => {
  socket.on(col+'_upd', (payload) => {
    try {
      const d = payload.data || payload;
      if (!d || d.hotelId !== HID) return;
      addNotification({ type: col, message: getCollectionMsg(col, d), time: new Date().toISOString(), data: d });
      const activeAdminTab = sessionStorage.getItem('currentTab');
      if (col === 'billing' && activeAdminTab === 'billing') renderBilling();
      if (col === 'restaurant' && activeAdminTab === 'restaurant') renderRestMenu('all');
      if ((col === 'tablebookings') && activeAdminTab === 'restaurant') renderTableBookings();
      if (col === 'spa' && activeAdminTab === 'spa') renderSpa();
      if (col === 'events' && activeAdminTab === 'events') renderEvents();
      if (col === 'wakeupcalls' && activeAdminTab === 'wakeupcall') renderWakeupCalls('all');
      if (col === 'parking' && activeAdminTab === 'parking') renderParking();
      if (col === 'feedback') {
        if (activeAdminTab === 'feedback') renderAdminFeedback();
        const guestFeedbackActive = document.getElementById('gp-feedbackTab')?.classList.contains('active');
        if (guestFeedbackActive) renderPublicReviews();
      }
      if (col === 'spa' && currentUser?.type === 'guest') {
        const spaActive = document.getElementById('gp-spaTab')?.classList.contains('active');
        if (spaActive) renderGuestSpa();
      }
    } catch(e) { console.error(col+'_upd error:', e); }
  });
});

    restaurant: `🍽️ Menu updated: ${d.name || d.category || ''}`,
    tablebookings: `🪑 Table booking: ${d.guestName || ''} — ${d.date || ''}`,

function addSubCurrency(e) {
e.preventDefault();
const code = (document.getElementById('scCode').value || '').toUpperCase().trim();
const name = document.getElementById('scName').value.trim();
const symbol = document.getElementById('scSymbol').value.trim();
const rate = parseFloat(document.getElementById('scRate').value);
const flag = document.getElementById('scFlag').value.trim() || '🏳️';
if (!code || !name || !symbol || isNaN(rate) || rate <= 0) { showToast('Please fill all fields correctly', 'error'); return; }
if (BUILTIN_SUB_CURRENCIES[code]) { showToast(`${code} is already a built-in currency. Use the toggle to enable/disable it.`, 'warning'); return; }
if (customSubCurrencies[code]) { showToast(`${code} already exists`, 'warning'); return; }
customSubCurrencies[code] = { symbol, name, rate, flag };
enabledCurrencies[code] = true;
closeModal('infoModal');
renderSubCurrencies();
saveSubCurrencySettings();
showToast(`✅ ${code} (${name}) added and enabled!`, 'success');
addLog('Add Sub Currency', code);
}
function deleteSubCurrency(code) {
if (!customSubCurrencies[code]) return;
if (!confirm(`Delete "${code}" from subscription currencies?`)) return;
delete customSubCurrencies[code];
delete enabledCurrencies[code];
renderSubCurrencies();
saveSubCurrencySettings();
showToast(`${code} removed`, 'success');
addLog('Delete Sub Currency', code);
}
async function saveSubCurrencySettings() {
const payload = { ...HotelCfg, currencies: CURRENCIES, enabledCurrencies, customCurrencies: customSubCurrencies, _version: (HotelCfg._version || 0) + 1, updatedAt: new Date().toISOString() };
await saveToMongo('config', payload);
if (socket?.connected) socket.emit('cfg_upd', { hotelId: HID, enabledCurrencies, customCurrencies: customSubCurrencies, syncToken: Date.now() });
cacheData('config', payload);
}
function editCurrencyRates() {
const rates = Object.entries(CURRENCIES).map(([code, data]) =>
`<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0">
<span>${data.flag || ''} ${code}${data.custom ? ' <span style="color:#f59e0b;font-size:10px">(custom)</span>' : ''}</span>
<div style="display:flex;gap:4px;align-items:center">
<input type="number" step="0.01" value="${data.rate}" style="width:80px;padding:4px;border:1px solid var(--border);border-radius:4px" id="rate-${code}">
<span style="font-size:12px">per 1 USD</span>
${data.custom ? `<button class="tbl-action" style="color:#ef4444" onclick="deleteCurrency('${code}')" title="Delete">🗑️</button>` : ''}
</div>
</div>`
).join('');
openModal('infoModal');
document.getElementById('infoModalTitle').textContent = '✏️ Edit Exchange Rates';
document.getElementById('infoModalBody').innerHTML =
`<div style="margin-bottom:12px;max-height:300px;overflow-y:auto">${rates}</div>
<button class="btn-primary" style="width:100%" onclick="saveCurrencyRates()">💾 Save Rates</button>`;
}
function saveCurrencyRates() {
Object.keys(CURRENCIES).forEach(code => {
const input = document.getElementById(`rate-${code}`);
if (input && !isNaN(parseFloat(input.value))) {
CURRENCIES[code].rate = parseFloat(input.value);
}
});
saveUIPrefs();
const payload = { ...HotelCfg, currencies: CURRENCIES, _version: (HotelCfg._version || 0) + 1, updatedAt: new Date().toISOString() };
saveToMongo('config', payload);
if (isOnline && socket?.connected) {
socket.emit('currency_upd', { hotelId: HID, currencies: CURRENCIES, syncToken: Date.now(), clientId });
}
closeModal('infoModal');
applyCfg();
showToast('💱 Exchange rates updated', 'success');
addLog('Currency Update', 'Exchange rates modified');
}

async function saveDept(e, deptKey) {
e.preventDefault();
const emoji = document.getElementById('deptEmoji').value;
const name = {
en: document.getElementById('deptNameEn').value,
hi: document.getElementById('deptNameHi').value,
ar: document.getElementById('deptNameAr').value
};
const isEnabled = document.getElementById('deptEnabled').value === 'true';
if (deptKey) {
const idx = departments.findIndex(d => d.key === deptKey);
if (idx > -1) {
departments[idx].emoji = emoji;
departments[idx].name = name;
departments[idx].isEnabled = isEnabled;
await save('departments', departments[idx], 'dept_upd');
}
} else {
const newKey = 'dept_' + Date.now();
const newDept = {
_id: newKey,
key: newKey,
emoji,
name,
isEnabled,
categories: [],
hotelId: HID,
_version: 1,
_isNew: true
};
departments.push(newDept);
await save('departments', newDept, 'dept_upd');
}
closeModal('infoModal');
renderDepartments();
buildGuestPanes();
showToast('✅ Department saved', 'success');
}
function deleteDept(deptKey) {

showToast('✅ Department deleted', 'success');
}

async function saveCat(e, deptKey, catKey) {
e.preventDefault();
const dept = departments.find(d => d.key === deptKey);
if(!dept) return;
const emoji = document.getElementById('catEmoji').value;
const name = {
en: document.getElementById('catNameEn').value,
hi: document.getElementById('catNameHi').value,
ar: document.getElementById('catNameAr').value
};
if (catKey) {
const idx = dept.categories.findIndex(c => c.key === catKey);
if (idx > -1) {
dept.categories[idx].emoji = emoji;
dept.categories[idx].name = name;
}
} else {
dept.categories.push({
key: 'cat_' + Date.now(),
emoji,
name
});
}
await save('departments', dept, 'dept_upd');
closeModal('infoModal');
renderDepartments();
buildGuestPanes();
showToast('✅ Category saved', 'success');
}
function deleteCat(deptKey, catKey) {
if(!confirm('Delete this category?')) return;
const dept = departments.find(d => d.key === deptKey);
if(!dept) return;
dept.categories = dept.categories.filter(c => c.key !== catKey);
if(isOnline) apiCall('PUT', `/departments/${dept._id || deptKey}?hotelId=${HID}`, dept);
if(socket?.connected) socket.emit('dept_upd', { hotelId: HID, collection: 'departments', data: dept, clientId, syncToken: Date.now() });
renderDepartments();
buildGuestPanes();
showToast('✅ Category deleted', 'success');
}
function moveCat(deptKey, catKey, direction) {
const dept = departments.find(d => d.key === deptKey);
if(!dept) return;
const idx = dept.categories.findIndex(c => c.key === catKey);
if(idx === -1) return;
const newIdx = idx + direction;
if(newIdx < 0 || newIdx >= dept.categories.length) return;
[dept.categories[idx], dept.categories[newIdx]] = [dept.categories[newIdx], dept.categories[idx]];
if(isOnline) apiCall('PUT', `/departments/${dept._id || deptKey}?hotelId=${HID}`, dept);
if(socket?.connected) socket.emit('dept_upd', { hotelId: HID, collection: 'departments', data: dept, clientId, syncToken: Date.now() });
renderDepartments();
buildGuestPanes();
}

// NEW: Show full room details when a room is selected for booking
function showRoomDetails(roomId) {
const room = rooms.find(r => r._id === roomId);
const detailsEl = document.getElementById('bookRoomDetails');
if (!room || !detailsEl) {
if(detailsEl) detailsEl.style.display = 'none';
return;
}
detailsEl.style.display = 'block';
// Translate amenities if possible
const amenities = (room.amenities && Array.isArray(room.amenities))
? room.amenities.map(a => {
const key = 'amenities' + a;
const translated = t(key);
return translated !== key ? translated : a;
}).join(', ')
: 'N/A';
detailsEl.innerHTML = `
<h4 style="margin-bottom:8px; color:var(--p1); font-size:14px;">🏨 Room #${room.number} Details</h4>
<div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; font-size:13px;">
<div><strong>${t('roomType')}:</strong> ${getRoomTypeLabel(room.type)}</div>
<div><strong>${t('price')}:</strong> ${formatPrice(room.basePriceSAR)}/night</div>
<div><strong>${t('roomFloor')}:</strong> ${room.floor || 'N/A'}</div>
<div><strong>${t('roomMaxGuests')}:</strong> ${room.maxGuests || 'N/A'}</div>
<div><strong>${t('roomView')}:</strong> ${room.view ? getViewLabel(room.view) : 'N/A'}</div>
</div>
<div style="margin-top:8px; font-size:13px;"><strong>${t('roomAmenities')}:</strong> ${amenities}</div>
<div style="margin-top:8px; font-size:13px;"><strong>${t('roomDescription')}:</strong> ${room.description || 'No description available.'}</div>
`;
}

function renderGuestInv() {
const el = document.getElementById('gInvGrid');
if (!el) return;
el.innerHTML = inventory.map(i => {
const safeName = i.name.replace(/'/g, "\\'");
const pending = currentUser ? requests.find(r =>
r.guestName === currentUser.name &&
r.description === 'Item Request: ' + i.name &&
r.status === 'open'
) : null;
const hasPending = !!pending;
return `
<div class="inv-card" data-id="${i._id}" style="${hasPending ? 'border-color:var(--p1);background:var(--card2)' : ''}">

<div style="display:flex;gap:4px;margin-top:6px">
${hasPending ? `

` : `
<button class="btn-primary" style="flex:1;padding:4px 8px;font-size:10px" onclick="reqInvItem('${safeName}')">
➕ ${t('addBtn')}
</button>
<button class="btn-ghost" style="flex:1;padding:4px 8px;font-size:10px;opacity:.35;cursor:not-allowed" disabled>
✖️ ${t('cancelBtn')}
</button>
`}
</div>
</div>`;
}).join('') || '<p style="opacity:.5;text-align:center;padding:12px">No items</p>';
}

function cancelInvItem(name) {
if (!currentUser) return;
const req = requests.find(r =>
r.guestName === currentUser.name &&
r.description === 'Item Request: ' + name &&
r.status === 'open'
);
if (!req) { showToast('No pending request found for ' + name, 'warning'); return; }
if (!confirm('Cancel your request for "' + name + '"?')) return;
requests = requests.filter(r => r._id !== req._id);
if (isOnline) apiCall('DELETE', `/requests/${req._id}?hotelId=${HID}`);

function addToCart(id, name, baseSARPrice) {
const existingItem = cart.find(item => item.id === id);
if (existingItem) {
existingItem.quantity += 1;
} else {
cart.push({ id, name, basePrice: baseSARPrice, quantity: 1 });
}
renderCart();

function renderCart() {
const cartEl = document.getElementById('cartItems');
const totEl = document.getElementById('cartTotal');
const cartActionsEl = document.getElementById('cartActions');
if (!cartEl) return;

if (cart.length === 0) {
cartEl.innerHTML = `<p style="text-align:center;opacity:.5;padding:12px;font-size:12px">${t('emptyCart')}</p>`;
if (totEl) totEl.textContent = formatPrice(0);
if (cartActionsEl) cartActionsEl.innerHTML = '';
return;
}

cartEl.innerHTML = cart.map((item, index) => `
<div style="display:flex;justify-content:space-between;align-items:center;padding:8px;margin-bottom:6px;background:var(--card2);border-radius:8px;border:1px solid var(--border)">
<div style="flex:1">
<div style="font-weight:600;font-size:12px">${item.name}</div>
<div style="font-size:11px;opacity:.7">${formatPrice(item.basePrice)} × ${item.quantity}</div>
</div>
<div style="display:flex;align-items:center;gap:6px">
<button onclick="updateQuantity('${item.id}', -1)" 
style="width:24px;height:24px;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--fg);cursor:pointer;font-weight:700;display:flex;align-items:center;justify-content:center"
title="Decrease">−</button>
<span style="font-weight:700;min-width:20px;text-align:center">${item.quantity}</span>
<button onclick="updateQuantity('${item.id}', 1)" 
style="width:24px;height:24px;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--fg);cursor:pointer;font-weight:700;display:flex;align-items:center;justify-content:center"
title="Increase">+</button>
<button onclick="removeFromCart('${item.id}')" 
style="padding:4px 8px;border-radius:6px;border:none;background:#ef4444;color:#fff;cursor:pointer;font-size:10px"
title="${t('removeFromCart')}">🗑️</button>
</div>
</div>
`).join('');

const totSAR = cart.reduce((sum, item) => sum + (item.basePrice * item.quantity), 0);
if (totEl) totEl.textContent = formatPrice(totSAR);

if (cartActionsEl) {
cartActionsEl.innerHTML = `
<div style="display:flex;gap:6px;margin-top:8px">
<button class="btn-ghost" style="flex:1;font-size:11px;padding:6px" onclick="clearCart()">
🗑️ ${t('clearCart')}
</button>
<button class="btn-primary" style="flex:2;font-size:12px;padding:8px" onclick="placeOrder()">
${t('placeOrder')}
</button>
</div>
`;
}
}

function updateQuantity(id, delta) {
const item = cart.find(i => i.id === id);
if (!item) return;
item.quantity += delta;
if (item.quantity <= 0) {
removeFromCart(id);
return;
}
renderCart();
}

function removeFromCart(id) {
const item = cart.find(i => i.id === id);
cart = cart.filter(i => i.id !== id);
renderCart();
if (item) showToast(`🗑️ ${item.name} - ${t('itemRemoved')}`, 'warning');
}

function clearCart() {
if (cart.length === 0) {
showToast(t('emptyCart'), 'warning');
return;
}
if (confirm(`${t('clearCart')}?`)) {
cart = [];
renderCart();
showToast(`🗑️ ${t('cartCleared')}`, 'success');
}
}

const req = {
_id: 'req_' + Date.now(),

guestName: currentUser.name,
roomNumber: currentUser.room,
department: 'restaurant',

cart = [];
renderCart();

showToast(`🍽️ ${t('orderPlacedToast')} - ${formatPrice(totalSAR)}`, 'success');

let chartsInitialized = false;

function initDashCharts() {
    // Prevent multiple initialization
    if (chartsInitialized) return;

    try {
        const dCtx = document.getElementById('dashDeptChart');
        const oCtx = document.getElementById('dashOccChart');

        // Check if containers exist
        if (!dCtx && !oCtx) return;

        // ✅ FIX 1: Safely destroy old charts (prevent memory leak & blinking)
        if (window.dashDeptChart) {
            try { 
                window.dashDeptChart.destroy(); 
                window.dashDeptChart = null;
            } catch(e) { window.dashDeptChart = null; }
        }
        if (window.dashOccChart) {
            try { 
                window.dashOccChart.destroy(); 
                window.dashOccChart = null;
            } catch(e) { window.dashOccChart = null; }
        }

        // ✅ FIX 2: Reset canvas inline styles (Chart.js manages these internally)
        if (dCtx) {
            dCtx.style.height = '';
            dCtx.style.width = '';
            dCtx.removeAttribute('height');
            dCtx.removeAttribute('width');
        }
        if (oCtx) {
            oCtx.style.height = '';
            oCtx.style.width = '';
            oCtx.removeAttribute('height');
            oCtx.removeAttribute('width');
        }

        // ✅ FIX 3: Ensure parent containers have FIXED height (CRITICAL for responsive charts)
        if (dCtx && dCtx.parentElement) {
            dCtx.parentElement.style.position = 'relative';
            dCtx.parentElement.style.height = '250px';  // ✅ Fixed height on PARENT, not canvas
            dCtx.parentElement.style.width = '100%';
        }
        if (oCtx && oCtx.parentElement) {
            oCtx.parentElement.style.position = 'relative';
            oCtx.parentElement.style.height = '250px';  // ✅ Fixed height on PARENT, not canvas
            oCtx.parentElement.style.width = '100%';
        }

        // ✅ FIX 4: Use animation: false (not duration:0) to prevent flickering
        const opts = { 
            responsive: true, 
            maintainAspectRatio: false, 
            plugins: { 
                legend: { display: false } 
            },
            animation: false,  // ✅ Completely disable animation
            animations: {},    // ✅ Disable all animations
            transitions: {}    // ✅ Disable transitions
        };

        if (dCtx) {
            const byDept = {};
            requests.forEach(r => { byDept[r.department] = (byDept[r.department] || 0) + 1; });
            const labels = Object.keys(byDept).length ? Object.keys(byDept).map(k => getDeptLabel(k)) : ['HK', 'Maint', 'Rest', 'IT', 'Laundry'];
            const vals = Object.keys(byDept).length ? Object.values(byDept) : [8, 5, 6, 3, 4];

            window.dashDeptChart = new Chart(dCtx, {
                type: 'doughnut',
                data: { 
                    labels, 
                    datasets: [{ 
                        data: vals, 
                        backgroundColor: ['#6c63ff', '#a78bfa', '#10b981', '#f59e0b', '#ef4444', '#06b6d4'] 
                    }] 
                },
                options: opts
            });
        }

        if (oCtx) {
            const occupied = rooms.filter(r => r.status === 'Occupied').length;
            const total = rooms.length || 1;

            window.dashOccChart = new Chart(oCtx, {
                type: 'bar',
                data: { 
                    labels: ['W1', 'W2', 'W3', 'W4'], 
                    datasets: [{ 
                        label: '%', 
                        data: [68, 75, 82, Math.round(occupied / total * 100)], 
                        backgroundColor: '#6c63ff', 
                        borderRadius: 6 
                    }] 
                },
                options: { 
                    ...opts, 
                    scales: { 
                        y: { 
                            beginAtZero: true, 
                            max: 100, 
                            ticks: { color: getComputedStyle(document.body).getPropertyValue('--fg') || '#1e1b4b' }, 
                            grid: { color: getComputedStyle(document.body).getPropertyValue('--border') || '#e0deff' } 
                        }, 
                        x: { 
                            ticks: { color: getComputedStyle(document.body).getPropertyValue('--fg') || '#1e1b4b' }, 
                            grid: { display: false } 
                        } 
                    } 
                }
            });
        }

        chartsInitialized = true;
    } catch(e) {
        console.warn('Chart init error:', e);
        chartsInitialized = false; // ✅ Reset flag on error so it can retry

}

function addRoom(e) {
e.preventDefault();
const editId = document.getElementById('roomModal')?.dataset?.editId;
const amenities = [];
document.querySelectorAll('#mRoomAmenities input:checked').forEach(cb => amenities.push(cb.value));
const roomData = {
number: document.getElementById('mRoomNum').value,
type: document.getElementById('mRoomType').value,
basePriceSAR: parseFloat(document.getElementById('mRoomPrice').value),
floor: parseInt(document.getElementById('mRoomFloor').value) || 1,
maxGuests: parseInt(document.getElementById('mRoomMaxGuests').value) || 2,
view: document.getElementById('mRoomView').value,
amenities: amenities,
description: document.getElementById('mRoomDesc').value || '',
status: document.getElementById('mRoomStatus').value,
guestName: '',
hotelId: HID
};
if (editId) {
const idx = rooms.findIndex(r => r._id === editId);
if (idx > -1) {
rooms[idx] = { ...rooms[idx], ...roomData, _version: (rooms[idx]._version || 0) + 1, updatedAt: new Date().toISOString() };
save('rooms', rooms[idx], 'room_upd');
showToast('✅ ' + (t('roomUpdated') || 'Room updated successfully'), 'success');
addLog('Edit Room', '#' + rooms[idx].number);
} else {
showToast('Room not found', 'error');
}
} else {
const room = { _id: 'r_' + Date.now(), _isNew: true, ...roomData, _version: 1, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
rooms.push(room);
save('rooms', room, 'room_upd');
showToast('✅ ' + (t('roomAdded') || 'Room added successfully'), 'success');
speakItemAdded();
addLog('Add Room', '#' + room.number);
}
closeModal('roomModal');
if (document.getElementById('roomModal').dataset) delete document.getElementById('roomModal').dataset.editId;
renderRooms();
updateAdminStats();
}
function editRoom(id) {
const r = rooms.find(x => x._id === id);
if (!r) return;
openModal('roomModal');
document.getElementById('mRoomNum').value = r.number;
document.getElementById('mRoomType').value = r.type;
document.getElementById('mRoomPrice').value = r.basePriceSAR;
document.getElementById('mRoomFloor').value = r.floor || 1;
document.getElementById('mRoomMaxGuests').value = r.maxGuests || 2;
document.getElementById('mRoomView').value = r.view || 'City';
document.getElementById('mRoomDesc').value = r.description || '';
document.getElementById('mRoomStatus').value = r.status;
document.querySelectorAll('#mRoomAmenities input').forEach(cb => cb.checked = false);
if (r.amenities && Array.isArray(r.amenities)) {
r.amenities.forEach(amenity => {
const cb = document.querySelector(`#mRoomAmenities input[value="${amenity}"]`);
if (cb) cb.checked = true;
});
}
document.getElementById('roomModal').dataset.editId = id;
}
function delRoom(id) {
if (confirm('Delete?')) {
const room = rooms.find(r => r._id === id);
rooms = rooms.filter(r => r._id !== id);
if (isOnline) apiCall('DELETE', `/rooms/${id}?hotelId=${HID}`);
if (socket?.connected) socket.emit('room_upd', { hotelId: HID, collection: 'rooms', data: room, clientId, syncToken: Date.now(), action: 'delete' });
renderRooms();
updateAdminStats();
showToast('✅ ' + (t('roomDeleted') || 'Room deleted successfully'), 'success');
}
}

a.click();
showToast('📥 Transport data exported!', 'success');

async function checkHealth() {
try {
const token = localStorage.getItem('hotel_token') || sessionStorage.getItem('hotel_token');
const headers = { 'x-hotel-id': HID };
if (token) headers['Authorization'] = `Bearer ${token}`;
const test = await fetch(API_BASE + '/health', { method: 'GET', headers });
if (!test.ok) throw new Error('Health check failed');
isOnline = true;
updateNetBadge('online');
return true;
} catch (e) {
console.warn('⚠️ Backend API not reachable.', e);
isOnline = false;
updateNetBadge('offline');
return false;
}
}

function renderAnalytics() {
  const days = parseInt(document.getElementById('analyticsRange')?.value || 30);
  const now = new Date();
  const from = new Date(now - days * 86400000);
  const revData = billingData.filter(b => new Date(b.createdAt||0) >= from && b.status==='paid');
  const totalRev = revData.reduce((s,b)=>s+Number(b.total||0), 0);
  const totalRooms = rooms.length;
  const occupied = rooms.filter(r=>r.status==='occupied').length;
  const occPct = totalRooms ? Math.round(occupied/totalRooms*100) : 0;
  const newGuests = guests.filter(g => new Date(g.createdAt||0) >= from).length;
  const feedbackRatings = feedbackData.filter(f => new Date(f.createdAt||0) >= from).map(f=>f.ratings?.overall||0);
  const avgSatisfaction = feedbackRatings.length ? (feedbackRatings.reduce((s,v)=>s+v,0)/feedbackRatings.length).toFixed(1) : '—';
  const el=(id,v)=>{const x=document.getElementById(id);if(x)x.textContent=v;};
  el('anlRevenue',formatPrice(totalRev)); el('anlOccupancy',occPct+'%'); el('anlNewGuests',newGuests);
  el('anlAvgStay','2.4d'); el('anlSatisfaction',avgSatisfaction+'★'); el('anlRepeat','23%');
  // Mini bar charts
  const revenueEl = document.getElementById('anlRevenueChart');

let parkingData = [];
const TOTAL_PARKING_SLOTS = 30;
async function renderParking() {
  try { const r = await fetch(`/api/parking?hotelId=${HID}`); parkingData = await r.json(); } catch(e) { parkingData = []; }
  const tbody = document.getElementById('parkingTbody');
  const grid = document.getElementById('parkingGrid');
  const occ = parkingData.filter(p=>p.status==='occupied').length;
  const avail = TOTAL_PARKING_SLOTS - occ;
  const el=(id,v)=>{const x=document.getElementById(id);if(x)x.textContent=v;};
  el('parkTotal',TOTAL_PARKING_SLOTS); el('parkOccupied',occ); el('parkAvail',avail);
  if(grid) {
    const occupiedSlots = parkingData.filter(p=>p.status==='occupied').map(p=>p.slot);
    grid.innerHTML = Array.from({length:TOTAL_PARKING_SLOTS},(_,i)=>{
      const slot='P'+(i+1).toString().padStart(2,'0');
      const isOcc = occupiedSlots.includes(slot);
      return `<div style="background:${isOcc?'#ef444422':'#10b98122'};border:1.5px solid ${isOcc?'#ef4444':'#10b981'};border-radius:6px;padding:6px;text-align:center;cursor:pointer;font-size:11px" onclick="toggleParkingSlot('${slot}',${isOcc})">
        <div style="font-size:16px">${isOcc?'🚗':'🟩'}</div>
        <div style="font-weight:600;font-size:10px">${slot}</div>
      </div>`;
    }).join('');
  }
  if(!tbody) return;
  tbody.innerHTML = parkingData.filter(p=>p.status==='occupied').length ? parkingData.filter(p=>p.status==='occupied').map(p=>`<tr>
    <td style="font-weight:700;color:var(--p1)">${p.slot||'—'}</td>
    <td>${p.guestName||'—'}</td><td>${p.room||'—'}</td><td>${p.vehicleType||'Car'}</td>
    <td style="font-family:monospace;font-weight:600">${p.plateNo||'—'}</td>
    <td style="font-size:11px">${(p.checkIn||'').slice(0,16).replace('T',' ')}</td>
    <td><span style="color:#ef4444;font-size:11px">Occupied</span></td>
    <td><button class="tbl-action" style="color:#10b981" onclick="clearParking('${p._id}')">🚗 Release</button></td>
  </tr>`).join('') : '<tr><td colspan="8" style="text-align:center;opacity:.5;padding:20px">All slots are free</td></tr>';
}
async function toggleParkingSlot(slot, isOcc) {
  if(isOcc) {
    const p = parkingData.find(x=>x.slot===slot&&x.status==='occupied');
    if(p) await clearParking(p._id);
  } else {
    const guest = prompt('Guest name:'); const room = prompt('Room number:'); const plate = prompt('Plate number:');
    if(!guest||!plate) return;
    await apiPost('/api/parking', { hotelId: HID, slot, guestName: guest, room, plateNo: plate, vehicleType: 'Car', status: 'occupied', checkIn: new Date().toISOString() });
    showToast(`🅿️ Slot ${slot} assigned`, 'success');
    renderParking();
  }
}
async function clearParking(id) {
  await apiPut(`/api/parking/${id}`, { status: 'free', checkOut: new Date().toISOString() });
  const p = parkingData.find(x=>x._id===id); if(p) p.status='free';
  renderParking(); showToast('✅ Parking slot released', 'success');
}

// NOTIFICATIONS CENTER
// ============================================================
let notifications = [];
let notifUnread = 0;
function addNotification(n) {
  n.id = Date.now();
  n.read = false;
  notifications.unshift(n);
  if (notifications.length > 200) notifications = notifications.slice(0, 200);
  notifUnread++;
  updateNotifBadge();
  const activeTab = sessionStorage.getItem('currentTab');
  if (activeTab === 'notifications') renderNotifications();
}
function updateNotifBadge() {
  const badge = document.getElementById('notifBadge');
  if (!badge) return;
  badge.textContent = notifUnread > 99 ? '99+' : notifUnread;
  badge.style.display = notifUnread > 0 ? 'flex' : 'none';
}
function renderNotifications() {
  const filter = document.getElementById('notifFilter')?.value || 'all';
  const today = new Date().toISOString().slice(0,10);
  let d = filter === 'all' ? notifications : notifications.filter(n=>n.type===filter);
  const todayCount = notifications.filter(n=>(n.time||'').startsWith(today)).length;
  const el=(id,v)=>{const x=document.getElementById(id);if(x)x.textContent=v;};
  el('notifTotalCount', notifications.length);
  el('notifUnreadCount', notifUnread);
  el('notifTodayCount', todayCount);
  const list = document.getElementById('notifList');
  if (!list) return;
  const typeIcons = { billing:'💰', restaurant:'🍽️', tablebookings:'🪑', spa:'💆', events:'🎪', wakeupcalls:'⏰', parking:'🅿️', feedback:'⭐', laundry:'👕', requests:'📋', rooms:'🏨', default:'🔔' };
  list.innerHTML = d.length ? d.map(n=>`<div style="display:flex;align-items:flex-start;gap:10px;background:var(--card2);border-radius:8px;padding:10px;border-left:3px solid ${n.read?'var(--border)':'var(--p1)'};cursor:pointer" onclick="markNotifRead(${n.id})">
    <span style="font-size:20px;min-width:28px">${typeIcons[n.type]||'🔔'}</span>
    <div style="flex:1">
      <div style="font-size:12px;font-weight:${n.read?'400':'600'}">${n.message||''}</div>
      <div style="font-size:10px;opacity:.5;margin-top:2px">${formatRelTime(n.time)}</div>
    </div>
    ${!n.read?'<span style="width:8px;height:8px;background:var(--p1);border-radius:50%;margin-top:4px;flex-shrink:0"></span>':''}
  </div>`).join('') : '<div style="text-align:center;opacity:.4;padding:40px">🔔 No notifications yet</div>';
}
function markNotifRead(id) {
  const n = notifications.find(x=>x.id===id);
  if (n && !n.read) { n.read = true; notifUnread = Math.max(0, notifUnread-1); updateNotifBadge(); }
  renderNotifications();
}
function clearAllNotifications() {
  notifications = []; notifUnread = 0; updateNotifBadge(); renderNotifications();
  showToast('🗑️ All notifications cleared', 'success');
}
function formatRelTime(iso) {
  if (!iso) return '—';
  const diff = Date.now() - new Date(iso).getTime();
  if (diff < 60000) return 'Just now';
  if (diff < 3600000) return Math.round(diff/60000)+'m ago';
  if (diff < 86400000) return Math.round(diff/3600000)+'h ago';
  return iso.slice(0,10);
}

const LAUNDRY_ITEMS = ['Shirt','T-Shirt','Trousers','Jeans','Jacket','Suit','Dress','Saree','Kurta','Towel','Bedsheet'];
let myLaundryCart = {};
function renderMyLaundry() {
  renderLaundryItems();

function renderLaundryItems() {
  const el = document.getElementById('laundryItemsGrid');
  if (!el) return;
  el.innerHTML = LAUNDRY_ITEMS.map(item=>`<div style="background:var(--card2);border-radius:8px;padding:10px;text-align:center">
    <div style="font-size:20px">👕</div>
    <div style="font-size:11px;font-weight:600;margin:4px 0">${item}</div>

      <button style="width:22px;height:22px;border-radius:50%;border:1px solid var(--border);background:var(--card2);cursor:pointer;font-size:14px;line-height:1" onclick="adjustLaundryItem('${item}',-1)">−</button>
      <span id="lqty-${item.replace(/\s+/g,'')}" style="font-weight:700;min-width:16px;text-align:center">${myLaundryCart[item]||0}</span>
      <button style="width:22px;height:22px;border-radius:50%;background:var(--p1);color:#fff;border:none;cursor:pointer;font-size:14px;line-height:1" onclick="adjustLaundryItem('${item}',1)">+</button>

function adjustLaundryItem(item, delta) {
  myLaundryCart[item] = Math.max(0, (myLaundryCart[item]||0)+delta);

  if (el) el.textContent = myLaundryCart[item];
  const total = Object.values(myLaundryCart).reduce((s,v)=>s+v,0);
  const el2 = document.getElementById('laundryCartCount');
  if (el2) el2.textContent = total+' item'+(total!==1?'s':'');
}
async function submitLaundryOrder() {
  if (!currentUser) { showToast('Please login first','error'); return; }
  const items = Object.entries(myLaundryCart).filter(([k,v])=>v>0).map(([k,v])=>v > 1?`${k} x${v}`:k);
  if (!items.length) { showToast('Please select at least one item','error'); return; }
  const service = document.getElementById('lndService')?.value || 'standard';
  const pickup = document.getElementById('lndPickup')?.value;
  const prices = { standard: items.reduce((s,i)=>s+15,0), express: items.reduce((s,i)=>s+25,0), drycleaning: items.reduce((s,i)=>s+35,0) };
  const order = { hotelId: HID, guestName: currentUser.name, room: currentUser.room, items, service, pickupTime: pickup||new Date().toISOString(), status: 'pending', amount: prices[service]||0, createdAt: new Date().toISOString() };
  await apiPost('/api/laundry', order);
  myLaundryCart = {};
  renderLaundryItems();
  const el2 = document.getElementById('laundryCartCount'); if (el2) el2.textContent = '0 items';
  showToast('👕 Laundry order placed!', 'success');
  renderMyLaundryOrders();
}

    orders = all.filter(x => x.category === 'room_service' || x.department === 'Restaurant');
  } catch(e) { orders = []; }
  el.innerHTML = `<div style="font-weight:700;font-size:13px;margin-bottom:8px">📋 Restaurant Orders / Room Service</div>
  <div class="tbl-wrap"><table class="tbl"><thead><tr><th>Guest</th><th>Room</th><th>Order</th><th>Time</th><th>Status</th><th>Actions</th></tr></thead><tbody>${
    orders.length ? orders.map(o => `<tr>
      <td>${o.guestName||'—'}</td><td>${o.room||'—'}</td>
      <td style="font-size:11px">${o.description||'—'}</td>
      <td style="font-size:10px;opacity:.7">${(o.time||'').slice(11,16)}</td>
      <td><span style="color:${o.status==='closed'?'#10b981':'#f59e0b'};font-size:11px">${o.status||'open'}</span></td>
      <td><button class="tbl-action" onclick="closeRequest('${o._id}')">✅ Done</button></td>
    </tr>`).join('') : '<tr><td colspan="6" style="text-align:center;opacity:.5;padding:20px">No orders</td></tr>'
  }</tbody></table></div>`;
}
async function closeRequest(id) {
  await apiPut(`/api/requests/${id}`, { status: 'closed' });
  renderRestOrders();
  showToast('✅ Order closed', 'success');
}

// Helper API functions (if not already defined)
async function apiPost(url, data) {
  try { const r = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json','Authorization':HID,'X-Client-Id':clientId}, body:JSON.stringify(data) }); return await r.json(); } catch(e) { return null; }
}
async function apiPut(url, data) {
  try { const r = await fetch(url, { method:'PUT', headers:{'Content-Type':'application/json','Authorization':HID,'X-Client-Id':clientId}, body:JSON.stringify(data) }); return await r.json(); } catch(e) { return null; }
}
async function apiDelete(url) {
  try { const r = await fetch(url, { method:'DELETE', headers:{'Authorization':HID,'X-Client-Id':clientId} }); return await r.json(); } catch(e) { return null; }
}
function openParkingModalForm() { openModal('infoModal'); }
</script>
