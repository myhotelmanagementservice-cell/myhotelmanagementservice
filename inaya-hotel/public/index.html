<script>
(function() {
    const urlParams = new URLSearchParams(location.search);
    const hid = urlParams.get('hotel') || localStorage.getItem('hotel_hid') || 'default';
    const session = sessionStorage.getItem('hotel_session') || localStorage.getItem('h_' + hid + '_session');
    if (session) {
        document.write('<style>#loginPage { display: none !important; } #adminDash, #guestDash, #rolePage { display: block !important; }</style>');
    } else {
        document.write('<style>#adminDash, #guestDash, #rolePage { display: none !important; }</style>');
    }
})();
</script>

async function apiCall(method, path, body=null, retries=3){
    if(!isOnline) return null;
    const token = localStorage.getItem('hotel_token') || sessionStorage.getItem('hotel_token') || localStorage.getItem(`h_${HID}_token`);
    const opts={method, headers:{'Content-Type':'application/json','x-hotel-id':HID,'x-client-id':clientId}};
    if(token) opts.headers['Authorization'] = `Bearer ${token}`;
    if(body) opts.body=JSON.stringify(body);
    for(let i=0; i<retries; i++){
        try{
            const r=await fetch(API_BASE+path, opts);
            const text = await r.text();
            let data;
            try { data = JSON.parse(text); } catch(e) { if(text.startsWith('<!DOCTYPE') || text.startsWith('<html')) return null; throw new Error('Invalid JSON'); }
            if(data && data.code === 'SESSION_EXPIRED') {alert("Session expired. Please login again.");logout();return null;}
            if(!r.ok) throw new Error(r.statusText);
            return data;
        }catch(e){
            if(i===retries-1){console.warn(`API error for ${path}:`,e.message);return null;}
            await new Promise(res=>setTimeout(res, 1000*(i+1)));
        }
    }
    return null;
}

// FIX 3: Robust MongoDB Save with proper _id and _version handling
async function saveToMongo(collection, data) {
    if (!isOnline) return false;
    try {
        if (Array.isArray(data)) {
            await Promise.all(data.map(async (item) => {
                const isNew = item._isNew;
                const payload = { ...item };
                delete payload._isNew;
                if (isNew || !payload._id) {
                    const res = await apiCall('POST', `/${collection}?hotelId=${HID}`, payload);
                    if (res && res._id) { item._id = res._id; delete item._isNew; }
                } else {
                    await apiCall('PUT', `/${collection}/${payload._id}?hotelId=${HID}`, payload);
                    delete item._isNew;
                }
            }));
        } else {
            const isNew = data._isNew;
            const payload = { ...data };
            delete payload._isNew;
            if (isNew || !payload._id) {
                const res = await apiCall('POST', `/${collection}?hotelId=${HID}`, payload);
                if (res && res._id) { data._id = res._id; delete data._isNew; }
            } else {
                await apiCall('PUT', `/${collection}/${payload._id}?hotelId=${HID}`, payload);
                delete data._isNew;
            }
        }
        return true;
    } catch (e) {
        console.warn(`saveToMongo error for ${collection}:`, e);
        return false;
    }
}

async function save(collection, data, event='data_upd'){
    if(Array.isArray(data)){
        data.forEach(item => { item._version = (item._version||0)+1; item.updatedAt = new Date().toISOString(); });
    } else {
        data._version = (data._version||0)+1; data.updatedAt = new Date().toISOString();
    }
    const success = await saveToMongo(collection, data);
    if(success){
        if(isOnline && socket?.connected){ socket.emit(event,{hotelId:HID, collection, data, clientId, syncToken: Date.now()}); }
        updateCache();
    } else {
        offlineQueue.push({collection, data, event, timestamp: Date.now()});
        saveUIPrefs();
        updateNetBadge('queued');
    }
}

function safeMerge(target, source, collection){
    if(!source || !target) return target;
    if(Array.isArray(source) && Array.isArray(target)){
        const map = new Map(target.map(item => [item._id, item]));
        source.forEach(item => {
            const existing = map.get(item._id);
            if(!existing || (item._version && (!existing._version || item._version > existing._version))){
                map.set(item._id, {...(existing||{}), ...item});
            }
        });
        return Array.from(map.values());
    }
    if(source._version && (!target._version || source._version > target._version)){
        return {...target, ...source};
    }
    return target;
}

        socket = io(SOCKET_URL, {transports:['websocket','polling'],auth:{hotelId:HID, clientId},reconnectionDelay:1000,reconnectionDelayMax:5000});

                showToast(`🔄 Syncing ${offlineQueue.length} pending actions...`,'socket');
                const queueCopy = [...offlineQueue]; offlineQueue.length = 0; saveUIPrefs();
                queueCopy.forEach(async (item) => {
                    const success = await saveToMongo(item.collection, item.data);
                    if(success && socket?.connected){ socket.emit(item.event, {hotelId:HID, collection:item.collection, data:item.data, clientId, syncToken: item.timestamp}); }
                });
                updateNetBadge('online');
            }

            if(data.guests) guests = safeMerge(guests, data.guests, 'guests');

            if(payload.syncToken && processedEvents.has(payload.syncToken)) return;
            if(payload.syncToken) processedEvents.add(payload.syncToken);
            if(payload.clientId === clientId) return;
            const booking = payload.data;
            if(!bookings.find(b=>b._id===booking._id)) bookings.unshift(booking);
            renderGuestBookings(); renderAdminBookings(); if(currentUser?.type==='admin') renderDashboardAnalytics();
            updateCache();
        });
        socket.on('booking_upd',(payload)=>{
            if(payload.syncToken && processedEvents.has(payload.syncToken)) return;
            if(payload.syncToken) processedEvents.add(payload.syncToken);
            if(payload.clientId === clientId) return;
            const booking = payload.data;
            if(payload.action === 'delete') { bookings = bookings.filter(x => x._id !== booking._id); } 
            else { const idx = bookings.findIndex(b=>b._id===booking._id); if(idx>-1) bookings[idx]=safeMerge(bookings[idx], booking, 'bookings'); else bookings.unshift(booking); }
            renderGuestBookings(); renderAdminBookings(); if(currentUser?.type==='admin') renderDashboardAnalytics();
            updateCache();
        });
        socket.on('staff_upd',(payload)=>{
            if(payload.syncToken && processedEvents.has(payload.syncToken)) return;
            if(payload.syncToken) processedEvents.add(payload.syncToken);
            if(payload.clientId === clientId) return;
            const s = payload.data;
            if(payload.action === 'delete') { staff = staff.filter(x => x._id !== s._id); } 
            else { const idx=staff.findIndex(x=>x._id===s._id); if(idx>-1) staff[idx]=safeMerge(staff[idx], s, 'staff'); else staff.push(s); }
            renderStaff(); updateCache();
        });
        socket.on('guest_upd',(payload)=>{
            if(payload.syncToken && processedEvents.has(payload.syncToken)) return;
            if(payload.syncToken) processedEvents.add(payload.syncToken);
            if(payload.clientId === clientId) return;
            const g = payload.data;
            if(payload.action === 'delete') { guests = guests.filter(x => x._id !== g._id); } 
            else { const idx=guests.findIndex(x=>x._id===g._id); if(idx>-1) guests[idx]=safeMerge(guests[idx], g, 'guests'); else guests.push(g); }
            renderGuests(); renderLoyalty(); updateGuestStats(); updateCache();
        });
        socket.on('blacklist_upd',(payload)=>{
            if(payload.syncToken && processedEvents.has(payload.syncToken)) return;
            if(payload.syncToken) processedEvents.add(payload.syncToken);
            if(payload.clientId === clientId) return;
            const b = payload.data;
            if(payload.action === 'delete') { blacklist = blacklist.filter(x => x._id !== b._id); } 
            else { const idx=blacklist.findIndex(x=>x._id===b._id); if(idx>-1) blacklist[idx]=safeMerge(blacklist[idx], b, 'blacklist'); else blacklist.push(b); }
            renderBlacklist(); updateCache();
        });
        socket.on('maintenance_upd',(payload)=>{
            if(payload.syncToken && processedEvents.has(payload.syncToken)) return;
            if(payload.syncToken) processedEvents.add(payload.syncToken);
            if(payload.clientId === clientId) return;
            const m = payload.data;
            if(payload.action === 'delete') { maintenance = maintenance.filter(x => x._id !== m._id); } 
            else { const idx=maintenance.findIndex(x=>x._id===m._id); if(idx>-1) maintenance[idx]=safeMerge(maintenance[idx], m, 'maintenance'); else maintenance.push(m); }
            renderMaintenance(); if(currentUser?.type==='admin') renderDashboardAnalytics(); updateCache();
        });
        socket.on('logs_upd',(payload)=>{
            if(payload.syncToken && processedEvents.has(payload.syncToken)) return;
            if(payload.syncToken) processedEvents.add(payload.syncToken);
            if(payload.clientId === clientId) return;
            const l = payload.data;
            if(payload.action === 'delete') { logs = []; } 
            else { if(!logs.find(x=>x._id===l._id)) logs.unshift(l); }
            renderLogs(); updateCache();
        });
    }catch(e){
        console.warn('Socket unavailable, offline mode');
        setSockStatus('error'); updateNetBadge('offline');
    }
}

// FIX 2: Robust Settings Save to MongoDB with proper _id and versioning
function saveCfg(field){
    if(field==='name') HotelCfg.name=document.getElementById('cfgName')?.value||HotelCfg.name;
    else if(field==='currency') { HotelCfg.currency=document.getElementById('cfgCurrency')?.value||HotelCfg.currency; showToast(`✅ Currency changed to ${HotelCfg.currency}`,'success'); }
    else if(field==='wifi') HotelCfg.wifi=document.getElementById('cfgWifi')?.value||HotelCfg.wifi;
    else if(field==='transport'){ HotelCfg.airportPrice=parseInt(document.getElementById('cfgAirport')?.value)||115; HotelCfg.localPrice=parseInt(document.getElementById('cfgLocal')?.value)||60; }

    // Ensure stable ID and version for MongoDB upsert
    const payload = { 
        _id: 'config_' + HID, 
        hotelId: HID, 
        ...HotelCfg, 
        currencies: CURRENCIES, 
        _version: (HotelCfg._version || 0) + 1, 
        updatedAt: new Date().toISOString() 
    };

    Object.assign(HotelCfg, payload);
    cacheData('config', payload); // Immediate local cache update

    saveToMongo('config', payload).then(success => {
        if(success && socket?.connected) {
            socket.emit('cfg_upd', { hotelId: HID, ...payload, syncToken: Date.now(), clientId });
        }
    });

    applyCfg();
    showToast('⚙️ ' + (t('settingsSaved') || 'Settings saved successfully'),'success');
    addLog('Config Update', field);
}

            document.getElementById('aRole').textContent=t(rName);

            if(savedTab && !savedTab.startsWith('guest_')) { showAdminTab(savedTab); } else { showAdminTab('overview'); }
        }else if(currentUser.type==='guest'){
            showPage('guestDash');
            document.getElementById('gInfo').textContent=`👤 ${currentUser.name} | #${currentUser.room}`;
            updateGuestStats(); renderGuestFood(); renderGuestInv(); renderGuestHistory(); renderGuestBookings(); renderGuestAnnouncements(); renderGuestPolicies();
            if(savedTab && savedTab.startsWith('guest_')) { showGuestTab(savedTab.replace('guest_', '')); } else { showGuestTab('reqTab'); }
        }
        showToast("✅ Session restored — Welcome back!", 'success');
    }catch(e){ console.warn('Session restore error:',e); sessionStorage.removeItem('hotel_session'); }
    if(isOnline && socket?.connected){ socket.emit('guest_join', {hotelId:HID, name: currentUser?.name, room: currentUser?.room, clientId}); }
}

        else { el.classList.add('hidden'); el.style.display = 'none'; }
    });
    sessionStorage.setItem('currentPage', id);
}
